<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>חוות הטמגוצ'י - הגרסה המלאה והסופית ✨</title>

<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>

<style>
/* --- עיצוב בסיסי (מהקוד המקורי) --- */
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #e0f7fa url('../images/background.png') no-repeat center center fixed;
    background-size: cover;
    margin: 0; padding: 20px;
    display: flex; flex-direction: column; align-items: center;
}

#login-screen {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px; border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center; width: 320px;
    margin-top: 50px; border: 2px solid #81c784;
}

#control-panel {
    display: none; background: rgba(255, 255, 255, 0.95);
    padding: 25px; border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    margin-bottom: 30px; width: 90%; max-width: 900px;
    flex-wrap: wrap; gap: 15px; justify-content: center;
    border: 2px solid #81c784;
}

input, select, button { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; }
button { background-color: #2e7d32; color: white; cursor: pointer; border: none; font-weight: bold; }

/* --- עיצוב כרטיס מתהפך משופר --- */
#farm-grid {
    display: none; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px; width: 100%; max-width: 1200px;
}

.student-card-container { perspective: 1000px; height: 320px; }
.student-card { 
    width: 100%; height: 100%; position: relative; 
    transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; 
}
.student-card.is-flipped { transform: rotateY(180deg); }

.card-face {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; border-radius: 25px;
    padding: 15px; display: flex; flex-direction: column; align-items: center;
    background: rgba(255, 255, 255, 0.9); box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    border-bottom: 5px solid #81c784; text-align: center;
}
.card-back { transform: rotateY(180deg); background: #f1f8e9; border-bottom: 5px solid #1976d2; }

.my-creature .card-face { border: 4px solid #fbc02d; transform: scale(1.02); }

/* --- אנימציות (מהקוד המקורי) --- */
.creature-img { width: 110px; height: 110px; object-fit: contain; margin-bottom: 5px; }
.level-text-badge { position: absolute; top: 5px; right: 15px; font-weight: 900; color: #2e7d32; font-size: 1.4em; text-shadow: 1px 1px white; }
.xp-container { background: #eee; border-radius: 10px; height: 16px; width: 100%; overflow: hidden; border: 1px solid #ccc; margin: 5px 0; }
.xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }

.glow-effect { animation: glow-pulse 0.6s ease-out; }
@keyframes glow-pulse { 0% { filter: brightness(1); } 50% { filter: brightness(1.6) drop-shadow(0 0 15px gold); } 100% { filter: brightness(1); } }

.xp-float { position: absolute; font-weight: bold; color: gold; font-size: 1.2em; animation: floatUp 0.8s ease-out forwards; left: 50%; top: 60px; z-index: 20; }
@keyframes floatUp { 0% { opacity: 1; transform: translate(-50%,0); } 100% { opacity: 0; transform: translate(-50%,-40px); } }

.levelup { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); background: #ffd700; color: #1b5e20; font-weight: bold; padding: 10px; border-radius: 15px; z-index: 100; animation: levelPop 2s forwards; }
@keyframes levelPop { 0% { opacity:0; } 20% { opacity:1; } 100% { opacity:0; } }

/* --- מטלות והגשות --- */
#tasks-area { width: 90%; max-width: 1200px; margin-bottom: 20px; display: none; }
.task-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 6px solid #1976d2; display: flex; justify-content: space-between; align-items: center; }
#tasks-list:empty, #tasks-area:has(#tasks-list:empty) { display: none; }
#submissions-list:empty, #admin-submissions:has(#submissions-list:empty) { display: none; }

.remove-btn { position: absolute; top: 5px; left: 5px; background: #ff5252; color: white; border-radius: 50%; width: 24px; height: 24px; font-size: 12px; display: flex; align-items: center; justify-content: center; z-index: 10; }
</style>
</head>
<body>

<div id="login-screen">
    <h2>החווה המופלאה 🐾</h2>
    <input type="password" id="adminPass" placeholder="סיסמת מנהל" style="width:80%; margin-bottom:10px;">
    <button onclick="checkAdmin()" style="width:90%;">כניסת מורה 🔑</button>
    <hr style="margin:20px 0;">
    <select id="studentSelect" style="width:90%; margin-bottom:10px;">
        <option value="">טוען רשימה...</option>
    </select>
    <input type="password" id="studentPin" placeholder="קוד (4 ספרות)" style="width:90%; margin-bottom:10px; display:none;">
    <button onclick="studentLogin()" style="width:90%; background-color:#1976d2;">כניסת תלמיד ✨</button>
</div>

<div id="control-panel">
    <div style="display:flex; gap:10px; width:100%; flex-wrap:wrap; justify-content:center;">
        <input type="text" id="studentName" placeholder="שם תלמיד">
        <select id="studentClass">
            <option value="ה1">כיתה ה'1</option>
            <option value="ה2">כיתה ה'2</option>
        </select>
        <button onclick="addStudent()">הוסף יצור 🐾</button>
        <button onclick="toggleTaskPanel()" style="background:#ff9800;">מטלה חדשה 📋</button>
    </div>
    
    <div id="task-panel" style="display:none; width:100%; gap:10px; margin-top:15px; justify-content:center;">
        <input type="text" id="taskTitle" placeholder="כותרת">
        <input type="text" id="taskLink" placeholder="קישור">
        <input type="date" id="taskDeadline">
        <button onclick="addTask()" style="background:#1976d2;">פרסם!</button>
    </div>

    <div style="width:100%; display:flex; gap:10px; margin-top:10px;">
        <input type="text" id="search" placeholder="חפש תלמיד..." oninput="updateView()" style="flex:2;">
        <select id="sortBy" onchange="updateView()" style="flex:1;">
            <option value="name">לפי שם</option>
            <option value="level">לפי רמה</option>
        </select>
        <button onclick="location.reload()" style="background:#555;">יציאה</button>
    </div>

    <div id="admin-submissions" style="width:100%; margin-top:20px; background:#f1f8e9; padding:15px; border-radius:10px; border:1px dashed #2e7d32;">
        <h4 style="margin:0 0 10px 0;">הגשות שממתינות 📥</h4>
        <div id="submissions-list"></div>
    </div>
</div>

<div id="tasks-area">
    <h3 style="background: rgba(255,255,255,0.8); padding: 8px; border-radius: 8px; display: inline-block;">משימות 📝</h3>
    <div id="tasks-list"></div>
</div>

<div id="farm-grid"></div>

<div id="submit-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.5); z-index:1000; width:300px; text-align:center;">
    <h3 id="modal-task-title">הגשת מטלה</h3>
    <button onclick="window.open('https://send.magicode.me/', '_blank')" style="background:#ff9800; margin-bottom:10px;">העלה קובץ 📤</button>
    <textarea id="submit-content" placeholder="הדבק כאן את הקישור" style="width:100%; height:60px;"></textarea>
    <button onclick="sendSubmission()" style="width:100%; background:#4caf50; margin-top:10px;">שלח 🚀</button>
    <button onclick="closeModal()" style="width:100%; background:#999; margin-top:5px;">ביטול</button>
</div>

<script type="module">
// --- Firebase Config ---
const firebaseConfig = {
    apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
    authDomain: "liorfarm.firebaseapp.com",
    databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "liorfarm",
    storageBucket: "liorfarm.firebasestorage.app",
    messagingSenderId: "436063422896",
    appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CREATURE_TYPES = ['cat','fox','owl','rbt','snk','dog'];
let allStudents = [];
let allTasks = [];
let currentUser = null;

// האזנה לנתונים
db.ref('students').on('value', snap => {
    allStudents = snap.val() ? Object.values(snap.val()) : [];
    updateStudentSelect();
    updateView();
});

db.ref('tasks').on('value', snap => {
    allTasks = snap.val() ? Object.values(snap.val()) : [];
    renderTasks();
});

function updateStudentSelect() {
    const select = document.getElementById('studentSelect');
    const val = select.value;
    select.innerHTML = '<option value="">בחר את שמך...</option>';
    allStudents.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id; opt.textContent = `${s.name} (${s.className})`;
        select.appendChild(opt);
    });
    select.value = val;
}

document.getElementById('studentSelect').onchange = function() {
    document.getElementById('studentPin').style.display = this.value ? 'inline-block' : 'none';
};

function checkAdmin() {
    if (document.getElementById('adminPass').value === 'rabenu247') {
        currentUser = 'admin'; startApp();
    } else alert('שגוי');
}

function studentLogin() {
    const id = document.getElementById('studentSelect').value;
    const pin = document.getElementById('studentPin').value;
    const s = allStudents.find(st => st.id === id);
    if (s && (s.pin === pin || (!s.pin && pin === "1234"))) {
        currentUser = id; startApp();
    } else alert('קוד שגוי');
}

function startApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('farm-grid').style.display = 'grid';
    document.getElementById('tasks-area').style.display = 'block';
    if (currentUser === 'admin') {
        document.getElementById('control-panel').style.display = 'flex';
        initAdminSubmissions();
    }
}

function addStudent() {
    const name = document.getElementById('studentName').value;
    if (!name) return;
    const id = Date.now().toString();
    db.ref('students/' + id).set({
        id, name, className: document.getElementById('studentClass').value,
        xp: 0, level: 0, pin: "1234", likes: 0, status: "שלום!",
        type: CREATURE_TYPES[Math.floor(Math.random() * CREATURE_TYPES.length)],
        egg: Math.floor(Math.random() * 3) + 1
    });
    document.getElementById('studentName').value = '';
}

function addXP(id, currentXp, currentLvl, event) {
    if (currentUser !== 'admin') return;
    event.stopPropagation();
    
    // אפקט ויזואלי מהקוד המקורי
    const img = document.getElementById('img-' + id);
    const card = img.closest('.card-face');
    img.classList.remove('glow-effect');
    void img.offsetWidth; // Trigger reflow
    img.classList.add('glow-effect');

    const xpFloat = document.createElement('div');
    xpFloat.className = 'xp-float'; xpFloat.innerText = '+10 XP';
    card.appendChild(xpFloat);
    setTimeout(() => xpFloat.remove(), 800);

    let nxp = currentXp + 10;
    let nlv = currentLvl;
    if (nxp >= 100) { 
        nlv++; nxp = 0; 
        const lvPop = document.createElement('div');
        lvPop.className = 'levelup'; lvPop.innerText = 'LEVEL UP! ✨';
        card.appendChild(lvPop);
        setTimeout(() => lvPop.remove(), 2000);
    }
    db.ref('students/' + id).update({ xp: nxp, level: nlv });
}

function updateView() {
    const grid = document.getElementById('farm-grid');
    if (!currentUser) return;
    const searchTerm = document.getElementById('search').value.toLowerCase();
    
    let filtered = allStudents.filter(s => s.name.toLowerCase().includes(searchTerm));

    grid.innerHTML = filtered.map(s => {
        const isMine = currentUser === s.id;
        const imgPath = s.level === 0 ? `../images/egg${s.egg || 1}.png` : `../images/${s.type}${s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1)}.png`;
        
        return `
        <div class="student-card-container ${isMine ? 'my-creature' : ''}">
            <div class="student-card" onclick="this.classList.toggle('is-flipped')">
                <div class="card-face">
                    <div class="level-text-badge">Lv.${s.level}</div>
                    ${currentUser === 'admin' ? `<button class="remove-btn" onclick="event.stopPropagation(); if(confirm('מחק?')) db.ref('students/${s.id}').remove()">✖</button>` : ''}
                    <img id="img-${s.id}" src="${imgPath}" class="creature-img" onclick="addXP('${s.id}', ${s.xp}, ${s.level}, event)">
                    <div style="font-weight:bold;">${s.name}</div>
                    <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
                    <div style="font-size:0.8em;">❤️ ${s.likes || 0} | כיתה ${s.className}</div>
                    ${isMine ? '<div style="color:gold; font-size:0.7em;">זה אני! ⭐</div>' : ''}
                </div>
                <div class="card-face card-back">
                    <h4 style="margin:5px;">סטטוס:</h4>
                    ${isMine ? 
                        `<input type="text" value="${s.status || ''}" onchange="db.ref('students/${s.id}').update({status: this.value})" onclick="event.stopPropagation()" style="width:80%; margin-bottom:10px;">
                         <div style="font-size:0.8em;">קוד: <input type="text" maxlength="4" value="${s.pin || '1234'}" onchange="db.ref('students/${s.id}').update({pin: this.value})" onclick="event.stopPropagation()" style="width:50px; text-align:center;"></div>` :
                        `<p style="font-style:italic; padding:10px;">"${s.status || 'אין סטטוס'}"</p>`
                    }
                    <button onclick="event.stopPropagation(); db.ref('students/${s.id}').update({likes: (${s.likes || 0} + 1)})" style="background:#e91e63; margin-top:auto; width:80%;">❤️ תן לב!</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

// לוגיקת מטלות מקורית
function toggleTaskPanel() { 
    const p = document.getElementById('task-panel'); 
    p.style.display = p.style.display === 'none' ? 'flex' : 'none'; 
}

function addTask() {
    const title = document.getElementById('taskTitle').value;
    if (!title) return;
    const id = Date.now().toString();
    db.ref('tasks/' + id).set({
        id, title, link: document.getElementById('taskLink').value,
        deadline: document.getElementById('taskDeadline').value,
        xp: 100
    });
    document.getElementById('taskTitle').value = '';
}

function renderTasks() {
    const list = document.getElementById('tasks-list');
    if (!list) return;
    list.innerHTML = allTasks.map(task => `
        <div class="task-card">
            <div>
                <h4>${task.title}</h4>
                ${task.link ? `<a href="${task.link}" target="_blank">📎 פתח מטלה</a>` : ''}
            </div>
            ${currentUser === 'admin' ? `<button onclick="db.ref('tasks/${task.id}').remove()" style="background:#ff5252;">מחק</button>` : 
            `<button onclick="openSubmitModal('${task.id}', '${task.title}')" style="background:#1976d2;">הגש ✍️</button>`}
        </div>
    `).join('');
}

// הגשות מורה
function initAdminSubmissions() {
    db.ref('submissions').on('value', snap => {
        const list = document.getElementById('submissions-list');
        list.innerHTML = '';
        const subs = snap.val();
        if (subs) {
            Object.values(subs).forEach(sub => {
                const d = document.createElement('div');
                d.style = "background:white; padding:10px; margin:5px 0; border-radius:8px; border-right:4px solid gold; display:flex; justify-content:space-between; align-items:center;";
                d.innerHTML = `
                    <span><b>${sub.studentName}</b></span>
                    <div>
                        <button onclick="window.open('${sub.content}', '_blank')" style="background:#1976d2; padding:5px;">צפה</button>
                        <button onclick="approveSub('${sub.id}', '${sub.studentId}')" style="background:#4caf50; padding:5px;">אשר ✅</button>
                    </div>
                `;
                list.appendChild(d);
            });
        }
    });
}

function approveSub(subId, studentId) {
    db.ref('students/' + studentId).once('value', sSnap => {
        const s = sSnap.val();
        let nxp = s.xp + 100;
        let nlv = s.level;
        while (nxp >= 100) { nlv++; nxp -= 100; }
        db.ref('students/' + studentId).update({ xp: nxp, level: nlv });
        db.ref('submissions/' + subId).remove();
    });
}

function openSubmitModal(id, title) {
    currentUserTask = id;
    document.getElementById('modal-task-title').innerText = title;
    document.getElementById('submit-modal').style.display = 'block';
}
function closeModal() { document.getElementById('submit-modal').style.display = 'none'; }
function sendSubmission() {
    const content = document.getElementById('submit-content').value;
    const student = allStudents.find(s => s.id === currentUser);
    db.ref('submissions/' + Date.now()).set({
        id: Date.now().toString(), studentName: student.name, studentId: student.id,
        taskId: currentUserTask, content: content
    });
    alert("נשלח!"); closeModal();
}
</script>
</body>
</html>
