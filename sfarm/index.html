<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - גרסה סופית</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* עיצוב כללי ורקע */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* כרטיסיות ניהול וכניסה */
        #login-area, #admin-panel, .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 20px;
            width: 320px;
            text-align: center;
            border: 2px solid #81c784;
        }

        #main-content {
            width: 100%;
            max-width: 1200px;
            display: none;
        }

        /* גריד החווה */
        #farm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
        }

        /* עיצוב כרטיס תלמיד */
        .student-card-container {
            height: 320px;
            perspective: 1000px;
        }

        .card-face {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-bottom: 5px solid #81c784;
            transition: transform 0.3s;
        }

        .my-creature .card-face {
            border: 4px solid #fbc02d;
            transform: scale(1.05);
            background: white;
        }

        .level-text-badge {
            position: absolute;
            top: 10px;
            right: 15px;
            font-family: 'Arial Black', sans-serif;
            font-size: 1.4em;
            font-weight: 900;
            color: #2e7d32;
            text-shadow: 1px 1px 0 #fff;
        }

        .creature-img {
            width: 120px;
            height: 120px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        /* מד XP */
        .xp-container {
            background: #eee;
            border-radius: 10px;
            height: 15px;
            width: 100%;
            margin: 10px 0;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        .xp-bar {
            background: linear-gradient(90deg, #ffeb3b, #fbc02d);
            height: 100%;
            transition: width 0.5s ease-out;
        }

        button {
            background-color: #2e7d32;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        select, input {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="login-area">
        <h2>החווה של ליאור 🐾</h2>
        <select id="studentSelect">
            <option>טוען רשימת תלמידים...</option>
        </select>
        <button onclick="studentLogin()">כניסה לחווה</button>
    </div>

    <div id="admin-panel">
        <h3>ניהול והגירה ⚙️</h3>
        <input type="file" id="json-file-input" accept=".json">
        <button style="background:#ff9800;" onclick="migrateFromJson()">הפעל הגירה מ-JSON</button>
    </div>

    <div id="main-content">
        <div class="card" style="margin: 0 auto 30px;">
            <h2 id="welcome-msg">שלום</h2>
            <p>רמה: <span id="user-level">1</span> | XP: <span id="user-xp">0</span></p>
        </div>
    </div>

    <div id="farm-grid"></div>

    <script>
        // חיבור ל-Supabase
        const supabaseUrl = 'https://muwpexflpjoqnaeiyfhk.supabase.co';
        const supabaseKey = 'sb_publishable_poSgynlEXNYtk6kLRQpmhw_kytUEVF_';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let allStudents = [];
        let currentUser = null;

        // הפעלה ראשונית
        async function init() {
            await loadStudents();
        }

        // טעינת תלמידים והצגת החווה מיד
        async function loadStudents() {
            const { data, error } = await supabaseClient
                .from('students')
                .select('*')
                .order('name');

            if (data) {
                allStudents = data;
                const select = document.getElementById('studentSelect');
                select.innerHTML = '<option value="">בחר שם...</option>';
                data.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.name} (${s.class_name})</option>`;
                });
                
                // מציג את כל הדמויות מיד כשהנתונים מגיעים
                renderFarm();
            }
        }

        function studentLogin() {
            const id = document.getElementById('studentSelect').value;
            const student = allStudents.find(s => s.id === id);
            if (!student) return;

            const pin = prompt("הכנס קוד PIN (ברירת מחדל 1234):");
            if (student.pin === pin || (!student.pin && pin === "1234")) {
                currentUser = student;
                showDashboard();
            } else {
                alert("קוד שגוי!");
            }
        }

        function showDashboard() {
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            document.getElementById('welcome-msg').innerText = "שלום, " + currentUser.name;
            document.getElementById('user-xp').innerText = currentUser.totalXp;
            document.getElementById('user-level').innerText = currentUser.level;
            
            renderFarm(); // רינדור מחדש כדי להדגיש את הכרטיס של המשתמש
        }

        function renderFarm() {
            const grid = document.getElementById('farm-grid');
            if (!grid) return;
            grid.innerHTML = ''; 

            allStudents.forEach(student => {
                const cardContainer = document.createElement('div');
                cardContainer.className = 'student-card-container';
                if (currentUser && student.id === currentUser.id) {
                    cardContainer.classList.add('my-creature');
                }

                // בניית שם הקובץ לפי הפורמט שלך: cat1.png
                let imageName = `${student.type}${student.level}.png`;
                
                // טיפול בביצים ברמה 1
                if (student.level === 1 && student.egg > 0) {
                    imageName = `egg${student.egg}.png`;
                }

                cardContainer.innerHTML = `
                    <div class="card-face">
                        <div class="level-text-badge">Lvl ${student.level}</div>
                        <img src="images/${imageName}" 
                             onerror="this.src='images/egg1.png'" 
                             class="creature-img">
                        <div style="font-weight:bold; font-size:1.1em;">${student.name}</div>
                        <div class="xp-container">
                            <div class="xp-bar" style="width: ${student.totalXp % 100}%"></div>
                        </div>
                        <div style="font-size:0.8em; color:#666;">XP: ${student.totalXp}</div>
                    </div>
                `;
                grid.appendChild(cardContainer);
            });
        }

        // הגירה מקובץ JSON (לשימוש חד פעמי)
        async function migrateFromJson() {
            const fileInput = document.getElementById('json-file-input');
            if (!fileInput.files.length) return alert("אנא בחר קובץ JSON");

            const file = fileInput.files[0];
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const students = data.students;
                    alert("מתחיל הגירה... אנא המתן לסיום.");

                    for (let id in students) {
                        const s = students[id];
                        await supabaseClient.from('students').upsert([{
                            id: id,
                            name: s.name,
                            class_name: s.className || "ה2",
                            totalXp: s.xp || 0,
                            level: s.level || 1,
                            type: s.type || "egg",
                            egg: s.egg || 1,
                            pin: s.pin || "1234"
                        }]);
                    }
                    alert("ההגירה הסתיימה בהצלחה!");
                    location.reload();
                } catch (err) {
                    alert("שגיאה בקובץ: " + err.message);
                }
            };
            reader.readAsText(file);
        }

        init();
    </script>
</body>
</html>
