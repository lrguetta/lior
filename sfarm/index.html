<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - גרסה סופית</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   <style>
    /* מסתיר את אזור המטלות אם אין בתוכו תוכן */
#tasks-list:empty, 
#tasks-area:has(#tasks-list:empty) {
    display: none;
}

/* מסתיר את אזור ההגשות למורה אם הוא ריק */
#submissions-list:empty,
#admin-submissions:has(#submissions-list:empty) {
    display: none;
}
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #e0f7fa url('images/background.png') no-repeat center center fixed;
    background-size: cover;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#login-screen {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    width: 320px;
    margin-top: 50px;
    border: 2px solid #81c784;
}

#control-panel {
    display: none; 
    background: rgba(255, 255, 255, 0.95);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    margin-bottom: 30px;
    width: 90%;
    max-width: 900px;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    border: 2px solid #81c784;
}

input, select, button {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
}

button {
    background-color: #2e7d32;
    color: white;
    cursor: pointer;
    border: none;
    font-weight: bold;
}

#farm-grid {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px;
    width: 100%;
    max-width: 1200px;
}

    /* מבנה המכולה לסיבוב */
.student-card-container { height: 320px; perspective: 1000px; }
.student-card { 
    position: relative; width: 100%; height: 100%; 
    transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; 
}
.student-card.is-flipped { transform: rotateY(180deg); }

/* עיצוב הפנים והגב */
.card-face {
    position: absolute; width: 100%; height: 100%; 
    backface-visibility: hidden; display: flex; flex-direction: column; 
    align-items: center; justify-content: center;
    background: rgba(255, 255, 255, 0.9); border-radius: 25px;
    padding: 20px; box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    border-bottom: 5px solid #81c784;
}

.card-back { 
    transform: rotateY(180deg); 
    background: #f1f8e9; 
    border-bottom: 5px solid #1976d2; 
}
    
.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    background: rgba(255,255,255,0.9);
    border-radius: 25px;
    padding: 20px;
    box-sizing: border-box;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    border-bottom: 5px solid #81c784;
}

.my-creature { border: 4px solid #fbc02d; transform: scale(1.05); z-index: 5; }

.level-text-badge {
    position: absolute;
    top: 5px;
    right: 15px;
    font-family: 'Arial Black', sans-serif;
    font-size: 1.4em;
    font-weight: 900;
    color: #2e7d32;
    z-index: 10;
    text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3);
}

.creature-img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    margin-bottom: 10px;
}

/* אנימציות */
.glow-effect { animation: glow-pulse 0.6s ease-out; }
@keyframes glow-pulse {
    0% { filter: brightness(1); transform: scale(1); }
    50% { filter: brightness(1.6) drop-shadow(0 0 15px gold); transform: scale(1.25); }
    100% { filter: brightness(1); transform: scale(1); }
}

.shake { animation: shake 0.5s infinite; }
@keyframes shake {
    0%, 100% { transform: translate(1px, 1px) rotate(0deg); }
    25% { transform: translate(-1px, -2px) rotate(-1deg); }
    75% { transform: translate(1px, -2px) rotate(1deg); }
}

.hatch-crack { animation: eggCrack 0.9s ease-out forwards; }
@keyframes eggCrack {
    0% { transform: scale(1); }
    100% { transform: scale(0); opacity: 0; }
}

.xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
.xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }

.remove-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ff5252;
    color: white;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.xp-float {
    position: absolute;
    font-weight: bold;
    color: gold;
    font-size: 1.2em;
    animation: floatUp 0.8s ease-out forwards;
    left: 50%;
    top: 60px;
}
@keyframes floatUp { 0% { opacity: 1; transform: translate(-50%,0); } 100% { opacity: 0; transform: translate(-50%,-40px); } }

.levelup {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ffd700;
    color: #1b5e20;
    font-weight: bold;
    font-size: 1.5em;
    padding: 10px 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    z-index: 100;
    pointer-events: none;
    animation: levelPop 2s ease-out forwards;
}

@keyframes levelPop {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -30px) scale(1.2); }
    80% { opacity: 1; transform: translate(-50%, -40px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(0.8); }
}

.hatch-flash {
    position: absolute;
    width: 120px;
    height: 120px;
    background: white;
    border-radius: 50%;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    animation: hatchFlash 0.4s ease-out forwards;
}
@keyframes hatchFlash { 0% { transform: translateX(-50%) scale(0.5); opacity: 1; } 100% { transform: translateX(-50%) scale(2); opacity: 0; } }

#tasks-area {
    width: 90%;
    max-width: 1200px;
    margin-bottom: 20px;
    display: none;
}

.task-card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    border-right: 6px solid #1976d2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

.task-info h4 { margin: 0; color: #333; }
.task-info a { color: #1976d2; font-size: 0.9em; }
</style>
</head>
<body>

    <div class="card" id="login-area">
        <h2>החווה של ליאור 🐾</h2>
        <select id="studentSelect" style="width: 100%; padding: 10px; margin-bottom: 10px;"><option>טוען תלמידים...</option></select>
        <button class="btn-primary" onclick="studentLogin()">כניסה</button>
    </div>

    <div class="card" id="admin-panel">
        <h3>ניהול מערכת ⚙️</h3>
        <p>ייבוא נתונים מ-Firebase (JSON):</p>
        <input type="file" id="json-file-input" accept=".json">
        <br><br>
        <button class="btn-migrate" onclick="migrateFromJson()">הפעל הגירה מ-JSON 🚀</button>
        <p style="font-size: 0.8em; color: #666;">* השתמש בזה רק פעם אחת כדי להעביר את ה-XP של הילדים.</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="card">
            <h2 id="welcome-msg">שלום</h2>
            <p>רמה: <span id="user-level">1</span> | XP: <span id="user-xp">0</span></p>
        </div>
        
        <div id="farm-grid"></div>
    </div>

<script>
    // --- הגדרות חיבור (נא למלא!) ---
    const supabaseUrl = 'https://muwpexflpjoqnaeiyfhk.supabase.co';
    const supabaseKey = 'sb_publishable_poSgynlEXNYtk6kLRQpmhw_kytUEVF_';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    let allStudents = [];
    let currentUser = null;

    async function init() {
        await loadStudents();
    }

    async function loadStudents() {
        const { data, error } = await supabaseClient.from('students').select('*').order('name');
        if (data) {
            allStudents = data;
            const select = document.getElementById('studentSelect');
            select.innerHTML = '<option value="">בחר שם...</option>';
            data.forEach(s => {
                select.innerHTML += `<option value="${s.id}">${s.name} (${s.class_name})</option>`;
            });
        }
    }

    function studentLogin() {
        const id = document.getElementById('studentSelect').value;
        const student = allStudents.find(s => s.id === id);
        if (!student) return;

        const pin = prompt("הכנס קוד PIN (ברירת מחדל 1234 או מה שהיה ב-Firebase):");
        if (student.pin === pin || (!student.pin && pin === "1234")) {
            currentUser = student;
            showDashboard();
        } else {
            alert("קוד שגוי!");
        }
    }

    function showDashboard() {
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "שלום, " + currentUser.name;
        document.getElementById('user-xp').innerText = currentUser.totalXp;
        document.getElementById('user-level').innerText = currentUser.level;
        renderFarm();
    }

    function renderFarm() {
        const grid = document.getElementById('farm-grid');
        grid.innerHTML = `<div class="creature-card">
            <h3>היצור שלי</h3>
            <div style="font-size: 50px;">${getEmoji(currentUser.type)}</div>
            <p>סוג: ${currentUser.type}</p>
        </div>`;
    }

    function getEmoji(type) {
        const emojis = { 'cat': '🐱', 'fox': '🦊', 'snk': '🐍', 'mnk': '🐒', 'zbr': '🦓' };
        return emojis[type] || '🥚';
    }

    // --- פונקציית הקסם: הגירה מקובץ JSON ---
    async function migrateFromJson() {
        const fileInput = document.getElementById('json-file-input');
        if (!fileInput.files.length) return alert("אנא בחר את קובץ ה-JSON");

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = async (e) => {
            try {
                const data = JSON.parse(e.target.result);
                const students = data.students;
                
                alert("ההגירה מתחילה. אל תסגור את הדף!");
                
                for (let id in students) {
                    const s = students[id];
                    const toInsert = {
                        id: id,
                        name: s.name,
                        class_name: s.class_name || "ה2",
                        "totalXp": s.totalXp || 0,
                        level: s.level || 1,
                        type: s.type || "egg",
                        egg: s.egg || 1,
                        pin: s.pin || "1234"
                    };
                    await supabaseClient.from('students').upsert([toInsert]);
                }
                
                alert("סיימנו! כל התלמידים וה-XP הועברו בהצלחה.");
                location.reload();
            } catch (err) {
                alert("שגיאה: " + err.message);
            }
        };
        reader.readAsText(file);
    }

    init();
</script>
</body>
</html>
