<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י שלי - ענן</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        #control-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 30px; width: 90%; max-width: 900px;
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;
            border: 2px solid #81c784;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input, select, button { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; }
        button { background-color: #2e7d32; color: white; cursor: pointer; border: none; font-weight: bold; transition: all 0.2s; }
        button:hover { background-color: #1b5e20; transform: translateY(-2px); }

        #farm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px; width: 100%; max-width: 1200px;
        }

        .student-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px; padding: 20px; text-align: center;
            position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-bottom: 5px solid #81c784; transition: transform 0.3s ease;
        }

        .level-text-badge {
            position: absolute; top: 5px; right: 15px;
            font-family: 'Arial Black', Gadget, sans-serif;
            font-size: 1.4em; font-weight: 900; color: #2e7d32;
            text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3);
        }

        .creature-img { width: 120px; height: 120px; cursor: pointer; object-fit: contain; margin-bottom: 10px; }
        .xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        .xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }
        
        .remove-btn {
            position: absolute; top: 10px; left: 10px;
            background: #ff5252; color: white; border: none;
            border-radius: 50%; width: 25px; height: 25px; cursor: pointer;
        }

        .status-indicator {
            position: fixed; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 5px 15px; border-radius: 20px; font-size: 12px;
        }
    </style>
</head>
<body>

<div id="control-panel">
    <div class="input-group">
        <input type="text" id="studentName" placeholder="שם התלמיד">
    </div>
    <div class="input-group">
        <select id="studentClass">
            <option value="ה1">כיתה ה'1</option>
            <option value="ה2">כיתה ה'2</option>
        </select>
    </div>
    <button onclick="addStudent()">צרף יצור לחווה (ענן) 🐾</button>
    
    <div style="width: 100%; display: flex; gap: 10px; margin-top: 10px;">
        <input type="text" id="search" placeholder="חפש לפי שם..." oninput="renderFarm()" style="flex: 2;">
    </div>
</div>

<div id="farm-grid"></div>
<div id="status" class="status-indicator">מחובר לענן ☁️</div>

<script>
    // הגדרות ה-Firebase שלך
    const firebaseConfig = {
      apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
      authDomain: "liorfarm.firebaseapp.com",
      databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "liorfarm",
      storageBucket: "liorfarm.firebasestorage.app",
      messagingSenderId: "436063422896",
      appId: "1:436063422896:web:4cb14fbcc036ba97676e75",
      measurementId: "G-82TZTXMCXG"
    };

    // אתחול Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const studentsRef = db.ref('students');

    const CREATURE_TYPES = ['trt', 'snk', 'hnd', 'cat', 'crw', 'fsh', 'chk', 'fox', 'zbr', 'mnk', 'shp', 'cow', 'ost', 'rbt', 'dnk', 'duk', 'snl', 'owl', 'spd'];
    const EGG_IMAGES = ['images/egg1.png', 'images/egg2.png', 'images/egg3.png', 'images/egg4.png', 'images/egg5.png'];

    let students = [];

    // האזנה לשינויים בענן - ברגע שיש שינוי, הדף מתעדכן לבד!
    studentsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        students = data ? Object.values(data) : [];
        renderFarm();
        document.getElementById('status').innerText = "סונכרן עם הענן ✅";
    });

    function addStudent() {
        const nameInput = document.getElementById('studentName');
        const classSelect = document.getElementById('studentClass');
        if (!nameInput.value.trim()) return alert("נא להזין שם תלמיד");

        const newId = Date.now().toString();
        const newStudent = {
            id: newId,
            name: nameInput.value,
            className: classSelect.value,
            xp: 0,
            level: 0,
            creatureType: CREATURE_TYPES[Math.floor(Math.random() * CREATURE_TYPES.length)],
            eggIndex: Math.floor(Math.random() * EGG_IMAGES.length)
        };

        db.ref('students/' + newId).set(newStudent);
        nameInput.value = '';
    }

    function addXP(id) {
        const student = students.find(s => s.id == id);
        let newXp = student.xp + 10;
        let newLevel = student.level;

        if (newXp >= 100) {
            newLevel++;
            newXp = 0;
        }

        db.ref('students/' + id).update({
            xp: newXp,
            level: newLevel
        });
    }

    function removeStudent(id) {
        if (confirm("למחוק את היצור מהענן?")) {
            db.ref('students/' + id).remove();
        }
    }

    function getImagePath(student) {
        if (student.level === 0) return EGG_IMAGES[student.eggIndex];
        let stage = 1;
        if (student.level >= 20) stage = 3;
        else if (student.level >= 10) stage = 2;
        return `images/${student.creatureType}${stage}.png`;
    }

    function renderFarm() {
        const grid = document.getElementById('farm-grid');
        const searchTerm = document.getElementById('search').value.toLowerCase();

        let filtered = students.filter(s => s.name.toLowerCase().includes(searchTerm));

        grid.innerHTML = filtered.map(s => `
            <div class="student-card">
                <div class="level-text-badge">Lv.${s.level}</div>
                <button class="remove-btn" onclick="removeStudent('${s.id}')">×</button>
                <img id="img-${s.id}" src="${getImagePath(s)}" class="creature-img" onclick="addXP('${s.id}')">
                <div style="font-weight:bold; font-size:1.2em;">${s.name}</div>
                <div style="color:#555;">כיתה ${s.className}</div>
                <div class="xp-container">
                    <div class="xp-bar" style="width: ${s.xp}%"></div>
                </div>
                <div style="font-size: 0.85em; font-weight: bold; color: #2e7d32;">
                    ${s.level === 0 ? 'שלב: ביצה' : 'רמה: ' + s.level} (${s.xp}/100 XP)
                </div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
