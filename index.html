<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>חוות הטמגוצ'י</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:'Segoe UI',Tahoma,sans-serif;
background:#e0f7fa;
margin:0;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

#control-panel{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:25px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

#farm-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
width:100%;
max-width:1100px;
}

.student-card{
background:white;
border-radius:20px;
padding:15px;
text-align:center;
position:relative;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.creature-img{
width:120px;
cursor:pointer;
}

.level-text-badge{
position:absolute;
top:5px;
right:10px;
font-weight:bold;
color:#2e7d32;
}

.xp-container{
background:#eee;
border-radius:10px;
height:18px;
margin:10px 0;
overflow:hidden;
}

.xp-bar{
background:linear-gradient(90deg,#ffeb3b,#fbc02d);
height:100%;
transition:width 0.4s;
}

.remove-btn{
position:absolute;
top:5px;
left:5px;
background:#ff5252;
color:white;
border:none;
border-radius:50%;
width:25px;
height:25px;
cursor:pointer;
}

.submitted-icon{
position:absolute;
bottom:8px;
right:8px;
background:#4caf50;
color:white;
width:22px;
height:22px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

#login-screen{
position:fixed;
inset:0;
background:#e0f7fa;
display:flex;
align-items:center;
justify-content:center;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:white;
padding:25px;
border-radius:15px;
width:400px;
max-height:80vh;
overflow:auto;
}

</style>
</head>

<body>

<div id="login-screen">
<div class="modal-content">

<h2>כניסה לחווה</h2>

<select id="studentSelect">
<option value="">בחר תלמיד</option>
</select>

<br><br>

<input type="password" id="adminPass" placeholder="סיסמת מנהל">

<br><br>

<button onclick="login()">כניסה</button>

</div>
</div>


<div id="control-panel">

<input type="text" id="studentName" placeholder="שם התלמיד">

<select id="studentClass">
<option value="ה1">כיתה ה'1</option>
<option value="ה2">כיתה ה'2</option>
</select>

<button onclick="addStudent()">צרף יצור</button>

<button onclick="openTaskCreator()">משימה חדשה</button>

</div>


<div id="farm-grid"></div>


<div id="tasksWindow" class="modal">
<div class="modal-content">

<h3>משימות</h3>

<div id="tasksList"></div>

</div>
</div>


<div id="taskModal" class="modal">
<div class="modal-content">

<h3>משימה חדשה</h3>

<input id="taskTitle" placeholder="שם משימה"><br><br>

<input id="taskXP" type="number" placeholder="XP"><br><br>

<input id="taskDue" type="date"><br><br>

<a href="https://send.magicode.me/" target="_blank">העלה קובץ משימה</a><br><br>

<input id="taskLink" placeholder="הדבק לינק למשימה"><br><br>

<button onclick="createTask()">שמור</button>

</div>
</div>


<script>

const firebaseConfig={
apiKey:"AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
authDomain:"liorfarm.firebaseapp.com",
databaseURL:"https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"liorfarm"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let allStudents=[];
let tasks=[];
let submissions={};

let currentUser=null;
let isAdmin=false;

db.ref('students').on('value',(snap)=>{

allStudents=snap.val()?Object.values(snap.val()):[];

updateView();
populateStudentLogin();

});

db.ref('tasks').on('value',(snap)=>{
tasks=snap.val()?Object.values(snap.val()):[];
});

db.ref('submissions').on('value',(snap)=>{
submissions=snap.val()||{};
});


function login(){

const pass=document.getElementById("adminPass").value;

if(pass==="rabenu247"){
isAdmin=true;
currentUser="admin";
}

else{

const id=document.getElementById("studentSelect").value;

if(!id){
alert("בחר תלמיד");
return;
}

currentUser=id;

}

document.getElementById("login-screen").style.display="none";

}


function populateStudentLogin(){

const select=document.getElementById("studentSelect");

select.innerHTML='<option value="">בחר תלמיד</option>';

allStudents.forEach(s=>{
select.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
});

}


function addStudent(){

const name=document.getElementById('studentName').value;

if(!name)return;

const id=Date.now().toString();

db.ref('students/'+id).set({

id,
name,
className:document.getElementById('studentClass').value,
xp:0,
level:0

});

}


function creatureClick(id,xp,lvl){

if(isAdmin){
addXP(id,xp,lvl);
}

else{

if(id!==currentUser){
alert("זו לא הדמות שלך");
return;
}

openTasks();

}

}


function addXP(id,xp,lvl){

let nxp=xp+10;
let nlv=lvl;

if(nxp>=100){
nlv++;
nxp=0;
}

db.ref('students/'+id).update({
xp:nxp,
level:nlv
});

}


function openTasks(){

let html="";

tasks.forEach(t=>{

html+=`

<div style="border-bottom:1px solid #ddd;padding:10px">

<b>${t.title}</b><br>
XP: ${t.xp}<br>
עד: ${t.due}<br>

<a href="${t.fileLink}" target="_blank">הורד משימה</a><br><br>

<a href="https://send.magicode.me/" target="_blank">העלה קובץ</a><br>

<input id="sub-${t.id}" placeholder="הדבק לינק להגשה"><br>

<button onclick="submitTask('${t.id}')">הגש</button>

</div>

`;

});

document.getElementById("tasksList").innerHTML=html;
document.getElementById("tasksWindow").style.display="flex";

}


function submitTask(taskId){

const link=document.getElementById("sub-"+taskId).value;

db.ref(`submissions/${currentUser}/${taskId}`).set({

link,
status:"pending"

});

alert("המשימה נשלחה");

}


function openTaskCreator(){

document.getElementById("taskModal").style.display="flex";

}


function createTask(){

const id=Date.now().toString();

db.ref("tasks/"+id).set({

id,
title:document.getElementById("taskTitle").value,
xp:parseInt(document.getElementById("taskXP").value),
due:document.getElementById("taskDue").value,
fileLink:document.getElementById("taskLink").value

});

document.getElementById("taskModal").style.display="none";

}


function updateView(){

const grid=document.getElementById('farm-grid');

grid.innerHTML=allStudents.map(s=>{

let submitted=false;

if(submissions[s.id]){
submitted=true;
}

return`

<div class="student-card">

<div class="level-text-badge">Lv.${s.level}</div>

<img src="images/egg1.png"
class="creature-img"
onclick="creatureClick('${s.id}',${s.xp},${s.level})">

<div style="font-weight:bold">${s.name}</div>

<div class="xp-container">
<div class="xp-bar" style="width:${s.xp}%"></div>
</div>

${submitted?'<div class="submitted-icon">✔</div>':''}

</div>

`;

}).join('');

}

</script>

</body>
</html>
