<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - גרסת המשימות (קישורים)</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* --- כל ה-CSS הקיים שלך נשמר כאן --- */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e0f7fa url('images/background.png') no-repeat center center fixed; background-size: cover; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #control-panel { background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 30px; width: 90%; max-width: 900px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; border: 2px solid #81c784; }
        input, select, button { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; }
        button { background-color: #2e7d32; color: white; cursor: pointer; border: none; font-weight: bold; }
        #farm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .student-card { background: rgba(255, 255, 255, 0.9); border-radius: 25px; padding: 20px; text-align: center; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 5px solid #81c784; }
        .level-text-badge { position: absolute; top: 5px; right: 15px; font-family: 'Arial Black', sans-serif; font-size: 1.4em; font-weight: 900; color: #2e7d32; z-index: 10; text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3); }
        .creature-img { width: 120px; height: 120px; cursor: pointer; object-fit: contain; margin-bottom: 10px; transition: transform 0.1s; }
        
        /* אפקטים */
        .glow-effect { animation: glow-pulse 0.6s ease-out; }
        @keyframes glow-pulse { 0% { filter: brightness(1); transform: scale(1); } 50% { filter: brightness(1.6) drop-shadow(0 0 15px gold); transform: scale(1.25); } 100% { filter: brightness(1); transform: scale(1); } }
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translate(1px, 1px) rotate(0deg); } 25% { transform: translate(-1px,-2px) rotate(-1deg); } 75% { transform: translate(1px,-2px) rotate(1deg); } }
        
        .xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        .xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }
        .remove-btn { position: absolute; top: 10px; left: 10px; background: #ff5252; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* כניסה ומודאל */
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; display: flex; flex-direction: column; gap: 15px; width: 300px; }
        
        .task-btn { position: absolute; bottom: 10px; right: 10px; background: #fb8c00; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; color: white; font-size: 20px; }
        
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 500; align-items: center; justify-content: center; }
        .modal { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 400px; position: relative; text-align: right; }
        .close-modal { position: absolute; top: 10px; left: 10px; cursor: pointer; font-size: 20px; }
        
        .task-item { background: #f9f9f9; padding: 12px; border-radius: 10px; margin-top: 10px; border-right: 4px solid #fb8c00; }
        .status-tag { font-size: 0.8em; padding: 3px 8px; border-radius: 5px; float: left; }
        .pending { background: #fff3e0; color: #e65100; }
        .submitted { background: #e8f5e9; color: #2e7d32; }

        /* XP ורמות */
        .xp-float { position: absolute; font-weight: bold; color: gold; font-size: 1.2em; animation: floatUp 0.8s ease-out forwards; pointer-events: none; left: 50%; top: 60px; transform: translateX(-50%); }
        @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%, 0); } 100% { opacity: 0; transform: translate(-50%, -40px); } }
        .levelup { position: absolute; top: 40px; right: 50%; transform: translateX(50%); background: gold; color: #333; font-weight: bold; padding: 4px 10px; border-radius: 10px; animation: levelPop 1s ease-out forwards; z-index: 100; }
        @keyframes levelPop { 0% { transform: translateX(50%) scale(0.5); opacity: 0; } 40% { transform: translateX(50%) scale(1.3); opacity: 1; } 100% { transform: translateX(50%) scale(1); opacity: 0; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>הכניסה לחווה 🐾</h2>
        <button onclick="loginAs('student')">אני תלמיד/ה</button>
        <hr style="width:100%">
        <input type="password" id="adminPass" placeholder="קוד סודי למנהל">
        <button onclick="loginAs('admin')" style="background:#1565c0">כניסת מנהל</button>
    </div>
</div>

<div id="control-panel" style="display:none">
    <input type="text" id="studentName" placeholder="שם התלמיד">
    <select id="studentClass"><option value="ה1">כיתה ה'1</option><option value="ה2">כיתה ה'2</option></select>
    <button onclick="addStudent()">הוסף יצור ✨</button>
    <div style="width:100%; display:flex; gap:10px; margin-top:10px;">
        <input type="text" id="search" placeholder="חיפוש..." oninput="updateView()" style="flex:2;">
        <select id="sortBy" onchange="updateView()" style="flex:1;">
            <option value="name">לפי שם</option>
            <option value="level">לפי רמה</option>
        </select>
    </div>
</div>

<div id="farm-grid"></div>

<div id="modal-overlay">
    <div class="modal">
        <span class="close-modal" onclick="closeModal()">✖</span>
        <div id="modal-content"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
        authDomain: "liorfarm.firebaseapp.com",
        databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "liorfarm",
        messagingSenderId: "436063422896",
        appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userRole = ''; 
    let allStudents = [];
    const CREATURE_TYPES = ['trt','snk','hnd','cat','crw','fsh','chk','fox','zbr','mnk','shp','cow','ost','rbt','dnk','duk','snl','owl','spd'];

    function loginAs(role) {
        if(role === 'admin') {
            if(document.getElementById('adminPass').value !== '1234') { alert("קוד שגוי"); return; }
            document.getElementById('control-panel').style.display = 'flex';
        }
        userRole = role;
        document.getElementById('login-overlay').style.display = 'none';
    }

    db.ref('students').on('value', (snap) => {
        allStudents = snap.val() ? Object.values(snap.val()) : [];
        updateView();
    });

    function addStudent() {
        const nameInput = document.getElementById('studentName');
        if(!nameInput.value.trim()) return;
        const id = Date.now().toString();
        db.ref('students/'+id).set({
            id, name: nameInput.value, className: document.getElementById('studentClass').value,
            xp: 0, level: 0,
            type: CREATURE_TYPES[Math.floor(Math.random()*CREATURE_TYPES.length)],
            egg: Math.floor(Math.random()*5)
        });
        nameInput.value = '';
    }

    function addXP(id, xp, lvl) {
        if(userRole !== 'admin') { openTaskModal(id); return; }

        const img = document.getElementById('img-'+id);
        const card = img?.closest('.student-card');
        if(img) {
            img.style.pointerEvents="none";
            setTimeout(()=>img.style.pointerEvents="auto",400);
            img.classList.remove('glow-effect');
            requestAnimationFrame(()=>img.classList.add('glow-effect'));
            if(card) {
                const f = document.createElement('div'); f.className='xp-float'; f.innerText='+10 XP';
                card.appendChild(f); setTimeout(()=>f.remove(),800);
            }
        }

        let nxp = xp+10, nlv = lvl;
        if(nxp>=100){ nlv++; nxp=0; 
            if(card){ const t = document.createElement('div'); t.className='levelup'; t.innerText='LEVEL UP!'; card.appendChild(t); setTimeout(()=>t.remove(),1000); }
        }
        setTimeout(() => db.ref('students/'+id).update({ xp: nxp, level: nlv }), 450);
    }

    function openTaskModal(studentId) {
        const s = allStudents.find(x => x.id === studentId);
        const overlay = document.getElementById('modal-overlay');
        const content = document.getElementById('modal-content');
        overlay.style.display = 'flex';

        if(userRole === 'admin') {
            let submissionsHtml = '';
            if(s.tasks) {
                Object.values(s.tasks).forEach(t => {
                    if(t.link && !t.approved) {
                        submissionsHtml += `
                            <div class="task-item">
                                <b>הגשה: ${t.title}</b><br>
                                <a href="${t.link}" target="_blank">🔗 לחץ לצפייה בעבודה</a><br>
                                <button onclick="approveTask('${s.id}','${t.taskId}',${t.rewardXP})" style="margin-top:5px; background:#2e7d32; font-size:12px;">אשר ושלם ${t.rewardXP} XP ✅</button>
                            </div>`;
                    }
                });
            }

            content.innerHTML = `
                <h3>ניהול משימות: ${s.name}</h3>
                <div style="background:#f0f0f0; padding:15px; border-radius:10px;">
                    <input type="text" id="tTitle" placeholder="שם המשימה (למשל: דף עבודה)" style="width:90%; margin-bottom:10px;">
                    <input type="number" id="tXP" placeholder="כמות XP כפרס" style="width:90%; margin-bottom:10px;">
                    <button onclick="saveTask('${studentId}')" style="width:100%">שלח משימה לתלמיד 📤</button>
                </div>
                <div id="admin-subs">${submissionsHtml || '<p style="font-size:13px; color:grey;">אין הגשות חדשות כרגע</p>'}</div>
            `;
        } else {
            let tasksHtml = '';
            if(s.tasks) {
                Object.values(s.tasks).forEach(t => {
                    tasksHtml += `
                        <div class="task-item">
                            <span class="status-tag ${t.link ? 'submitted' : 'pending'}">${t.link ? 'הוגש' : 'ממתין'}</span>
                            <b>${t.title}</b><br>
                            <small>פרס: ${t.rewardXP} XP</small>
                            ${!t.link ? `
                                <div style="margin-top:10px;">
                                    <input type="text" id="link-${t.taskId}" placeholder="הדבק כאן קישור לעבודה..." style="width:70%; padding:5px;">
                                    <button onclick="submitLink('${s.id}','${t.taskId}')" style="padding:5px 10px; font-size:12px;">הגש 🚀</button>
                                </div>` : ''}
                        </div>`;
                });
            }
            content.innerHTML = `<h3>המשימות שלי - ${s.name}</h3>` + (tasksHtml || '<p>אין משימות חדשות כרגע. כל הכבוד!</p>');
        }
    }

    function saveTask(sid) {
        const title = document.getElementById('tTitle').value;
        const xp = parseInt(document.getElementById('tXP').value);
        if(!title || !xp) return;
        const tid = Date.now().toString();
        db.ref(`students/${sid}/tasks/${tid}`).set({ taskId: tid, title, rewardXP: xp, approved: false });
        closeModal();
    }

    function submitLink(sid, tid) {
        const url = document.getElementById('link-' + tid).value;
        if(!url) return;
        db.ref(`students/${sid}/tasks/${tid}`).update({ link: url });
        alert("העבודה הוגשה למורה!");
        closeModal();
    }

    function approveTask(sid, tid, reward) {
        const s = allStudents.find(x => x.id === sid);
        let nxp = s.xp + reward, nlv = s.level;
        while(nxp >= 100) { nlv++; nxp -= 100; }
        db.ref(`students/${sid}`).update({ xp: nxp, level: nlv });
        db.ref(`students/${sid}/tasks/${tid}`).remove();
        alert("המשימה אושרה!");
        closeModal();
    }

    function updateView() {
        const grid = document.getElementById('farm-grid');
        const searchTerm = document.getElementById('search').value.toLowerCase();
        const sortBy = document.getElementById('sortBy').value;
        let filtered = allStudents.filter(s => s.name.toLowerCase().includes(searchTerm));
        filtered.sort((a,b) => sortBy==='name' ? a.name.localeCompare(b.name) : b.level - a.level);

        grid.innerHTML = filtered.map(s => {
            const isShaking = (s.level===0 && s.xp>=90)?'shake':'';
            const imgPath = s.level===0 ? `images/egg${(s.egg||0)+1}.png` : `images/${s.type}${s.level>=20?3:(s.level>=10?2:1)}.png`;
            return `
                <div class="student-card">
                    <div class="level-text-badge">Lv.${s.level}</div>
                    ${userRole==='admin' ? `<button class="remove-btn" onclick="if(confirm('למחוק?')) db.ref('students/${s.id}').remove()">✖</button>` : ''}
                    <img id="img-${s.id}" src="${imgPath}" class="creature-img ${isShaking}" onclick="addXP('${s.id}',${s.xp},${s.level})">
                    <div style="font-weight:bold;font-size:1.2em;">${s.name}</div>
                    <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
                    ${userRole==='admin' ? `<button class="task-btn" onclick="openTaskModal('${s.id}')">📋</button>` : ''}
                </div>`;
        }).join('');
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
</script>
</body>
</html>
