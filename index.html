<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - גרסת הדור הבא 🌟</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- עיצוב כרטיס מתהפך --- */
        .student-card-container {
            perspective: 1000px;
            width: 240px;
            height: 350px;
            margin: 10px;
        }

        .student-card {
            width: 100%; height: 100%;
            position: relative;
            transition: transform 0.8s;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .student-card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 25px;
            padding: 20px;
            box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: rgba(255, 255, 255, 0.95);
            border-bottom: 5px solid #81c784;
        }

        .card-back {
            transform: rotateY(180deg);
            background: #f1f8e9;
            border-bottom: 5px solid #1976d2;
        }

        /* --- רכיבי הכרטיס --- */
        .creature-img { width: 100px; height: 100px; object-fit: contain; }
        .level-text-badge { position: absolute; top: 10px; right: 15px; font-weight: 900; color: #2e7d32; }
        .xp-container { background: #eee; border-radius: 10px; height: 12px; width: 100%; margin: 10px 0; overflow: hidden; }
        .xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s; }
        
        /* --- ממשק ניהול --- */
        #control-panel, #login-screen {
            background: rgba(255, 255, 255, 0.95); border-radius: 20px;
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 30px; width: 90%; max-width: 800px;
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
        }

        #farm-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; }

        button { background: #2e7d32; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        input, select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; }

        .like-btn { background: #e91e63; margin-top: 10px; font-size: 1.2em; }
        .status-input { width: 90%; margin-top: 10px; font-size: 0.9em; text-align: center; }

        /* הסתרה אוטומטית כשהרשימה ריקה */
        #tasks-area:has(#tasks-list:empty), #admin-submissions:has(#submissions-list:empty) { display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>החווה המופלאה 🐾</h2>
    <div id="student-login-area" style="width: 100%; text-align: center;">
        <select id="studentSelect" style="width: 80%;">
            <option value="">טוען רשימה...</option>
        </select>
        <input type="password" id="studentPin" placeholder="קוד (4 ספרות)" style="width: 80%; margin-top: 10px; display: none;">
        <button id="loginBtn" onclick="studentLogin()" style="width: 80%; margin-top: 10px;">כניסה לתלמיד ✨</button>
    </div>
    <hr style="width: 100%; margin: 20px 0;">
    <input type="password" id="adminPass" placeholder="סיסמת מנהל">
    <button onclick="checkAdmin()">מורה 🔑</button>
</div>

<div id="control-panel" style="display: none;">
    <input type="text" id="studentName" placeholder="שם תלמיד חדש">
    <select id="studentClass">
        <option value="ה1">ה'1</option>
        <option value="ה2">ה'2</option>
    </select>
    <button onclick="addStudent()">הוסף יצור</button>
    <button onclick="location.reload()" style="background:#555;">יציאה</button>
</div>

<div id="farm-grid"></div>

<script>
// --- הגדרות Firebase ---
const firebaseConfig = {
    apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
    authDomain: "liorfarm.firebaseapp.com",
    databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "liorfarm",
    storageBucket: "liorfarm.firebasestorage.app",
    messagingSenderId: "436063422896",
    appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let allStudents = [];
let currentUser = null;

// האזנה לרשימת תלמידים
db.ref('students').on('value', (snap) => {
    const data = snap.val();
    allStudents = data ? Object.values(data) : [];
    const select = document.getElementById('studentSelect');
    select.innerHTML = '<option value="">בחר שם...</option>';
    allStudents.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.name} (${s.className})`;
        select.appendChild(opt);
    });
    updateView();
});

document.getElementById('studentSelect').addEventListener('change', function() {
    document.getElementById('studentPin').style.display = this.value ? 'inline-block' : 'none';
});

function checkAdmin() {
    if (document.getElementById('adminPass').value === 'rabenu247') {
        currentUser = 'admin';
        startApp();
    } else { alert('סיסמה שגויה'); }
}

function studentLogin() {
    const id = document.getElementById('studentSelect').value;
    const pin = document.getElementById('studentPin').value;
    const student = allStudents.find(s => s.id === id);
    
    if (student && (student.pin === pin || (!student.pin && pin === "1234"))) {
        currentUser = id;
        startApp();
    } else { alert('קוד שגוי או לא הוזן'); }
}

function startApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('farm-grid').style.display = 'grid';
    if (currentUser === 'admin') document.getElementById('control-panel').style.display = 'flex';
    updateView();
}

function addStudent() {
    const name = document.getElementById('studentName').value;
    if (!name) return;
    const id = Date.now().toString();
    db.ref('students/' + id).set({
        id, name, className: document.getElementById('studentClass').value,
        xp: 0, level: 0, pin: "1234", likes: 0, status: "היצור שלי הכי חזק!",
        type: 'cat', egg: 1
    });
}

function flipCard(cardElement) {
    cardElement.classList.toggle('is-flipped');
}

function updateStatus(id, newStatus) {
    db.ref(`students/${id}`).update({ status: newStatus });
}

function addLike(id, event) {
    event.stopPropagation(); // מונע מהכרטיס להתהפך חזרה
    const student = allStudents.find(s => s.id === id);
    db.ref(`students/${id}`).update({ likes: (student.likes || 0) + 1 });
}

function updateView() {
    const grid = document.getElementById('farm-grid');
    if (!grid || !currentUser) return;

    grid.innerHTML = allStudents.map(s => {
        const isMine = currentUser === s.id;
        const imgPath = s.level === 0 ? `images/egg1.png` : `images/${s.type}1.png`;
        
        return `
        <div class="student-card-container">
            <div class="student-card" id="card-${s.id}" onclick="flipCard(this)">
                <div class="card-face">
                    <div class="level-text-badge">Lv.${s.level}</div>
                    <img src="${imgPath}" class="creature-img">
                    <div style="font-weight:bold;">${s.name}</div>
                    <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
                    <div style="font-size:0.8em;">❤️ לייקים: ${s.likes || 0}</div>
                    ${isMine ? '<div style="color: gold;">⭐ זה אני!</div>' : ''}
                </div>
                <div class="card-face card-back">
                    <h4>על היצור שלי:</h4>
                    ${isMine ? 
                        `<input type="text" class="status-input" value="${s.status || ''}" 
                          onclick="event.stopPropagation()" 
                          onchange="updateStatus('${s.id}', this.value)">` :
                        `<p>"${s.status || 'אין תיאור'}"</p>`
                    }
                    <button class="like-btn" onclick="addLike('${s.id}', event)">❤️ לייק!</button>
                    <div style="margin-top:auto; font-size:0.7em;">כיתה ${s.className}</div>
                </div>
            </div>
        </div>`;
    }).join('');
}
</script>
</body>
</html>
