<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - THE SHOW</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #ffeb3b;
            --gold: #ffd700;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* פאנל שליטה מעוצב */
        #control-panel {
            background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); margin-bottom: 40px; 
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center;
            border: 3px solid var(--primary); backdrop-filter: blur(5px);
        }

        #farm-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; width: 100%; max-width: 1100px;
        }

        /* --- הכרטיס המנצח --- */
        .student-card {
            background: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 20px; text-align: center;
            position: relative; box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
            overflow: hidden;
        }

        /* אנימציית נשימה קבועה - הופך את החווה לחיים */
        .creature-img { 
            width: 100px; height: 100px; cursor: pointer; 
            object-fit: contain;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2));
            animation: breathe 3s ease-in-out infinite;
            transition: all 0.1s !important;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); filter: brightness(1.1); }
        }

        /* האפקט בזמן לחיצה - SHOW! */
        .creature-img:active {
            transform: scale(1.4) rotate(5deg) !important;
            filter: brightness(1.5) drop-shadow(0 0 25px var(--gold)) !important;
        }

        /* הבהוב של כל הכרטיס בלחיצה */
        .flash-card { animation: flash-white 0.4s; }
        @keyframes flash-white {
            0% { background: white; }
            50% { background: var(--accent); transform: translateY(-5px); }
            100% { background: white; }
        }

        /* רעידה חזקה לביצה שבוקעת */
        .egg-shake { animation: intense-shake 0.4s infinite; }
        @keyframes intense-shake {
            0% { transform: rotate(0) scale(1.05); }
            25% { transform: rotate(8deg); }
            75% { transform: rotate(-8deg); }
            100% { transform: rotate(0); }
        }

        /* עיצוב ה-XP */
        .xp-container { background: #ddd; border-radius: 15px; height: 16px; margin: 12px 0; overflow: hidden; border: 2px solid #bbb; }
        .xp-bar { 
            background: linear-gradient(90deg, #f4d03f, #f39c12); 
            height: 100%; 
            transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); 
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.5);
        }
        
        .level-badge { 
            position: absolute; top: 10px; right: 15px; font-weight: 900; 
            color: var(--primary); font-size: 1.3em;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        input, select { border: 2px solid #ddd; padding: 10px; border-radius: 15px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        button { 
            padding: 10px 20px; border-radius: 15px; border: none; 
            background: var(--primary); color: white; font-weight: bold; 
            cursor: pointer; box-shadow: 0 4px 0 #1b5e20;
        }
        button:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

<div id="control-panel">
    <input type="text" id="nameIn" placeholder="שם התלמיד/ה">
    <select id="classIn"><option value="ה1">ה'1</option><option value="ה2">ה'2</option></select>
    <button onclick="add()">צרף יצור ✨</button>
    <button onclick="document.getElementById('fileIn').click()" style="background:#ff9800; box-shadow: 0 4px 0 #e68a00;">⬆️ טען גיבוי</button>
    <input type="file" id="fileIn" style="display:none" onchange="importData(this)">
</div>

<div id="farm-grid"></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
      authDomain: "liorfarm.firebaseapp.com",
      databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "liorfarm",
      storageBucket: "liorfarm.firebasestorage.app",
      messagingSenderId: "436063422896",
      appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const CREATURES = ['trt', 'snk', 'hnd', 'cat', 'crw', 'fsh', 'chk', 'fox', 'zbr', 'mnk', 'shp', 'cow', 'ost', 'rbt', 'dnk', 'duk', 'snl', 'owl', 'spd'];
    const EGGS = ['images/egg1.png', 'images/egg2.png', 'images/egg3.png', 'images/egg4.png', 'images/egg5.png'];

    db.ref('students').on('value', (snap) => {
        const data = snap.val();
        render(data ? Object.values(data) : []);
    });

    function add() {
        const name = document.getElementById('nameIn').value;
        if (!name) return;
        const id = Date.now().toString();
        db.ref('students/' + id).set({
            id, name, className: document.getElementById('classIn').value,
            xp: 0, level: 0,
            type: CREATURES[Math.floor(Math.random() * CREATURES.length)],
            egg: Math.floor(Math.random() * EGGS.length)
        });
        document.getElementById('nameIn').value = '';
    }

    function addXP(id, xp, lvl) {
        // הוספת אפקט פלאש לכרטיס
        const card = document.getElementById('card-' + id);
        card.classList.remove('flash-card');
        void card.offsetWidth;
        card.classList.add('flash-card');

        let nxp = xp + 10;
        let nlv = lvl;
        if (nxp >= 100) { nlv++; nxp = 0; }
        db.ref('students/' + id).update({ xp: nxp, level: nlv });
    }

    function render(list) {
        document.getElementById('farm-grid').innerHTML = list.map(s => {
            const isShaking = (s.level === 0 && s.xp >= 90) ? 'egg-shake' : '';
            const imgPath = s.level === 0 ? EGGS[s.egg] : `images/${s.type}${s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1)}.png`;
            return `
                <div class="student-card" id="card-${s.id}">
                    <div class="level-badge">Lv.${s.level}</div>
                    <img id="img-${s.id}" src="${imgPath}" class="creature-img ${isShaking}" 
                         onmousedown="addXP('${s.id}', ${s.xp}, ${s.level})" 
                         ontouchstart="addXP('${s.id}', ${s.xp}, ${s.level})">
                    <div style="font-weight:900; font-size: 16px; color:#333; margin-top:10px;">${s.name}</div>
                    <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
                </div>
            `;
        }).join('');
    }

    function importData(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const data = JSON.parse(reader.result);
            const list = Array.isArray(data) ? data : (JSON.parse(data.farmData) || []);
            list.forEach(s => db.ref('students/' + s.id).set({
                id: s.id, name: s.name, className: s.className,
                xp: s.xp, level: s.level, type: s.type || s.creatureType,
                egg: s.egg !== undefined ? s.egg : (s.eggIndex || 0)
            }));
        };
        reader.readAsText(input.files[0]);
    }
</script>
</body>
</html>
