<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - STAR SHOW</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        #control-panel {
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 25px; 
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            border: 2px solid #81c784;
        }

        input, select { padding: 8px; border-radius: 10px; border: 1px solid #ccc; }
        button { padding: 8px 15px; border-radius: 10px; border: none; background: #2e7d32; color: white; font-weight: bold; cursor: pointer; }

        #farm-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; width: 100%; max-width: 1000px;
        }

        .student-card {
            background: white; border-radius: 20px; padding: 15px; text-align: center;
            position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: visible; /* מאפשר לכוכבים לצאת מגבולות הכרטיס */
        }

        .creature-img { 
            width: 100px; height: 100px; cursor: pointer; 
            object-fit: contain;
            transition: transform 0.1s ease-out, filter 0.1s ease-out;
            position: relative; z-index: 1;
        }

        /* זהירה וגדילה בזמן לחיצה */
        .creature-img:active {
            transform: scale(1.3) !important;
            filter: brightness(1.3) drop-shadow(0 0 15px #ffeb3b) !important;
        }

        /* רעידה רק לביצים כמעט מוכנות */
        .egg-shake { animation: shake-intense 0.5s infinite; }
        @keyframes shake-intense {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        /* --- אנימציית הכוכבים (STAR SHOW) --- */
        .star-particle {
            position: absolute;
            color: #ffd700; /* צבע זהב */
            font-size: 20px;
            opacity: 0;
            pointer-events: none; /* לא מפריע ללחיצות */
            z-index: 10;
            animation: star-burst 0.6s ease-out forwards;
        }

        @keyframes star-burst {
            0% {
                transform: translate(-50%, -50%) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(1.2) rotate(var(--rot));
                opacity: 0;
            }
        }

        .xp-container { background: #eee; border-radius: 10px; height: 14px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        .xp-bar { 
            background: linear-gradient(90deg, #fbc02d, #ffeb3b); 
            height: 100%; 
            transition: width 0.4s ease-in-out; 
        }

        .level-badge { position: absolute; top: 10px; right: 12px; font-weight: bold; color: #2e7d32; font-size: 1.1em; }
        .remove-btn { position: absolute; top: 5px; left: 5px; background: #ff5252; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; opacity: 0.2; }
        .remove-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<div id="control-panel">
    <input type="text" id="nameIn" placeholder="שם">
    <select id="classIn"><option value="ה1">ה'1</option><option value="ה2">ה'2</option></select>
    <button onclick="add()">הוסף ✨</button>
    <button onclick="document.getElementById('f').click()" style="background:#ff9800">⬆️ ייבוא</button>
    <input type="file" id="f" style="display:none" onchange="importData(this)">
</div>

<div id="farm-grid"></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
      authDomain: "liorfarm.firebaseapp.com",
      databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "liorfarm",
      storageBucket: "liorfarm.firebasestorage.app",
      messagingSenderId: "436063422896",
      appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const CREATURES = ['trt', 'snk', 'hnd', 'cat', 'crw', 'fsh', 'chk', 'fox', 'zbr', 'mnk', 'shp', 'cow', 'ost', 'rbt', 'dnk', 'duk', 'snl', 'owl', 'spd'];
    const EGGS = ['images/egg1.png', 'images/egg2.png', 'images/egg3.png', 'images/egg4.png', 'images/egg5.png'];

    db.ref('students').on('value', (snap) => {
        const data = snap.val();
        render(data ? Object.values(data) : []);
    });

    function add() {
        const name = document.getElementById('nameIn').value;
        if (!name) return;
        const id = Date.now().toString();
        db.ref('students/' + id).set({
            id, name, className: document.getElementById('classIn').value,
            xp: 0, level: 0,
            type: CREATURES[Math.floor(Math.random() * CREATURES.length)],
            egg: Math.floor(Math.random() * EGGS.length)
        });
        document.getElementById('nameIn').value = '';
    }

    // פונקציה ליצירת אפקט הכוכבים
    function createStarBurst(cardElement) {
        const numStars = 8;
        const cardRect = cardElement.getBoundingClientRect();
        const centerX = cardRect.width / 2;
        const centerY = cardRect.height / 3; // מיקום מעל הדמות

        for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            star.className = 'star-particle';
            star.innerHTML = '★'; // סמל של כוכב

            // חישוב כיוון אקראי לכל כוכב
            const angle = (i / numStars) * Math.PI * 2;
            const velocity = 50 + Math.random() * 50; // מהירות פיזור
            const dx = Math.cos(angle) * velocity;
            const dy = Math.sin(angle) * velocity;
            const rot = Math.random() * 360; // זווית סיבוב אקראית

            // הגדרת משתני CSS עבור האנימציה
            star.style.setProperty('--dx', `${dx}px`);
            star.style.setProperty('--dy', `${dy}px`);
            star.style.setProperty('--rot', `${rot}deg`);

            // מיקום התחלתי במרכז הכרטיס
            star.style.left = `${centerX}px`;
            star.style.top = `${centerY}px`;

            cardElement.appendChild(star);

            // הסרת הכוכב אחרי שהאנימציה מסתיימת
            setTimeout(() => {
                star.remove();
            }, 600);
        }
    }

    function addXP(id, xp, lvl) {
        // הפעלת אפקט הכוכבים על הכרטיס המתאים
        const card = document.getElementById('card-' + id);
        if(card) {
            createStarBurst(card);
        }

        let nxp = xp + 10;
        let nlv = lvl;
        if (nxp >= 100) { nlv++; nxp = 0; }
        db.ref('students/' + id).update({ xp: nxp, level: nlv });
    }

    function render(list) {
        document.getElementById('farm-grid').innerHTML = list.map(s => {
            const isShaking = (s.level === 0 && s.xp >= 90) ? 'egg-shake' : '';
            const imgPath = s.level === 0 ? EGGS[s.egg] : `images/${s.type}${s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1)}.png`;
            return `
                <div class="student-card" id="card-${s.id}">
                    <div class="level-badge">Lv.${s.level}</div>
                    <button class="remove-btn" onclick="del('${s.id}')">×</button>
                    <img id="img-${s.id}" src="${imgPath}" class="creature-img ${isShaking}" 
                         onmousedown="addXP('${s.id}', ${s.xp}, ${s.level})" 
                         ontouchstart="addXP('${s.id}', ${s.xp}, ${s.level})">
                    <div style="font-weight:bold; font-size: 15px; margin-top:8px;">${s.name}</div>
                    <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
                </div>
            `;
        }).join('');
    }

    function del(id) { if(confirm("למחוק?")) db.ref('students/' + id).remove(); }

    function importData(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const data = JSON.parse(reader.result);
            const list = Array.isArray(data) ? data : (JSON.parse(data.farmData) || []);
            list.forEach(s => db.ref('students/' + s.id).set({
                id: s.id, name: s.name, className: s.className,
                xp: s.xp, level: s.level, type: s.type || s.creatureType,
                egg: s.egg !== undefined ? s.egg : (s.eggIndex || 0)
            }));
        };
        reader.readAsText(input.files[0]);
    }
</script>
</body>
</html>
