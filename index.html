<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>חוות הטמגוצ'י</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

body{
font-family:'Segoe UI',Tahoma,sans-serif;
background:#e0f7fa url('images/background.png') no-repeat center center fixed;
background-size:cover;
margin:0;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

#control-panel{
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
margin-bottom:30px;
width:90%;
max-width:900px;
display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;
border:2px solid #81c784;
}

input,select,button{
padding:12px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

button{
background-color:#2e7d32;
color:white;
cursor:pointer;
border:none;
font-weight:bold;
}

#farm-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:25px;
width:100%;
max-width:1200px;
}

.student-card{
background:rgba(255,255,255,0.9);
border-radius:25px;
padding:20px;
text-align:center;
position:relative;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
border-bottom:5px solid #81c784;
}

.level-text-badge{
position:absolute;
top:5px;
right:15px;
font-family:'Arial Black',sans-serif;
font-size:1.4em;
font-weight:900;
color:#2e7d32;
z-index:10;
}

.creature-img{
width:120px;
height:120px;
cursor:pointer;
object-fit:contain;
margin-bottom:10px;
transition:transform 0.1s;
}

.glow-effect{
animation:glow-pulse 0.6s ease-out;
}

@keyframes glow-pulse{
0%{filter:brightness(1);transform:scale(1);}
50%{filter:brightness(1.6) drop-shadow(0 0 15px gold);transform:scale(1.25);}
100%{filter:brightness(1);transform:scale(1);}
}

.shake{animation:shake 0.5s infinite;}

@keyframes shake{
0%,100%{transform:translate(1px,1px);}
25%{transform:translate(-1px,-2px);}
75%{transform:translate(1px,-2px);}
}

.xp-container{
background:#eee;
border-radius:10px;
height:18px;
margin:10px 0;
overflow:hidden;
border:1px solid #ccc;
}

.xp-bar{
background:linear-gradient(90deg,#ffeb3b,#fbc02d);
height:100%;
transition:width 0.4s ease-out;
}

.remove-btn{
position:absolute;
top:10px;
left:10px;
background:#ff5252;
color:white;
border:none;
border-radius:50%;
width:28px;
height:28px;
cursor:pointer;
}

.xp-float{
position:absolute;
font-weight:bold;
color:gold;
font-size:1.2em;
animation:floatUp 0.8s ease-out forwards;
pointer-events:none;
left:50%;
top:60px;
transform:translateX(-50%);
}

@keyframes floatUp{
0%{opacity:1;transform:translate(-50%,0);}
100%{opacity:0;transform:translate(-50%,-40px);}
}

.submission-icon{
position:absolute;
bottom:10px;
right:10px;
background:#4caf50;
color:white;
width:24px;
height:24px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-content{
background:white;
padding:25px;
border-radius:15px;
width:400px;
max-height:80vh;
overflow:auto;
}

#login-screen{
position:fixed;
inset:0;
background:#e0f7fa;
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

</style>
</head>

<body>

<div id="login-screen">
<div class="modal-content">

<h2>כניסה לחווה</h2>

<select id="studentSelect">
<option value="">בחר תלמיד</option>
</select>

<br><br>

<input type="password" id="adminPass" placeholder="סיסמת מנהל">

<br><br>

<button onclick="login()">כניסה</button>

</div>
</div>


<div id="control-panel">

<input type="text" id="studentName" placeholder="שם התלמיד">

<select id="studentClass">
<option value="ה1">כיתה ה'1</option>
<option value="ה2">כיתה ה'2</option>
</select>

<button onclick="addStudent()">צרף יצור לחווה</button>

<button onclick="openTaskCreator()">משימה חדשה</button>

</div>


<div id="farm-grid"></div>


<div id="tasksWindow" class="modal">
<div class="modal-content">

<h3>משימות</h3>

<div id="tasksList"></div>

</div>
</div>


<div id="taskModal" class="modal">
<div class="modal-content">

<h3>משימה חדשה</h3>

<input id="taskTitle" placeholder="שם משימה"><br><br>

<input id="taskXP" type="number" placeholder="XP"><br><br>

<input id="taskDue" type="date"><br><br>

<a href="https://send.magicode.me/" target="_blank">העלה קובץ משימה</a><br><br>

<input id="taskLink" placeholder="הדבק לינק למשימה"><br><br>

<button onclick="createTask()">שמור</button>

</div>
</div>


<div id="submissionModal" class="modal">
<div class="modal-content">

<h3>בדיקת משימה</h3>

<div id="submissionContent"></div>

</div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
authDomain:"liorfarm.firebaseapp.com",
databaseURL:"https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"liorfarm"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const CREATURE_TYPES=['trt','snk','hnd','cat','crw','fsh','chk','fox','zbr','mnk','shp','cow','ost','rbt','dnk','duk','snl','owl','spd'];

let allStudents=[];
let tasks=[];
let submissions={};

let currentUser=null;
let isAdmin=false;

db.ref('students').on('value',(snap)=>{
allStudents=snap.val()?Object.values(snap.val()):[];
updateView();
populateStudentLogin();
});

db.ref('tasks').on('value',(snap)=>{
tasks=snap.val()?Object.values(snap.val()):[];
});

db.ref('submissions').on('value',(snap)=>{
submissions=snap.val()||{};
});

function login(){

const pass=document.getElementById("adminPass").value;

if(pass==="rabenu247"){
isAdmin=true;
currentUser="admin";
}

else{

const id=document.getElementById("studentSelect").value;

if(!id){
alert("בחר תלמיד");
return;
}

currentUser=id;

}

document.getElementById("login-screen").style.display="none";

}

function populateStudentLogin(){

const select=document.getElementById("studentSelect");

select.innerHTML='<option value="">בחר תלמיד</option>';

allStudents.forEach(s=>{
select.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
});

}

function addStudent(){

const name=document.getElementById('studentName').value;

if(!name)return;

const id=Date.now().toString();

db.ref('students/'+id).set({
id,
name,
className:document.getElementById('studentClass').value,
xp:0,
level:0,
type:CREATURE_TYPES[Math.floor(Math.random()*CREATURE_TYPES.length)]
});

}

function creatureClick(id,xp,lvl){

if(isAdmin){
addXP(id,xp,lvl);
}

else{

if(id!==currentUser){
alert("זו לא הדמות שלך");
return;
}

openTasks();

}

}

function addXP(id,xp,lvl){

const img=document.getElementById('img-'+id);

if(img){
img.classList.remove('glow-effect');
requestAnimationFrame(()=>img.classList.add('glow-effect'));
}

let nxp=xp+10;
let nlv=lvl;

if(nxp>=100){
nlv++;
nxp=0;
}

db.ref('students/'+id).update({
xp:nxp,
level:nlv
});

}

function openTasks(){

let html="";

tasks.forEach(t=>{

if(submissions[currentUser] && submissions[currentUser][t.id]){
html+=`<div>✔ ${t.title} (הוגש)</div>`;
return;
}

html+=`

<div style="border-bottom:1px solid #ddd;padding:10px">

<b>${t.title}</b><br>
XP: ${t.xp}<br>
עד: ${t.due}<br>

<a href="${t.fileLink}" target="_blank">הורד משימה</a><br><br>

<a href="https://send.magicode.me/" target="_blank">העלה קובץ</a><br>

<input id="sub-${t.id}" placeholder="הדבק לינק להגשה"><br>

<button onclick="submitTask('${t.id}')">הגש</button>

</div>

`;

});

document.getElementById("tasksList").innerHTML=html;
document.getElementById("tasksWindow").style.display="flex";

}

function submitTask(taskId){

const link=document.getElementById("sub-"+taskId).value;

db.ref(`submissions/${currentUser}/${taskId}`).set({
link,
status:"pending"
});

alert("המשימה נשלחה");

}

function openTaskCreator(){
document.getElementById("taskModal").style.display="flex";
}

function createTask(){

const id=Date.now().toString();

db.ref("tasks/"+id).set({
id,
title:document.getElementById("taskTitle").value,
xp:parseInt(document.getElementById("taskXP").value),
due:document.getElementById("taskDue").value,
fileLink:document.getElementById("taskLink").value
});

document.getElementById("taskModal").style.display="none";

}

function openSubmission(studentId){

if(!isAdmin)return;

const studentSubs=submissions[studentId];

let html="";

for(const taskId in studentSubs){

const sub=studentSubs[taskId];

const task=tasks.find(t=>t.id===taskId);

if(!task)continue;

html+=`

<div style="border-bottom:1px solid #ddd;padding:10px">

<b>${task.title}</b><br><br>

<a href="${sub.link}" target="_blank">פתח קובץ</a>

<br><br>

<button onclick="approveTask('${studentId}','${taskId}',1)">
אישור מלא
</button>

<button onclick="approveTask('${studentId}','${taskId}',0.5)">
אישור חלקי
</button>

</div>

`;

}

document.getElementById("submissionContent").innerHTML=html;
document.getElementById("submissionModal").style.display="flex";

}

function approveTask(studentId,taskId,ratio){

const task=tasks.find(t=>t.id===taskId);

const xpEarned=Math.floor(task.xp*ratio);

db.ref('students/'+studentId).once('value').then(snap=>{

const s=snap.val();

let nxp=s.xp+xpEarned;
let nlv=s.level;

while(nxp>=100){
nxp-=100;
nlv++;
}

db.ref('students/'+studentId).update({
xp:nxp,
level:nlv
});

});

db.ref(`submissions/${studentId}/${taskId}/status`).set("approved");

}

function updateView(){

const grid=document.getElementById('farm-grid');

grid.innerHTML=allStudents.map(s=>{

const submitted=submissions[s.id];

const imgPath=`images/${s.type}${s.level>=20?3:(s.level>=10?2:1)}.png`;

return`

<div class="student-card">

<div class="level-text-badge">Lv.${s.level}</div>

<img id="img-${s.id}" src="${imgPath}"
class="creature-img"
onclick="creatureClick('${s.id}',${s.xp},${s.level})">

<div style="font-weight:bold">${s.name}</div>

<div class="xp-container">
<div class="xp-bar" style="width:${s.xp}%"></div>
</div>

${submitted?`<div class="submission-icon" onclick="openSubmission('${s.id}')">✔</div>`:''}

</div>

`;

}).join('');

}

</script>

</body>
</html>
