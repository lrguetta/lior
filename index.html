<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>חוות הטמגוצ'י - גרסת למידה אינטראקטיבית</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: #e0f7fa url('images/background.png') no-repeat center center fixed;
        background-size: cover;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    #login-screen {
        background: rgba(255, 255, 255, 0.95);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
        width: 320px;
        margin-top: 50px;
        border: 2px solid #81c784;
    }

    #control-panel {
        display: none; 
        background: rgba(255, 255, 255, 0.95);
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        margin-bottom: 30px;
        width: 90%;
        max-width: 900px;
        flex-direction: column;
        gap: 15px;
        border: 2px solid #81c784;
    }

    input, select, button, textarea {
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-size: 15px;
        font-family: inherit;
    }

    button {
        background-color: #2e7d32;
        color: white;
        cursor: pointer;
        border: none;
        font-weight: bold;
    }

    #farm-grid {
        display: none;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 25px;
        width: 100%;
        max-width: 1200px;
    }

    .student-card {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 25px;
        padding: 20px;
        text-align: center;
        position: relative;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        border-bottom: 5px solid #81c784;
        transition: transform 0.3s;
    }

    .my-creature { border: 4px solid #fbc02d; transform: scale(1.05); z-index: 5; }

    .level-text-badge {
        position: absolute;
        top: 5px;
        right: 15px;
        font-family: 'Arial Black', sans-serif;
        font-size: 1.4em;
        font-weight: 900;
        color: #2e7d32;
        z-index: 10;
        text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3);
    }

    .creature-img {
        width: 120px;
        height: 120px;
        object-fit: contain;
        margin-bottom: 10px;
    }

    .xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
    .xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }

    #tasks-area { width: 90%; max-width: 1200px; margin-bottom: 20px; display: none; }
    .task-card {
        background: white;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 10px;
        border-right: 6px solid #1976d2;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .question-item {
        background: white;
        padding: 15px;
        border: 1px solid #81c784;
        margin-bottom: 10px;
        border-radius: 8px;
        position: relative;
        text-align: right;
    }
</style>
</head>

<body>

<div id="login-screen">
    <h2>החווה המופלאה 🐾</h2>
    <div id="admin-login-area">
        <input type="password" id="adminPass" placeholder="סיסמת מנהל" style="width:80%; margin-bottom:10px;">
        <button onclick="checkAdmin()" style="width:90%;">כניסת מנהל 🔑</button>
    </div>
    <hr style="margin:20px 0;">
    <div id="student-login-area">
        <p>כניסת תלמידים:</p>
        <select id="studentSelect" style="width:90%; margin-bottom:10px;">
            <option value="">טוען רשימה...</option>
        </select>
        <button onclick="studentLogin()" style="width:90%; background-color:#1976d2;">אני רוצה להיכנס! ✨</button>
    </div>
</div>

<div id="control-panel">
    <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <input type="text" id="studentName" placeholder="שם התלמיד">
        <select id="studentClass">
            <option value="ה1">כיתה ה'1</option>
            <option value="ה2">כיתה ה'2</option>
        </select>
        <button onclick="addStudent()">צרף יצור לחווה 🐾</button>
    </div>

    <hr style="width:100%;">

    <div style="background:#f1f8e9; padding:15px; border-radius:10px; border:1px solid #c5e1a5;">
        <h4 style="margin-top:0;">יצירת מטלה חדשה 📋</h4>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="taskTitle" placeholder="כותרת המטלה" style="flex:2;">
            <input type="date" id="taskDeadline" style="flex:1;">
            <input type="number" id="taskXP" placeholder="XP" value="20" style="width:70px;">
        </div>
        
        <div id="questions-constructor"></div>

        <div style="display:flex; gap:10px; margin-top:10px;">
            <select id="questionType">
                <option value="open">שאלה פתוחה</option>
                <option value="multiple">ברירה מרובה</option>
                <option value="boolean">נכון/לא נכון</option>
            </select>
            <button onclick="addQuestionField()" style="background:#0288d1;">הוסף שאלה +</button>
            <button onclick="saveTask()" style="background:#1976d2; margin-right:auto;">פרסם מטלה 🚀</button>
        </div>
    </div>

    <div id="admin-submissions" style="margin-top:20px; background:#fff3e0; padding:15px; border-radius:10px; border:1px dashed #ff9800;">
        <h4 style="margin:0 0 10px 0;">הגשות שממתינות לבדיקה 📥</h4>
        <div id="submissions-list">אין הגשות חדשות</div>
    </div>
</div>

<div id="tasks-area">
    <h3>משימות להשלמה 📝</h3>
    <div id="tasks-list"></div>
</div>

<div id="farm-grid"></div>

<div id="submit-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:15px; box-shadow:0 0 30px rgba(0,0,0,0.5); z-index:1000; width:90%; max-width:500px; max-height:80vh; overflow-y:auto; border:3px solid #1976d2;">
    <h3 id="modal-task-title">שם המטלה</h3>
    <div id="questions-display" style="text-align:right; margin-bottom:20px;"></div>
    <div style="display:flex; gap:10px;">
        <button onclick="sendSubmission()" style="flex:1; background:#4caf50;">שלח הגשה 🚀</button>
        <button onclick="closeModal()" style="flex:1; background:#999;">ביטול</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
    authDomain: "liorfarm.firebaseapp.com",
    databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "liorfarm",
    storageBucket: "liorfarm.firebasestorage.app",
    messagingSenderId: "436063422896",
    appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CREATURE_TYPES = ['trt','snk','hnd','cat','crw','fsh','chk','fox','zbr','mnk','shp','cow','ost','rbt','dnk','duk','snl','owl','spd'];
let allStudents = [];
let allTasks = [];
let currentUser = null;
let currentTaskToSubmit = null;

// האזנה לתלמידים
db.ref('students').on('value', (snap) => {
    const data = snap.val();
    allStudents = data ? Object.values(data) : [];
    const select = document.getElementById('studentSelect');
    select.innerHTML = '<option value="">בחר את שמך...</option>';
    allStudents.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.name} (${s.className})`;
        select.appendChild(opt);
    });
    updateView();
});

// האזנה למטלות
db.ref('tasks').on('value', (snap) => {
    const data = snap.val();
    allTasks = data ? Object.values(data) : [];
    renderTasks();
});

function checkAdmin() {
    if (document.getElementById('adminPass').value === 'rabenu247') {
        currentUser = 'admin';
        startApp();
    } else { alert('סיסמה שגויה'); }
}

function studentLogin() {
    const id = document.getElementById('studentSelect').value;
    if (!id) return alert('בחר שם מהרשימה');
    currentUser = id;
    startApp();
}

function startApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('farm-grid').style.display = 'grid';
    document.getElementById('tasks-area').style.display = 'block';
    if (currentUser === 'admin') {
        document.getElementById('control-panel').style.display = 'flex';
        initAdminSubmissions();
    }
    updateView();
}

function addStudent() {
    const name = document.getElementById('studentName').value;
    if (!name) return;
    const id = Date.now().toString();
    db.ref('students/' + id).set({
        id, name, className: document.getElementById('studentClass').value,
        xp: 0, level: 0,
        type: CREATURE_TYPES[Math.floor(Math.random() * CREATURE_TYPES.length)],
        egg: Math.floor(Math.random() * 5)
    });
    document.getElementById('studentName').value = '';
}

function updateView() {
    const grid = document.getElementById('farm-grid');
    if (!currentUser) return;
    grid.innerHTML = allStudents.map(s => {
        const isMine = currentUser === s.id;
        const eggNum = (s.egg !== undefined) ? s.egg + 1 : 1;
        const imgPath = s.level === 0 ? `images/egg${eggNum}.png` : `images/${s.type}${s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1)}.png`;
        return `
        <div class="student-card ${isMine ? 'my-creature' : ''}">
            <div class="level-text-badge">Lv.${s.level}</div>
            <img src="${imgPath}" class="creature-img">
            <div style="font-weight:bold;">${s.name}</div>
            <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
            ${currentUser === 'admin' ? `<button onclick="db.ref('students/${s.id}').remove()" style="background:red; padding:2px 8px; font-size:10px;">מחק</button>` : ''}
        </div>`;
    }).join('');
}

// --- לוגיקת מטלות ---

function addQuestionField() {
    const type = document.getElementById('questionType').value;
    const container = document.getElementById('questions-constructor');
    const qDiv = document.createElement('div');
    qDiv.className = 'question-item';
    qDiv.dataset.type = type;

    let html = `<button onclick="this.parentElement.remove()" style="position:absolute; left:5px; top:5px; background:red;">X</button>`;
    html += `<strong>שאלה ${type}:</strong><br><input type="text" class="q-text" placeholder="השאלה..." style="width:90%; margin-top:5px;">`;

    if (type === 'multiple') {
        html += `<div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:5px;">
            <input type="text" placeholder="תשובה נכונה" class="opt-correct" style="border:1px solid green;">
            <input type="text" placeholder="טעות 1" class="opt">
            <input type="text" placeholder="טעות 2" class="opt">
            <input type="text" placeholder="טעות 3" class="opt">
        </div>`;
    } else if (type === 'boolean') {
        html += `<br>תשובה נכונה: <select class="q-ans-bool"><option value="true">נכון</option><option value="false">לא נכון</option></select>`;
    }
    qDiv.innerHTML = html;
    container.appendChild(qDiv);
}

function saveTask() {
    const title = document.getElementById('taskTitle').value;
    const xp = parseInt(document.getElementById('taskXP').value) || 20;
    const qNodes = document.querySelectorAll('.question-item');
    if (!title || qNodes.length === 0) return alert("חסר כותרת או שאלות");

    const questions = Array.from(qNodes).map(node => {
        const type = node.dataset.type;
        const qObj = { type, text: node.querySelector('.q-text').value };
        if (type === 'multiple') {
            qObj.correct = node.querySelector('.opt-correct').value;
            qObj.others = Array.from(node.querySelectorAll('.opt')).map(i => i.value).filter(v => v);
        } else if (type === 'boolean') {
            qObj.correct = node.querySelector('.q-ans-bool').value;
        }
        return qObj;
    });

    const id = Date.now().toString();
    db.ref('tasks/' + id).set({ id, title, xp, questions, deadline: document.getElementById('taskDeadline').value });
    document.getElementById('questions-constructor').innerHTML = '';
    document.getElementById('taskTitle').value = '';
}

function renderTasks() {
    const list = document.getElementById('tasks-list');
    if (!list) return;
    list.innerHTML = allTasks.map(task => `
        <div class="task-card">
            <div><strong>${task.title}</strong><br><small>${task.xp} XP</small></div>
            <button onclick="${currentUser === 'admin' ? `db.ref('tasks/${task.id}').remove()` : `openSubmitModal('${task.id}', '${task.title}')`}">${currentUser === 'admin' ? 'מחק' : 'פתח משימה'}</button>
        </div>
    `).join('');
}

function openSubmitModal(id, title) {
    currentTaskToSubmit = id;
    const task = allTasks.find(t => t.id === id);
    document.getElementById('modal-task-title').innerText = title;
    const container = document.getElementById('questions-display');
    container.innerHTML = task.questions.map((q, i) => {
        let inputHtml = '';
        if (q.type === 'open') inputHtml = `<textarea class="ans-${i}" style="width:100%"></textarea>`;
        else if (q.type === 'boolean') inputHtml = `<label><input type="radio" name="q${i}" value="true"> נכון</label> <label><input type="radio" name="q${i}" value="false"> לא נכון</label>`;
        else {
            const opts = [q.correct, ...q.others].sort(() => Math.random() - 0.5);
            inputHtml = opts.map(o => `<label style="display:block"><input type="radio" name="q${i}" value="${o}"> ${o}</label>`).join('');
        }
        return `<div style="margin-bottom:15px;"><strong>${i+1}. ${q.text}</strong><br>${inputHtml}</div>`;
    }).join('');
    document.getElementById('submit-modal').style.display = 'block';
}

function closeModal() { document.getElementById('submit-modal').style.display = 'none'; }

function sendSubmission() {
    const task = allTasks.find(t => t.id === currentTaskToSubmit);
    const answers = task.questions.map((q, i) => {
        let val = '';
        if (q.type === 'open') val = document.querySelector(`.ans-${i}`).value;
        else {
            const sel = document.querySelector(`input[name="q${i}"]:checked`);
            val = sel ? sel.value : 'לא ענה';
        }
        return { q: q.text, a: val };
    });

    const student = allStudents.find(s => s.id === currentUser);
    db.ref('submissions/' + Date.now()).set({
        studentName: student.name, studentId: student.id,
        taskId: task.id, answers
    });
    alert("נשלח!");
    closeModal();
}

function initAdminSubmissions() {
    db.ref('submissions').on('value', (snap) => {
        const list = document.getElementById('submissions-list');
        const data = snap.val();
        list.innerHTML = data ? Object.entries(data).map(([id, sub]) => `
            <div style="background:white; padding:10px; margin-top:5px; border-radius:5px;">
                <strong>${sub.studentName}</strong>
                <div style="font-size:12px; color:#666;">${sub.answers.map(a => `${a.q}: ${a.a}`).join(' | ')}</div>
                <button onclick="approveSub('${id}', '${sub.studentId}', 1)" style="background:green;">אשר</button>
                <button onclick="approveSub('${id}', '${sub.studentId}', 0.5)" style="background:orange;">חצי</button>
                <button onclick="db.ref('submissions/${id}').remove()" style="background:red;">דחה</button>
            </div>
        `).join('') : 'אין הגשות';
    });
}

function approveSub(subId, studentId, mult) {
    db.ref('submissions/' + subId).once('value', (snap) => {
        const sub = snap.val();
        const task = allTasks.find(t => t.id === sub.taskId);
        const reward = Math.round((task ? task.xp : 20) * mult);
        const s = allStudents.find(st => st.id === studentId);
        if (s) {
            let nxp = s.xp + reward;
            let nlv = s.level;
            while (nxp >= 100) { nlv++; nxp -= 100; }
            db.ref('students/' + studentId).update({ xp: nxp, level: nlv });
        }
        db.ref('submissions/' + subId).remove();
    });
}
</script>
</body>
</html>
