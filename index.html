<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><title>חוות הטמגוצ'י - גרסה מלאה ומתוקנת</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e0f7fa url('images/background.png') no-repeat center center fixed; background-size: cover; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center;}
    #login-screen { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 320px; margin-top: 50px; border: 2px solid #81c784;}
    #control-panel { display: none; background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 30px; width: 90%; max-width: 900px; flex-wrap: wrap; gap: 15px; justify-content: center; border: 2px solid #81c784;}
    input, select, button { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px;}
    button { background-color: #2e7d32; color: white; cursor: pointer; border: none; font-weight: bold;}
    #farm-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; width: 100%; max-width: 1200px;}
    .student-card { background: rgba(255, 255, 255, 0.9); border-radius: 25px; padding: 20px; text-align: center; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 5px solid #81c784; transition: transform 0.3s;}
    .my-creature { border: 4px solid #fbc02d; transform: scale(1.05); z-index: 5; }
    .level-text-badge { position: absolute; top: 5px; right: 15px; font-family: 'Arial Black', sans-serif; font-size: 1.4em; font-weight: 900; color: #2e7d32; z-index: 10; text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3);}
    .creature-img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 10px; cursor: pointer;}
    .glow-effect { animation: glow-pulse 0.6s ease-out; }
    @keyframes glow-pulse { 0% { filter: brightness(1); transform: scale(1); } 50% { filter: brightness(1.6) drop-shadow(0 0 15px gold); transform: scale(1.25); } 100% { filter: brightness(1); transform: scale(1); }}
    .xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }.xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }
    .remove-btn { position: absolute; top: 10px; left: 10px; background: #ff5252; color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;}
    .xp-float { position: absolute; font-weight: bold; color: gold; font-size: 1.2em; animation: floatUp 0.8s ease-out forwards; left: 50%; top: 60px;}
    @keyframes floatUp { 0% { opacity: 1; transform: translate(-50%,0); } 100% { opacity: 0; transform: translate(-50%,-40px); } }
    .levelup { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); background: #ffd700; color: #1b5e20; font-weight: bold; font-size: 1.5em; padding: 10px 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0,0,0,0.3); z-index: 100; pointer-events: none; animation: levelPop 2s ease-out forwards;}
    @keyframes levelPop { 0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); } 20% { opacity: 1; transform: translate(-50%, -30px) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -60px) scale(0.8); }}
    #tasks-area { width: 90%; max-width: 1200px; margin-bottom: 20px; display: none;}
    .task-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 6px solid #1976d2; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    /* תיקון ללינק שיהיה לחיץ */
    .task-link-btn { display: inline-block; background: #e3f2fd; color: #1976d2; padding: 5px 10px; border-radius: 5px; text-decoration: none; font-weight: bold; border: 1px solid #1976d2; margin-top: 5px; position: relative; z-index: 50; cursor: pointer; }
    .task-link-btn:hover { background: #bbdefb; }
</style></head>
<body>

<div id="login-screen">
    <h2>החווה המופלאה 🐾</h2>
    <div id="admin-login-area">
        <input type="password" id="adminPass" placeholder="סיסמת מנהל" style="width:80%; margin-bottom:10px;">
        <button onclick="checkAdmin()" style="width:90%;">כניסת מנהל 🔑</button>
    </div>
    <hr style="margin:20px 0;">
    <div id="student-login-area">
        <p>כניסת תלמידים:</p>
        <select id="studentSelect" style="width:90%; margin-bottom:10px;"><option value="">טוען רשימה...</option></select>
        <button onclick="studentLogin()" style="width:90%; background-color:#1976d2;">אני רוצה להיכנס! ✨</button>
    </div>
</div>

<div id="control-panel">
    <div style="display:flex; gap:10px; width:100%; flex-wrap:wrap; justify-content:center;">
        <input type="text" id="studentName" placeholder="שם התלמיד">
        <select id="studentClass"><option value="ה1">כיתה ה'1</option><option value="ה2">כיתה ה'2</option></select>
        <button onclick="addStudent()">צרף יצור לחווה 🐾</button>
    </div>
    <hr style="width:100%; margin: 15px 0;">
    <div style="width:100%; display:flex; flex-wrap:wrap; gap:10px;">
        <input type="text" id="taskTitle" placeholder="כותרת המטלה" style="flex:1;">
        <input type="text" id="taskLink" placeholder="קישור למטלה (אופציונלי)" style="flex:1;">
        <input type="date" id="taskDeadline" style="flex:1;">
        <input type="number" id="taskXP" placeholder="XP" value="20" style="width:80px;">
        <div id="questions-builder" style="width:100%; background:#f9f9f9; padding:10px; border-radius:8px; border:1px solid #ccc; margin-top:10px;">
            <h5>בניית שאלון (אופציונלי):</h5>
            <div id="questions-list-admin"></div>
            <button onclick="addQuestionRow()" style="background:#007bff; font-size:0.9em;">+ הוסף שאלה</button>
        </div>
        <button onclick="addTask()" style="background-color:#1976d2; width:100%; margin-top:10px;">פרסם מטלה חדשה 📋</button>
    </div>
    <div id="admin-submissions" style="width:100%; margin-top:20px; background:#f1f8e9; padding:15px; border-radius:10px; border:1px dashed #2e7d32;">
        <h4 style="margin:0 0 10px 0;">הגשות שממתינות לבדיקה 📥</h4>
        <div id="submissions-list">אין הגשות חדשות</div>
    </div>
</div>

<div id="tasks-area">
    <h3>משימות להשלמה 📝</h3>
    <div id="tasks-list"></div>
</div>

<div id="farm-grid"></div>

<div id="submit-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.5); z-index:1000; width:300px; text-align:center; border:3px solid #1976d2;">
    <h3 id="modal-task-title">הגשת מטלה</h3>
    <button onclick="window.open('https://send.magicode.me/', '_blank')" style="background:#ff9800; color:white; padding:10px 15px; border:none; border-radius:8px; cursor:pointer;">העלאת קבצים 📤</button>
    <textarea id="submit-content" placeholder="הדבק כאן את הקישור שקיבלת" style="width:100%; height:80px; margin:10px 0; padding:5px;"></textarea>
    <div style="display:flex; gap:10px;">
        <button onclick="sendSubmission()" style="flex:1; background:#4caf50;">שלח הגשה 🚀</button>
        <button onclick="closeModal()" style="flex:1; background:#999;">ביטול</button>
    </div>
</div>

<div id="quiz-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.5); z-index:1001; width:90%; max-width:500px; max-height:80vh; overflow-y:auto; border:3px solid #4caf50;">
    <h3 id="quiz-title"></h3>
    <div id="quiz-questions-container" style="text-align:right; margin-bottom:20px;"></div>
    <div style="display:flex; gap:10px;">
        <button onclick="submitQuiz()" style="flex:1; background:#4caf50;">שלח תשובות 🚀</button>
        <button onclick="closeQuizModal()" style="flex:1; background:#999;">סגור</button>
    </div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE", authDomain: "liorfarm.firebaseapp.com", databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app", projectId: "liorfarm", storageBucket: "liorfarm.firebasestorage.app", messagingSenderId: "436063422896", appId: "1:436063422896:web:4cb14fbcc036ba97676e75" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CREATURE_TYPES = ['trt','snk','hnd','cat','crw','fsh','chk','fox','zbr','mnk','shp','cow','ost','rbt','dnk','duk','snl','owl','spd'];
let allStudents = [], allTasks = [], currentUser = null, currentTaskToSubmit = null;

// פונקציות ליבה
db.ref('students').on('value', snap => {
    allStudents = snap.val() ? Object.values(snap.val()) : [];
    const select = document.getElementById('studentSelect');
    select.innerHTML = '<option value="">בחר את שמך...</option>';
    allStudents.forEach(s => select.innerHTML += `<option value="${s.id}">${s.name} (${s.className})</option>`);
    updateView();
});

function checkAdmin() { if (document.getElementById('adminPass').value === 'rabenu247') { currentUser = 'admin'; startApp(); } else alert('שגוי'); }
function studentLogin() { currentUser = document.getElementById('studentSelect').value; if (currentUser) startApp(); else alert('בחר שם'); }

function startApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('farm-grid').style.display = 'grid';
    document.getElementById('tasks-area').style.display = 'block';
    if (currentUser === 'admin') {
        document.getElementById('control-panel').style.display = 'flex';
        initAdminSubmissions();
    }
    updateView();
    renderTasks();
}

// ניהול שאלונים
function addQuestionRow() {
    const container = document.getElementById('questions-list-admin');
    const div = document.createElement('div');
    div.className = 'admin-q-row';
    div.style = "margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;";
    div.innerHTML = `
        <input type="text" placeholder="השאלה" class="q-text" style="width:100%; margin-bottom:5px;">
        <input type="text" placeholder="תשובה נכונה" class="q-correct" style="border:1px solid green; width:45%;">
        <input type="text" placeholder="מסיח" class="q-wrong1" style="width:45%;">`;
    container.appendChild(div);
}

// ניהול מטלות - תיקון שמירת ה-Type וה-Link
function addTask() {
    const title = document.getElementById('taskTitle').value;
    const link = document.getElementById('taskLink').value;
    const deadline = document.getElementById('taskDeadline').value;
    const xp = parseInt(document.getElementById('taskXP').value) || 20;
    
    const qRows = document.querySelectorAll('.admin-q-row');
    const questions = Array.from(qRows).map(row => ({
        question: row.querySelector('.q-text').value,
        correct: row.querySelector('.q-correct').value,
        distractors: [row.querySelector('.q-wrong1').value].filter(v => v !== "")
    })).filter(q => q.question !== "");

    if (!title) return alert("הזן כותרת");
    const id = Date.now().toString();
    
    db.ref('tasks/' + id).set({
        id, title, link: link || null, deadline, xp,
        questions: questions.length > 0 ? questions : null,
        type: questions.length > 0 ? 'quiz' : 'manual'
    });

    document.getElementById('taskTitle').value = '';
    document.getElementById('taskLink').value = '';
    document.getElementById('questions-list-admin').innerHTML = '';
}

db.ref('tasks').on('value', snap => {
    allTasks = snap.val() ? Object.values(snap.val()) : [];
    renderTasks();
});

function renderTasks() {
    const list = document.getElementById('tasks-list');
    if (!list) return;
    list.innerHTML = allTasks.length === 0 ? 'אין מטלות כרגע.' : '';

    allTasks.slice().reverse().forEach(task => {
        const div = document.createElement('div');
        div.className = 'task-card';
        const isQuiz = task.type === 'quiz';
        
        let actionBtn = currentUser === 'admin' ? 
            `<button onclick="db.ref('tasks/${task.id}').remove()" style="background:#ff5252;">מחק</button>` :
            (isQuiz ? `<button onclick="openQuiz('${task.id}')" style="background:#4caf50;">פתור שאלון 📋</button>` : 
                      `<button onclick="openSubmitModal('${task.id}', '${task.title}')" style="background:#1976d2;">הגש מטלה ✍️</button>`);

        div.innerHTML = `
            <div class="task-info">
                <h4 style="margin:0;">${task.title} ${isQuiz ? '📋' : '📝'}</h4>
                ${task.link ? `<a href="${task.link}" target="_blank" class="task-link-btn">📎 פתח קובץ מטלה</a>` : ''}
                <div style="font-size:0.85em;color:#555; margin-top:5px;">🎁 פרס: ${task.xp} XP</div>
            </div>
            <div>${actionBtn}</div>`;
        list.appendChild(div);
    });
}

// שאלונים ותלמידים
function openQuiz(taskId) {
    const task = allTasks.find(t => t.id === taskId);
    currentTaskToSubmit = taskId;
    document.getElementById('quiz-title').innerText = task.title;
    const container = document.getElementById('quiz-questions-container');
    container.innerHTML = task.questions.map((q, idx) => {
        const options = [q.correct, ...q.distractors].sort(() => Math.random() - 0.5);
        return `<p><strong>${idx + 1}. ${q.question}</strong></p>` + 
            options.map(opt => `<label style="display:block;"><input type="radio" name="q${idx}" value="${opt}"> ${opt}</label>`).join('');
    }).join('');
    document.getElementById('quiz-modal').style.display = 'block';
}

function submitQuiz() {
    const task = allTasks.find(t => t.id === currentTaskToSubmit);
    const answers = task.questions.map((q, idx) => {
        const sel = document.querySelector(`input[name="q${idx}"]:checked`);
        return { question: q.question, selected: sel ? sel.value : "", isCorrect: sel && sel.value === q.correct };
    });
    const subId = Date.now().toString();
    db.ref('submissions/' + subId).set({
        id: subId, studentName: allStudents.find(s=>s.id===currentUser).name, studentId: currentUser,
        taskId: currentTaskToSubmit, type: 'quiz', answers, time: Date.now()
    });
    alert("השאלון הוגש!"); closeQuizModal();
}

function openSubmitModal(id, title) { currentTaskToSubmit = id; document.getElementById('modal-task-title').innerText = title; document.getElementById('submit-modal').style.display = 'block'; }
function closeModal() { document.getElementById('submit-modal').style.display = 'none'; }
function closeQuizModal() { document.getElementById('quiz-modal').style.display = 'none'; }

function sendSubmission() {
    const content = document.getElementById('submit-content').value.trim();
    if (!content) return alert("הדבק קישור");
    const subId = Date.now().toString();
    db.ref('submissions/' + subId).set({
        id: subId, studentName: allStudents.find(s=>s.id===currentUser).name, studentId: currentUser,
        taskId: currentTaskToSubmit, content: content, type: 'manual', time: Date.now()
    });
    alert("הוגש!"); closeModal();
}

// ממשק מורה
function initAdminSubmissions() {
    db.ref('submissions').on('value', snap => {
        const container = document.getElementById('submissions-list');
        container.innerHTML = snap.val() ? '' : 'אין הגשות חדשות';
        if (snap.val()) {
            Object.values(snap.val()).forEach(sub => {
                const d = document.createElement('div');
                d.style = "background:white; padding:10px; margin:5px 0; border-radius:8px; border-right:4px solid gold;";
                const isQuiz = sub.type === 'quiz';
                d.innerHTML = `
                    <b>${sub.studentName}</b> | ${isQuiz ? 'שאלון' : 'מטלה'}<br>
                    ${isQuiz ? `נכונות: ${sub.answers.filter(a=>a.isCorrect).length}/${sub.answers.length}` : `<a href="${sub.content}" target="_blank">צפה בהגשה</a>`}
                    <div style="margin-top:5px;">
                        <button onclick="approveSub('${sub.id}', '${sub.studentId}')" style="background:#4caf50; padding:5px;">אשר ✅</button>
                        <button onclick="db.ref('submissions/${sub.id}').remove()" style="background:#f44336; padding:5px;">דחה ❌</button>
                    </div>`;
                container.appendChild(d);
            });
        }
    });
}

function approveSub(subId, studentId) {
    db.ref('submissions/' + subId).once('value', snap => {
        const sub = snap.val();
        const task = allTasks.find(t => t.id === sub.taskId);
        const xpToAdd = task ? task.xp : 20;
        const s = allStudents.find(st => st.id === studentId);
        addXP(studentId, s.xp, s.level, xpToAdd);
        db.ref('submissions/' + subId).remove();
    });
}

function addXP(id, currentXP, level, amount = 10) {
    const img = document.getElementById('img-' + id);
    if (img) {
        img.classList.remove('glow-effect'); void img.offsetWidth; img.classList.add('glow-effect');
        const f = document.createElement('div'); f.className = 'xp-float'; f.innerText = `+${amount} XP`;
        img.parentElement.appendChild(f); setTimeout(() => f.remove(), 800);
    }
    let nXP = currentXP + amount; let nLvl = level;
    if (nXP >= 100) { nLvl++; nXP = 0; 
        const lt = document.createElement('div'); lt.className = 'levelup'; lt.innerText = 'LEVEL UP! ✨';
        img?.parentElement.appendChild(lt); setTimeout(() => lt.remove(), 2000);
    }
    db.ref('students/' + id).update({ xp: nXP, level: nLvl });
}

function updateView() {
    const grid = document.getElementById('farm-grid');
    if (!currentUser) return;
    grid.innerHTML = allStudents.map(s => {
        const isMine = currentUser === s.id;
        const imgPath = s.level === 0 ? `images/egg${(s.egg || 0) + 1}.png` : `images/${s.type}${s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1)}.png`;
        return `<div class="student-card ${isMine ? 'my-creature' : ''}">
            <div class="level-text-badge">Lv.${s.level}</div>
            <img id="img-${s.id}" src="${imgPath}" class="creature-img" onclick="if(currentUser==='admin')addXP('${s.id}',${s.xp},${s.level})">
            <div style="font-weight:bold;">${s.name}</div>
            <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
        </div>`;
    }).join('');
}

function addStudent() {
    const n = document.getElementById('studentName').value; if (!n) return;
    const id = Date.now().toString();
    db.ref('students/' + id).set({ id, name: n, className: document.getElementById('studentClass').value, xp: 0, level: 0, type: CREATURE_TYPES[Math.floor(Math.random() * CREATURE_TYPES.length)], egg: Math.floor(Math.random() * 5) });
}
</script></body></html>
