<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - גרסת האנימציות הבטוחה</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        #control-panel {
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 25px; 
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            border: 2px solid #81c784;
        }

        input, select, button { padding: 8px 12px; border-radius: 10px; border: 1px solid #ddd; }
        button { background: #2e7d32; color: white; font-weight: bold; cursor: pointer; }

        #farm-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; width: 100%; max-width: 1000px;
        }

        .student-card {
            background: white; border-radius: 15px; padding: 12px; text-align: center;
            position: relative; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* --- האנימציות החדשות (עובדות תמיד) --- */
        .creature-img { 
            width: 90px; height: 90px; cursor: pointer; 
            object-fit: contain;
            transition: all 0.1s ease; /* תגובה מהירה ללחיצה */
        }

        /* אפקט ה-Glow והגדלה בזמן הלחיצה עצמה */
        .creature-img:active {
            transform: scale(1.2);
            filter: brightness(1.3) drop-shadow(0 0 15px #ffeb3b);
        }

        /* רעידה לביצה כמעט בוקעת */
        .egg-shake { animation: shake 0.5s infinite; }
        @keyframes shake {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(4deg); }
            75% { transform: rotate(-4deg); }
        }

        .xp-container { background: #eee; border-radius: 10px; height: 12px; margin: 8px 0; overflow: hidden; border: 1px solid #ccc; }
        .xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.3s; }
        
        .level-badge { position: absolute; top: 5px; right: 8px; font-weight: bold; color: #2e7d32; }
        .remove-btn { position: absolute; top: 5px; left: 5px; background: #ff5252; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div id="control-panel">
    <input type="text" id="studentName" placeholder="שם">
    <select id="studentClass"><option value="ה1">ה'1</option><option value="ה2">ה'2</option></select>
    <button onclick="addStudent()">הוסף ✨</button>
    <button onclick="document.getElementById('f').click()" style="background:#ff9800">⬆️ ייבוא</button>
    <input type="file" id="f" style="display:none" onchange="importData(this)">
</div>

<div id="farm-grid"></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
      authDomain: "liorfarm.firebaseapp.com",
      databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "liorfarm",
      storageBucket: "liorfarm.firebasestorage.app",
      messagingSenderId: "436063422896",
      appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const CREATURES = ['trt', 'snk', 'hnd', 'cat', 'crw', 'fsh', 'chk', 'fox', 'zbr', 'mnk', 'shp', 'cow', 'ost', 'rbt', 'dnk', 'duk', 'snl', 'owl', 'spd'];
    const EGGS = ['images/egg1.png', 'images/egg2.png', 'images/egg3.png', 'images/egg4.png', 'images/egg5.png'];

    db.ref('students').on('value', (snap) => {
        const data = snap.val();
        render(data ? Object.values(data) : []);
    });

    function addStudent() {
        const name = document.getElementById('studentName').value;
        if (!name) return;
        const id = Date.now().toString();
        db.ref('students/' + id).set({
            id, name, className: document.getElementById('studentClass').value,
            xp: 0, level: 0,
            type: CREATURES[Math.floor(Math.random() * CREATURES.length)],
            egg: Math.floor(Math.random() * EGGS.length)
        });
        document.getElementById('studentName').value = '';
    }

    function addXP(id, xp, lvl) {
        let nxp = xp + 10;
        let nlv = lvl;
        if (nxp >= 100) { nlv++; nxp = 0; }
        db.ref('students/' + id).update({ xp: nxp, level: nlv });
    }

    function render(list) {
        document.getElementById('farm-grid').innerHTML = list.map(s => {
            const isShaking = (s.level === 0 && s.xp >= 90) ? 'egg-shake' : '';
            const imgPath = s.level === 0 ? EGGS[s.egg] : `images/${s.type}${s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1)}.png`;
            return `
                <div class="student-card">
                    <div class="level-badge">Lv.${s.level}</div>
                    <button class="remove-btn" onclick="delS('${s.id}')">×</button>
                    <img id="img-${s.id}" src="${imgPath}" class="creature-img ${isShaking}" onmousedown="addXP('${s.id}', ${s.xp}, ${s.level})">
                    <div style="font-weight:bold; font-size: 14px;">${s.name}</div>
                    <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
                </div>
            `;
        }).join('');
    }

    function delS(id) { if(confirm("למחוק?")) db.ref('students/' + id).remove(); }

    function importData(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const data = JSON.parse(reader.result);
            const list = Array.isArray(data) ? data : (JSON.parse(data.farmData) || []);
            list.forEach(s => db.ref('students/' + s.id).set({
                id: s.id, name: s.name, className: s.className,
                xp: s.xp, level: s.level, type: s.type || s.creatureType,
                egg: s.egg !== undefined ? s.egg : (s.eggIndex || 0)
            }));
        };
        reader.readAsText(input.files[0]);
    }
</script>
</body>
</html>
