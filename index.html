<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - גרסה סופית</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        #control-panel {
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 30px; width: 90%; max-width: 900px;
            display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; border: 2px solid #81c784;
        }

        input, select, button { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; }
        button { background-color: #2e7d32; color: white; cursor: pointer; border: none; font-weight: bold; transition: all 0.2s; }
        button:hover { background-color: #1b5e20; transform: translateY(-2px); }

        #farm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }

        .student-card {
            background: rgba(255, 255, 255, 0.9); border-radius: 25px; padding: 20px; text-align: center;
            position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 5px solid #81c784;
        }

        .level-text-badge {
            position: absolute; top: 5px; right: 15px; font-family: 'Arial Black', sans-serif;
            font-size: 1.4em; font-weight: 900; color: #2e7d32;
            text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3);
        }

        .creature-img { width: 120px; height: 120px; cursor: pointer; object-fit: contain; margin-bottom: 10px; }
        .xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        .xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }
        
        .remove-btn { position: absolute; top: 10px; left: 10px; background: #ff5252; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }

        /* אנימציות שחזרו */
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake { 0%, 100% { transform: translate(1px, 1px); } 10% { transform: translate(-1px, -2px); } 50% { transform: translate(-1px, 2px); } }
        
        .pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }

        .glow-effect { animation: glow-pulse 0.6s ease-out; }
        @keyframes glow-pulse { 0% { filter: brightness(1); } 50% { filter: brightness(1.5) drop-shadow(0 0 15px #ffeb3b); } 100% { filter: brightness(1); } }
    </style>
</head>
<body>

<div id="control-panel">
    <input type="text" id="studentName" placeholder="שם התלמיד">
    <select id="studentClass">
        <option value="ה1">כיתה ה'1</option>
        <option value="ה2">כיתה ה'2</option>
    </select>
    <button onclick="addStudent()">צרף יצור לחווה 🐾</button>
    <button onclick="document.getElementById('importOld').click()" style="background:#ff9800">⬆️ ייבוא גיבוי ישן לענן</button>
    <input type="file" id="importOld" style="display:none" onchange="importToCloud(this)">
</div>

<div id="farm-grid"></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
      authDomain: "liorfarm.firebaseapp.com",
      databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "liorfarm",
      storageBucket: "liorfarm.firebasestorage.app",
      messagingSenderId: "436063422896",
      appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const studentsRef = db.ref('students');

    const CREATURE_TYPES = ['trt', 'snk', 'hnd', 'cat', 'crw', 'fsh', 'chk', 'fox', 'zbr', 'mnk', 'shp', 'cow', 'ost', 'rbt', 'dnk', 'duk', 'snl', 'owl', 'spd'];
    const EGG_IMAGES = ['images/egg1.png', 'images/egg2.png', 'images/egg3.png', 'images/egg4.png', 'images/egg5.png'];

    let students = [];

    studentsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        students = data ? Object.values(data) : [];
        renderFarm();
    });

    function addStudent() {
        const nameInput = document.getElementById('studentName');
        if (!nameInput.value.trim()) return alert("נא להזין שם");
        const id = Date.now().toString();
        db.ref('students/' + id).set({
            id, name: nameInput.value, className: document.getElementById('studentClass').value,
            xp: 0, level: 0, 
            creatureType: CREATURE_TYPES[Math.floor(Math.random() * CREATURE_TYPES.length)],
            eggIndex: Math.floor(Math.random() * EGG_IMAGES.length)
        });
        nameInput.value = '';
    }

    function addXP(id) {
        const s = students.find(st => st.id == id);
        let nxp = s.xp + 10;
        let nlv = s.level;
        if (nxp >= 100) { nlv++; nxp = 0; }
        db.ref('students/' + id).update({ xp: nxp, level: nlv });
        
        // אפקט ויזואלי
        const img = document.getElementById(`img-${id}`);
        img.classList.remove('glow-effect');
        void img.offsetWidth;
        img.classList.add('glow-effect');
    }

    function importToCloud(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const data = JSON.parse(reader.result);
            const list = Array.isArray(data) ? data : (JSON.parse(data.farmData) || []);
            list.forEach(s => db.ref('students/' + s.id).set(s));
            alert("הנתונים הועלו לענן!");
        };
        reader.readAsText(input.files[0]);
    }

    function removeStudent(id) { if(confirm("למחוק?")) db.ref('students/' + id).remove(); }

    function getImagePath(s) {
        if (s.level === 0) return EGG_IMAGES[s.eggIndex];
        let stg = s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1);
        return `images/${s.creatureType}${stg}.png`;
    }

    function renderFarm() {
        document.getElementById('farm-grid').innerHTML = students.map(s => `
            <div class="student-card pop">
                <div class="level-text-badge">Lv.${s.level}</div>
                <button class="remove-btn" onclick="removeStudent('${s.id}')">×</button>
                <img id="img-${s.id}" src="${getImagePath(s)}" class="creature-img ${(s.level===0 && s.xp>=90)?'shake':''}" onclick="addXP('${s.id}')">
                <div style="font-weight:bold;">${s.name} (כיתה ${s.className})</div>
                <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
                <div style="font-size:0.8em; color:#2e7d32; font-weight:bold;">${s.level==0?'ביצה':'רמה '+s.level} (${s.xp}/100)</div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
