<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - גרסת ה-XP SHOW</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        #control-panel {
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 25px; 
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            border: 2px solid #81c784;
        }

        #farm-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; width: 100%; max-width: 1000px;
        }

        .student-card {
            background: white; border-radius: 20px; padding: 15px; text-align: center;
            position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        /* יצור במצב רגיל - שקט לגמרי */
        .creature-img { 
            width: 95px; height: 95px; cursor: pointer; 
            object-fit: contain;
            transition: all 0.1s ease;
        }

        /* ה-SHOW בזמן לחיצה בלבד */
        .creature-img:active {
            transform: scale(1.4) !important;
            filter: brightness(1.4) drop-shadow(0 0 20px #ffeb3b) !important;
        }

        /* רעידה רק לביצה כמעט מוכנה */
        .egg-shake { animation: intense-shake 0.5s infinite; }
        @keyframes intense-shake {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(6deg); }
            75% { transform: rotate(-6deg); }
        }

        .xp-container { background: #eee; border-radius: 10px; height: 14px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        
        /* אנימציה לפס ה-XP כשהוא גדל */
        .xp-bar { 
            background: linear-gradient(90deg, #fbc02d, #ffeb3b); 
            height: 100%; 
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* הבהוב קטן לכרטיס בלחיצה */
        .card-pulse { animation: pulse-bg 0.3s ease-out; }
        @keyframes pulse-bg {
            0% { background: white; }
            50% { background: #fffde7; }
            100% { background: white; }
        }

        .level-badge { position: absolute; top: 8px; right: 10px; font-weight: bold; color: #2e7d32; font-size: 1.1em; }
        .remove-btn { position: absolute; top: 5px; left: 5px; background: #ff5252; color: white; border: none; border-radius: 50%; width: 18px; height: 18px; cursor: pointer; font-size: 10px; opacity: 0.3; }
        .remove-btn:hover { opacity: 1; }
        
        button { padding: 8px 15px; border-radius: 10px; border: none; background: #2e7d32; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="control-panel">
    <input type="text" id="sName" placeholder="שם">
    <select id="sClass"><option value="ה1">ה'1</option><option value="ה2">ה'2</option></select>
    <button onclick="add()">הוסף ✨</button>
    <button onclick="document.getElementById('f').click()" style="background:#ff9800">⬆️ ייבוא</button>
    <input type="file" id="f" style="display:none" onchange="importData(this)">
</div>

<div id="farm-grid"></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
      authDomain: "liorfarm.firebaseapp.com",
      databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "liorfarm",
      storageBucket: "liorfarm.firebasestorage.app",
      messagingSenderId: "436063422896",
      appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const CREATURES = ['trt', 'snk', 'hnd', 'cat', 'crw', 'fsh', 'chk', 'fox', 'zbr', 'mnk', 'shp', 'cow', 'ost', 'rbt', 'dnk', 'duk', 'snl', 'owl', 'spd'];
    const EGGS = ['images/egg1.png', 'images/egg2.png', 'images/egg3.png', 'images/egg4.png', 'images/egg5.png'];

    db.ref('students').on('value', (snap) => {
        const data = snap.val();
        render(data ? Object.values(data) : []);
    });

    function add() {
        const name = document.getElementById('sName').value;
        if (!name) return;
        const id = Date.now().toString();
        db.ref('students/' + id).set({
            id, name, className: document.getElementById('sClass').value,
            xp: 0, level: 0,
            type: CREATURES[Math.floor(Math.random() * CREATURES.length)],
            egg: Math.floor(Math.random() * EGGS.length)
        });
        document.getElementById('sName').value = '';
    }

    function addXP(id, xp, lvl) {
        // הוספת אפקט לכרטיס בלחיצה
        const card = document.getElementById('card-' + id);
        if(card) {
            card.classList.remove('card-pulse');
            void card.offsetWidth;
            card.classList.add('card-pulse');
        }

        let nxp = xp + 10;
        let nlv = lvl;
        if (nxp >= 100) { nlv++; nxp = 0; }
        db.ref('students/' + id).update({ xp: nxp, level: nlv });
    }

    function render(list) {
        document.getElementById('farm-grid').innerHTML = list.map(s => {
            const isShaking = (s.level === 0 && s.xp >= 90) ? 'egg-shake' : '';
            const imgPath = s.level === 0 ? EGGS[s.egg] : `images/${s.type}${s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1)}.png`;
            return `
                <div class="student-card" id="card-${s.id}">
                    <div class="level-badge">Lv.${s.level}</div>
                    <button class="remove-btn" onclick="del('${s.id}')">×</button>
                    <img id="img-${s.id}" src="${imgPath}" class="creature-img ${isShaking}" 
                         onmousedown="addXP('${s.id}', ${s.xp}, ${s.level})" 
                         ontouchstart="addXP('${s.id}', ${s.xp}, ${s.level})">
                    <div style="font-weight:bold; font-size: 15px; margin-top:8px;">${s.name}</div>
                    <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
                </div>
            `;
        }).join('');
    }

    function del(id) { if(confirm("למחוק?")) db.ref('students/' + id).remove(); }

    function importData(input) {
        const reader = new FileReader();
        reader.onload = function() {
            const data = JSON.parse(reader.result);
            const list = Array.isArray(data) ? data : (JSON.parse(data.farmData) || []);
            list.forEach(s => db.ref('students/' + s.id).set({
                id: s.id, name: s.name, className: s.className,
                xp: s.xp, level: s.level, type: s.type || s.creatureType,
                egg: s.egg !== undefined ? s.egg : (s.eggIndex || 0)
            }));
        };
        reader.readAsText(input.files[0]);
    }
</script>
</body>
</html>
