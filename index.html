<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - גרסה סופית ומתוקנת 🐾</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e0f7fa url('images/background.png') no-repeat center center fixed; background-size: cover; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #control-panel { background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 30px; width: 90%; max-width: 900px; display: none; flex-wrap: wrap; gap: 15px; justify-content: center; border: 2px solid #81c784; }
        input, select, button, textarea { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; font-family: inherit; }
        button { background-color: #2e7d32; color: white; cursor: pointer; border: none; font-weight: bold; }
        #farm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }
        .student-card { background: rgba(255, 255, 255, 0.9); border-radius: 25px; padding: 20px; text-align: center; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-bottom: 5px solid #81c784; transition: transform 0.2s; }
        .level-text-badge { position: absolute; top: 5px; right: 15px; font-family: 'Arial Black', sans-serif; font-size: 1.4em; font-weight: 900; color: #2e7d32; z-index: 10; text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3); }
        .creature-img { width: 120px; height: 120px; cursor: pointer; object-fit: contain; margin-bottom: 10px; }
        
        /* אנימציות */
        .glow-effect { animation: glow-pulse 0.6s ease-out; }
        @keyframes glow-pulse { 50% { filter: brightness(1.3) drop-shadow(0 0 15px gold); transform: scale(1.1); } }
        .xp-float { position: absolute; font-weight: bold; color: #fbc02d; font-size: 1.5em; animation: floatUp 1s forwards; left: 50%; transform: translateX(-50%); top: 20px; z-index: 100; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        @keyframes floatUp { 100% { opacity: 0; transform: translate(-50%, -60px); } }

        .xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        .xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .remove-btn { position: absolute; top: 10px; left: 10px; background: #ff5252; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; }
        #login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; display: flex; flex-direction: column; gap: 15px; width: 300px; }
        .task-btn { position: absolute; bottom: 10px; right: 10px; background: #fb8c00; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; color: white; font-size: 20px; }
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 500; align-items: center; justify-content: center; }
        .modal { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; position: relative; text-align: right; max-height: 80vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 10px; left: 10px; cursor: pointer; font-size: 20px; }
        .task-item { background: #f9f9f9; padding: 12px; border-radius: 10px; margin-top: 10px; border-right: 4px solid #fb8c00; position: relative; }
        .magicode-btn { background: #2196f3; color: white; margin: 10px 0; width: 100%; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2>הכניסה לחווה 🐾</h2>
        <button onclick="loginAs('student')">אני תלמיד/ה</button>
        <hr style="width:100%">
        <input type="password" id="adminPass" placeholder="קוד סודי">
        <button onclick="loginAs('admin')" style="background:#1565c0">כניסת מנהל</button>
    </div>
</div>

<div id="control-panel">
    <input type="text" id="studentName" placeholder="שם התלמיד" style="width:150px">
    <select id="studentClass"><option value="ה1">כיתה ה'1</option><option value="ה2">כיתה ה'2</option></select>
    <button onclick="addStudent()">הוסף יצור ✨</button>
    <button onclick="openGlobalTaskModal()" style="background:#fb8c00">📢 משימה לכולם</button>
    <div style="width:100%; display:flex; gap:10px; margin-top:10px;">
        <input type="text" id="search" placeholder="חיפוש..." oninput="updateView()" style="flex:2;">
        <select id="sortBy" onchange="updateView()" style="flex:1;">
            <option value="name">לפי שם</option>
            <option value="level">לפי רמה</option>
            <option value="className">לפי כיתה</option>
        </select>
    </div>
</div>

<div id="farm-grid"></div>

<div id="modal-overlay">
    <div class="modal">
        <span class="close-modal" onclick="closeModal()">✖</span>
        <div id="modal-content"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
        authDomain: "liorfarm.firebaseapp.com",
        databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "liorfarm",
        messagingSenderId: "436063422896",
        appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userRole = ''; 
    let allStudents = [];
    const CREATURE_TYPES = ['trt','snk','hnd','cat','crw','fsh','chk','fox','zbr','mnk','shp','cow','ost','rbt','dnk','duk','snl','owl','spd'];

    function loginAs(role) {
        if(role === 'admin') {
            if(document.getElementById('adminPass').value !== 'rabenu247') { alert("קוד שגוי"); return; }
            document.getElementById('control-panel').style.display = 'flex';
        }
        userRole = role;
        document.getElementById('login-overlay').style.display = 'none';
        updateView();
    }

    db.ref('students').on('value', (snap) => {
        allStudents = snap.val() ? Object.values(snap.val()) : [];
        updateView();
    });

    function updateView() {
        const grid = document.getElementById('farm-grid');
        const searchTerm = document.getElementById('search').value.toLowerCase();
        const sortBy = document.getElementById('sortBy').value;
        
        let filtered = allStudents.filter(s => s.name.toLowerCase().includes(searchTerm));
        filtered.sort((a,b) => {
            if(sortBy === 'name') return a.name.localeCompare(b.name);
            if(sortBy === 'level') return b.level - a.level;
            return a.className.localeCompare(b.className);
        });

        grid.innerHTML = filtered.map(s => {
            const imgPath = s.level===0 ? `images/egg${(s.egg||0)+1}.png` : `images/${s.type}${s.level>=20?3:(s.level>=10?2:1)}.png`;
            return `
                <div class="student-card" id="card-${s.id}">
                    <div class="level-text-badge">Lv.${s.level}</div>
                    ${userRole==='admin' ? `<button class="remove-btn" onclick="if(confirm('למחוק?')) db.ref('students/${s.id}').remove()">✖</button>` : ''}
                    <img id="img-${s.id}" src="${imgPath}" class="creature-img" onclick="handleCreatureClick('${s.id}')">
                    <div style="font-weight:bold;">${s.name} (${s.className || ''})</div>
                    <div class="xp-container"><div class="xp-bar" id="bar-${s.id}" style="width:${s.xp}%"></div></div>
                    <button class="task-btn" onclick="openTaskModal('${s.id}')">📋</button>
                </div>`;
        }).join('');
    }

    function handleCreatureClick(id) {
        const s = allStudents.find(x => x.id === id);
        if(userRole === 'admin') {
            addXP(id, 10);
        } else {
            openTaskModal(id);
        }
    }

    function triggerAnims(id, amount) {
        const card = document.getElementById(`card-${id}`);
        const img = document.getElementById(`img-${id}`);
        if(!card || !img) return;

        img.classList.remove('glow-effect'); void img.offsetWidth; img.classList.add('glow-effect');
        
        const f = document.createElement('div');
        f.className = 'xp-float'; f.innerText = `+${amount} XP`;
        card.appendChild(f);
        setTimeout(() => f.remove(), 1000);
    }

    function addXP(id, amount) {
        const s = allStudents.find(x => x.id === id);
        let nxp = s.xp + amount, nlv = s.level;
        if(nxp >= 100) { nlv++; nxp = 0; }
        triggerAnims(id, amount);
        db.ref('students/'+id).update({ xp: nxp, level: nlv });
    }

    function openTaskModal(studentId) {
        const s = allStudents.find(x => x.id === studentId);
        const content = document.getElementById('modal-content');
        document.getElementById('modal-overlay').style.display = 'flex';

        if(userRole === 'admin') {
            let tasksHtml = '';
            if(s.tasks) {
                Object.values(s.tasks).forEach(t => {
                    tasksHtml += `
                        <div class="task-item">
                            <button style="float:left; background:none; color:red;" onclick="deleteTask('${s.id}','${t.taskId}')">🗑️</button>
                            <b>${t.title}</b> <small>(${t.rewardXP} XP)</small><br>
                            ${t.date ? `<small style="color:gray;">נשלח ב: ${t.date}</small><br>` : ''}
                            ${t.submission ? `
                                <div style="background:white; padding:8px; margin:5px 0; border:1px solid #ddd; font-size:13px;">
                                    ${t.submission.startsWith('http') ? `<a href="${t.submission}" target="_blank">🔗 צפה בהגשה</a>` : t.submission}
                                </div>
                                <button onclick="approveTask('${s.id}','${t.taskId}',${t.rewardXP}, 1)" style="font-size:12px; background:#2e7d32;">אשר 100% ✅</button>
                                <button onclick="approveTask('${s.id}','${t.taskId}',${t.rewardXP}, 0.5)" style="font-size:12px; background:#fb8c00;">חלקית 50% ⚠️</button>
                            ` : '<small style="color:orange;">טרם הוגש</small>'}
                        </div>`;
                });
            }
            content.innerHTML = `<h3>משימות: ${s.name}</h3>
                <input type="text" id="tTitle" placeholder="שם המשימה" style="width:90%">
                <input type="number" id="tXP" placeholder="XP כפרס" style="width:90%; margin-top:5px;">
                <button onclick="saveTask('${studentId}')" style="width:100%; margin-top:10px;">שלח משימה אישית 📤</button>
                <div style="margin-top:15px;">${tasksHtml || 'אין משימות'}</div>`;
        } else {
            let tasksHtml = '';
            if(s.tasks) {
                Object.values(s.tasks).forEach(t => {
                    tasksHtml += `
                        <div class="task-item">
                            <b>${t.title}</b> (${t.rewardXP} XP)
                            ${t.date ? `<br><small>נשלח ב: ${t.date}</small>` : ''}
                            ${!t.submission ? `
                                <button class="magicode-btn" onclick="window.open('https://send.magicode.me/', '_blank')">העלאת קובץ ל-Magicode 📤</button>
                                <textarea id="input-${t.taskId}" placeholder="הדבק קישור או כתוב תשובה..."></textarea>
                                <button onclick="submitWork('${s.id}','${t.taskId}')" style="width:100%; margin-top:5px;">שלח הגשה 🚀</button>
                            ` : '<p style="color:green; font-weight:bold;">הוגש! מחכה לבדיקה.</p>'}
                        </div>`;
                });
            }
            content.innerHTML = `<h3>המשימות שלי - ${s.name}</h3>` + (tasksHtml || '<p>אין משימות כרגע.</p>');
        }
    }

    function saveTask(sid) {
        const title = document.getElementById('tTitle').value;
        const xp = parseInt(document.getElementById('tXP').value);
        if(!title || !xp) return;
        const tid = "task_" + Date.now();
        const dateStr = new Date().toLocaleDateString('he-IL') + " " + new Date().toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
        db.ref(`students/${sid}/tasks/${tid}`).set({ taskId: tid, title, rewardXP: xp, date: dateStr });
        closeModal();
    }

    function openGlobalTaskModal() {
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('modal-content').innerHTML = `
            <h3>📢 משימה לכל הכיתה</h3>
            <button class="magicode-btn" onclick="window.open('https://send.magicode.me/', '_blank')">העלאת קובץ להורדה (אופציונלי)</button>
            <input type="text" id="gtTitle" placeholder="שם המשימה הגלובלית" style="width:90%">
            <input type="number" id="gtXP" placeholder="XP כפרס" style="width:90%; margin-top:5px;">
            <button onclick="sendGlobalTask()" style="width:100%; margin-top:10px; background:#fb8c00;">שלח לכולם! 🚀</button>`;
    }

    function sendGlobalTask() {
        const title = document.getElementById('gtTitle').value;
        const xp = parseInt(document.getElementById('gtXP').value);
        if(!title || !xp) return;
        const timeKey = Date.now();
        const dateStr = new Date().toLocaleDateString('he-IL');
        allStudents.forEach(s => {
            const tid = "global_" + timeKey + "_" + s.id;
            db.ref(`students/${s.id}/tasks/${tid}`).set({ taskId: tid, title, rewardXP: xp, date: dateStr });
        });
        alert("נשלח לכל החווה!"); closeModal();
    }

    function submitWork(sid, tid) {
        const val = document.getElementById('input-' + tid).value;
        if(!val.trim()) return;
        db.ref(`students/${sid}/tasks/${tid}`).update({ submission: val });
        alert("העבודה נשלחה!"); closeModal();
    }

    function approveTask(sid, tid, reward, multiplier) {
        const finalXP = Math.floor(reward * multiplier);
        addXP(sid, finalXP);
        db.ref(`students/${sid}/tasks/${tid}`).remove();
        closeModal();
    }

    function deleteTask(sid, tid) { if(confirm('למחוק משימה?')) db.ref(`students/${sid}/tasks/${tid}`).remove(); closeModal(); }

    function addStudent() {
        const nameInput = document.getElementById('studentName');
        if(!nameInput.value.trim()) return;
        const id = Date.now().toString();
        db.ref('students/'+id).set({
            id, name: nameInput.value, className: document.getElementById('studentClass').value,
            xp: 0, level: 0,
            type: CREATURE_TYPES[Math.floor(Math.random()*CREATURE_TYPES.length)],
            egg: Math.floor(Math.random()*5)
        });
        nameInput.value = '';
    }

    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
</script>
</body>
</html>
