<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>חוות הטמגוצ'י - גרסת ניהול ותלמידים</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>
body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #e0f7fa url('images/background.png') no-repeat center center fixed;
    background-size: cover;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* מסך כניסה */
#login-screen {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    width: 320px;
    margin-top: 50px;
    border: 2px solid #81c784;
}

#control-panel {
    display: none; /* מוסתר בהתחלה */
    background: rgba(255, 255, 255, 0.95);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    margin-bottom: 30px;
    width: 90%;
    max-width: 900px;
    display: none; 
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    border: 2px solid #81c784;
}

input, select, button {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
}

button {
    background-color: #2e7d32;
    color: white;
    cursor: pointer;
    border: none;
    font-weight: bold;
}

#farm-grid {
    display: none; /* מוסתר בהתחלה */
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px;
    width: 100%;
    max-width: 1200px;
}

.student-card {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 25px;
    padding: 20px;
    text-align: center;
    position: relative;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    border-bottom: 5px solid #81c784;
    transition: transform 0.3s;
}

.my-creature { border: 4px solid #fbc02d; transform: scale(1.05); z-index: 5; }

.level-text-badge {
    position: absolute;
    top: 5px;
    right: 15px;
    font-family: 'Arial Black', sans-serif;
    font-size: 1.4em;
    font-weight: 900;
    color: #2e7d32;
    z-index: 10;
    text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3);
}

.creature-img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    margin-bottom: 10px;
    transition: transform 0.1s;
}

/* אנימציות */
.glow-effect { animation: glow-pulse 0.6s ease-out; }
@keyframes glow-pulse {
    0% { filter: brightness(1); transform: scale(1); }
    50% { filter: brightness(1.6) drop-shadow(0 0 15px gold); transform: scale(1.25); }
    100% { filter: brightness(1); transform: scale(1); }
}

.shake { animation: shake 0.5s infinite; }
@keyframes shake {
    0%, 100% { transform: translate(1px, 1px) rotate(0deg); }
    25% { transform: translate(-1px, -2px) rotate(-1deg); }
    75% { transform: translate(1px, -2px) rotate(1deg); }
}

.hatch-crack { animation: eggCrack 0.9s ease-out forwards; }
@keyframes eggCrack {
    0% { transform: scale(1); }
    100% { transform: scale(0); opacity: 0; }
}

.xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
.xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }

.remove-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ff5252;
    color: white;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.xp-float {
    position: absolute;
    font-weight: bold;
    color: gold;
    font-size: 1.2em;
    animation: floatUp 0.8s ease-out forwards;
    left: 50%;
    top: 60px;
}
@keyframes floatUp { 0% { opacity: 1; transform: translate(-50%,0); } 100% { opacity: 0; transform: translate(-50%,-40px); } }

.levelup {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ffd700;
    color: #1b5e20;
    font-weight: bold;
    font-size: 1.5em;
    padding: 10px 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    z-index: 100;
    pointer-events: none;
    animation: levelPop 2s ease-out forwards;
}

@keyframes levelPop {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -30px) scale(1.2); }
    80% { opacity: 1; transform: translate(-50%, -40px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(0.8); }
}
.hatch-flash {
    position: absolute;
    width: 120px;
    height: 120px;
    background: white;
    border-radius: 50%;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    animation: hatchFlash 0.4s ease-out forwards;
}
@keyframes hatchFlash { 0% { transform: translateX(-50%) scale(0.5); opacity: 1; } 100% { transform: translateX(-50%) scale(2); opacity: 0; } }

#tasks-area {
    width: 90%;
    max-width: 1200px;
    margin-bottom: 20px;
    display: none; /* יוצג רק אחרי כניסה */
}

.task-card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    border-right: 6px solid #1976d2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

.task-info h4 { margin: 0; color: #333; }
.task-info a { color: #1976d2; font-size: 0.9em; }
    
</style>
</head>

<body>

<div id="login-screen">
    <h2>החווה המופלאה 🐾</h2>
    <div id="admin-login-area">
        <input type="password" id="adminPass" placeholder="סיסמת מנהל" style="width:80%; margin-bottom:10px;">
        <button onclick="checkAdmin()" style="width:90%;">כניסת מנהל 🔑</button>
    </div>
    <hr style="margin:20px 0;">
    <div id="student-login-area">
        <p>כניסת תלמידים:</p>
        <select id="studentSelect" style="width:90%; margin-bottom:10px;">
            <option value="">טוען רשימה...</option>
        </select>
        <button onclick="studentLogin()" style="width:90%; background-color:#1976d2;">אני רוצה להיכנס! ✨</button>
    </div>
</div>

<div id="control-panel">
    <input type="text" id="studentName" placeholder="שם התלמיד">
    <select id="studentClass">
        <option value="ה1">כיתה ה'1</option>
        <option value="ה2">כיתה ה'2</option>
    </select>
    <button onclick="addStudent()">צרף יצור לחווה 🐾</button>

    <div style="width:100%; display:flex; gap:10px; margin-top:10px;">
        <input type="text" id="search" placeholder="חפש לפי שם..." oninput="updateView()" style="flex:2;">
        <select id="sortBy" onchange="updateView()" style="flex:1;">
            <option value="name">מיין לפי שם</option>
            <option value="level">מיין לפי רמה</option>
            <option value="class">מיין לפי כיתה</option>
        </select>
        <button onclick="location.reload()" style="background:#555;">יציאה</button>
        <hr style="width:100%; margin: 15px 0;">
<div style="width:100%; display:flex; flex-wrap:wrap; gap:10px;">
    <input type="text" id="taskTitle" placeholder="כותרת המטלה" style="flex:1;">
    <input type="text" id="taskLink" placeholder="קישור למטלה (אופציונלי)" style="flex:1;">
    <button onclick="addTask()" style="background-color:#1976d2;">פרסם מטלה חדשה 📋</button>
</div>
    </div>
</div>

<div id="farm-grid"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
    authDomain: "liorfarm.firebaseapp.com",
    databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "liorfarm",
    storageBucket: "liorfarm.firebasestorage.app",
    messagingSenderId: "436063422896",
    appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CREATURE_TYPES = ['trt','snk','hnd','cat','crw','fsh','chk','fox','zbr','mnk','shp','cow','ost','rbt','dnk','duk','snl','owl','spd'];
let allStudents = [];
let currentUser = null; // 'admin' או ID של תלמיד

// האזנה לנתונים
db.ref('students').on('value', (snap) => {
    const data = snap.val();
    allStudents = data ? Object.values(data) : [];
    
    // עדכון הרשימה הנגללת בכניסה
    const select = document.getElementById('studentSelect');
    const currentVal = select.value;
    select.innerHTML = '<option value="">בחר את שמך...</option>';
    allStudents.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.name} (${s.className})`;
        select.appendChild(opt);
    });
    select.value = currentVal;

    updateView();
});

function checkAdmin() {
    if (document.getElementById('adminPass').value === 'rabenu247') {
        currentUser = 'admin';
        startApp();
    } else { alert('סיסמה שגויה'); }
}

function studentLogin() {
    const id = document.getElementById('studentSelect').value;
    if (!id) return alert('בחר שם מהרשימה');
    currentUser = id;
    startApp();
}

function startApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('farm-grid').style.display = 'grid';
    if (currentUser === 'admin') {
        document.getElementById('control-panel').style.display = 'flex';
    }
    updateView();
}

function addStudent() {
    const nameInput = document.getElementById('studentName');
    if (!nameInput.value.trim()) return;
    const id = Date.now().toString();
    db.ref('students/' + id).set({
        id,
        name: nameInput.value,
        className: document.getElementById('studentClass').value,
        xp: 0, level: 0,
        type: CREATURE_TYPES[Math.floor(Math.random() * CREATURE_TYPES.length)],
        egg: Math.floor(Math.random() * 5)
    });
    nameInput.value = '';
}

function addXP(id, xp, lvl) {
    // 1. אם זה תלמיד שלוחץ על מישהו אחר
    if (currentUser !== 'admin' && currentUser !== id) {
        alert("ואהבת לרעך כמוך! ❤️ (רק המורה יכול לתת XP)");
        return;
    }

    // 2. אם זה תלמיד שלוחץ על עצמו - נחסום הוספת XP (רק המורה נותן)
    if (currentUser !== 'admin' && currentUser === id) {
        // אפשר להוסיף כאן הודעה קטנה או פשוט לא לעשות כלום
        return; 
    }

    // --- מכאן והלאה: רק המנהל (admin) מגיע לקוד הזה ---

    const img = document.getElementById('img-' + id);
    const card = img?.closest('.student-card');

    if (img) {
        img.style.pointerEvents = "none";
        setTimeout(() => img.style.pointerEvents = "auto", 400);
        img.classList.remove('glow-effect');
        requestAnimationFrame(() => img.classList.add('glow-effect'));

        const xpFloat = document.createElement('div');
        xpFloat.className = 'xp-float';
        xpFloat.innerText = '+10 XP';
        card.appendChild(xpFloat);
        setTimeout(() => xpFloat.remove(), 800);
    }

    let nxp = xp + 10;
    let nlv = lvl;
    let isHatching = false;

    if (nxp >= 100) {
        nlv++;
        nxp = 0;
        if (lvl === 0) isHatching = true;

        // תיקון אנימציית Level Up (הוספת האלמנט לכרטיס)
        if (card) {
            const levelTag = document.createElement('div');
            levelTag.className = 'levelup';
            levelTag.innerText = 'LEVEL UP! ✨';
            card.appendChild(levelTag);
            setTimeout(() => levelTag.remove(), 2000); // הארכתי מעט את זמן התצוגה
        }
    }

    if (isHatching && img && card) {
        img.classList.add("hatch-crack");
        const flash = document.createElement("div");
        flash.className = "hatch-flash";
        card.appendChild(flash);
        setTimeout(() => {
            db.ref('students/' + id).update({ xp: nxp, level: nlv });
            flash.remove();
        }, 900);
        return;
    }

    setTimeout(() => {
        db.ref('students/' + id).update({ xp: nxp, level: nlv });
    }, 450);
}

function updateView() {
    const grid = document.getElementById('farm-grid');
    if (!currentUser) return;

    const searchTerm = document.getElementById('search').value.toLowerCase();
    const sortBy = document.getElementById('sortBy').value;

    let filtered = allStudents.filter(s => s.name.toLowerCase().includes(searchTerm));
    filtered.sort((a, b) => {
        if (sortBy === 'name') return a.name.localeCompare(b.name);
        if (sortBy === 'level') return b.level - a.level;
        return a.className.localeCompare(b.className);
    });

    grid.innerHTML = filtered.map(s => {
        const isShaking = (s.level === 0 && s.xp >= 90) ? 'shake' : '';
        const eggNum = (s.egg !== undefined) ? s.egg + 1 : 1;
        const isMine = currentUser === s.id;
        
        const imgPath = s.level === 0 
            ? `images/egg${eggNum}.png` 
            : `images/${s.type}${s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1)}.png`;

        const canClick = (currentUser === 'admin' || isMine);

        return `
        <div class="student-card ${isMine ? 'my-creature' : ''}">
            <div class="level-text-badge">Lv.${s.level}</div>
            
            ${currentUser === 'admin' ? 
                `<button class="remove-btn" onclick="if(confirm('למחוק?')) db.ref('students/${s.id}').remove()">✖</button>` : ''}

            <img id="img-${s.id}" src="${imgPath}" class="creature-img ${isShaking}" 
                 style="cursor: ${canClick ? 'pointer' : 'default'}"
                 onclick="addXP('${s.id}',${s.xp},${s.level})">

            <div style="font-weight:bold;font-size:1.2em;margin-top:5px;">${s.name}</div>
            <div style="color:#555;font-size:0.9em;">כיתה ${s.className}</div>
            <div class="xp-container">
                <div class="xp-bar" style="width:${s.xp}%"></div>
            </div>
            ${isMine ? '<div style="font-size:0.8em; color:#2e7d32; font-weight:bold;">זה היצור שלי! ✨</div>' : ''}
        </div>`;
    }).join('');
}
</script>

</body>
</html>
