<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - גרסה יציבה</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e0f7fa; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: right; }
        #login-screen { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 300px; margin-top: 50px; }
        #control-panel { display: none; background: #fff; padding: 20px; border-radius: 15px; width: 90%; max-width: 800px; margin-bottom: 20px; border: 2px solid #81c784; gap: 10px; flex-wrap: wrap; justify-content: center; }
        #farm-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .student-card { background: rgba(255,255,255,0.9); border-radius: 20px; padding: 15px; text-align: center; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .my-creature { border: 4px solid #fbc02d; transform: scale(1.05); }
        .creature-img { width: 100px; height: 100px; object-fit: contain; cursor: pointer; position: relative; z-index: 1; }
        .level-badge { position: absolute; top: 10px; right: 10px; background: #2e7d32; color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; font-size: 0.8em; }
        .xp-bar-bg { background: #eee; height: 12px; border-radius: 6px; margin-top: 10px; overflow: hidden; }
        .xp-bar-fill { background: gold; height: 100%; transition: width 0.5s; }
        .task-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 6px solid #1976d2; width: 100%; box-sizing: border-box; }
        .task-link { display: inline-block; background: #e3f2fd; color: #1976d2; padding: 5px 12px; border-radius: 5px; text-decoration: none; font-weight: bold; margin-top: 8px; border: 1px solid #1976d2; position: relative; z-index: 100; }
        button { cursor: pointer; border: none; border-radius: 8px; padding: 10px 15px; font-weight: bold; color: white; }
        .btn-blue { background: #1976d2; } .btn-green { background: #4caf50; } .btn-red { background: #f44336; }
        input, select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
        .glow { animation: glowAnim 0.6s ease; }
        @keyframes glowAnim { 0% { filter: brightness(1); } 50% { filter: brightness(1.5) drop-shadow(0 0 10px gold); } 100% { filter: brightness(1); } }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>החווה המופלאה 🐾</h2>
    <input type="password" id="adminPass" placeholder="סיסמת מנהל" style="width:80%; margin-bottom:10px;">
    <button class="btn-green" onclick="checkAdmin()" style="width:85%;">כניסת מנהל 🔑</button>
    <hr>
    <select id="studentSelect" style="width:85%; margin-bottom:10px;"><option>טוען רשימה...</option></select>
    <button class="btn-blue" onclick="studentLogin()" style="width:85%;">כניסת תלמיד ✨</button>
</div>

<div id="control-panel">
    <input type="text" id="sName" placeholder="שם תלמיד">
    <select id="sClass"><option value="ה1">ה1</option><option value="ה2">ה2</option></select>
    <button class="btn-green" onclick="addStudent()">הוסף תלמיד</button>
    <hr style="width:100%">
    <input type="text" id="tTitle" placeholder="כותרת מטלה" style="flex:1">
    <input type="text" id="tLink" placeholder="קישור (אם יש)" style="flex:1">
    <input type="number" id="tXP" value="20" style="width:60px">
    <button class="btn-blue" onclick="addTask()">פרסם מטלה</button>
    <div id="submissions-area" style="width:100%; background:#f9f9f9; padding:10px; margin-top:10px; border-radius:10px;">
        <b>הגשות חדשות:</b>
        <div id="subs-list">אין הגשות</div>
    </div>
</div>

<div id="tasks-area" style="display:none; width:90%; max-width:800px;">
    <h3>משימות 📋</h3>
    <div id="tasks-list"></div>
</div>

<div id="farm-grid"></div>

<div id="sub-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:20px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.5); z-index:1000; width:280px; text-align:center;">
    <h4 id="sub-title">הגשת מטלה</h4>
    <button class="btn-green" onclick="window.open('https://send.magicode.me/', '_blank')" style="margin-bottom:10px;">1. העלה קובץ כאן</button>
    <input type="text" id="sub-url" placeholder="2. הדבק כאן את הקישור" style="width:90%; margin-bottom:10px;">
    <button class="btn-blue" onclick="submitTask()">שלח הגשה 🚀</button>
    <button onclick="closeModal()" style="background:none; color:gray; border:none; margin-top:10px;">ביטול</button>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE", authDomain: "liorfarm.firebaseapp.com", databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app", projectId: "liorfarm", storageBucket: "liorfarm.firebasestorage.app", messagingSenderId: "436063422896", appId: "1:436063422896:web:4cb14fbcc036ba97676e75" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = [], tasks = [], user = null, activeTask = null;

// טעינת נתונים
db.ref('students').on('value', s => {
    students = s.val() ? Object.values(s.val()) : [];
    const sel = document.getElementById('studentSelect');
    sel.innerHTML = '<option value="">בחר שם...</option>';
    students.forEach(st => sel.innerHTML += `<option value="${st.id}">${st.name} (${st.className})</option>`);
    renderFarm();
});

db.ref('tasks').on('value', t => {
    tasks = t.val() ? Object.values(t.val()) : [];
    renderTasks();
});

// התחברות
function checkAdmin() { if(document.getElementById('adminPass').value==='rabenu247') { user='admin'; go(); } }
function studentLogin() { user=document.getElementById('studentSelect').value; if(user) go(); }
function go() {
    document.getElementById('login-screen').style.display='none';
    document.getElementById('farm-grid').style.display='grid';
    document.getElementById('tasks-area').style.display='block';
    if(user==='admin') {
        document.getElementById('control-panel').style.display='flex';
        loadSubs();
    }
}

// ניהול חווה
function renderFarm() {
    const grid = document.getElementById('farm-grid');
    grid.innerHTML = students.map(s => {
        let img = s.level === 0 ? `images/egg${(s.egg||0)+1}.png` : `images/${s.type}${s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1)}.png`;
        return `
            <div class="student-card ${user === s.id ? 'my-creature' : ''}">
                <div class="level-badge">Lv.${s.level}</div>
                <img src="${img}" class="creature-img" id="img-${s.id}" onclick="if(user==='admin')giveXP('${s.id}',10)">
                <div style="font-weight:bold; margin-top:5px;">${s.name}</div>
                <div class="xp-bar-bg"><div class="xp-bar-fill" style="width:${s.xp}%"></div></div>
            </div>`;
    }).join('');
}

function giveXP(id, amt) {
    const s = students.find(x => x.id === id);
    let nxp = s.xp + amt, nlvl = s.level;
    if(nxp >= 100) { nxp = 0; nlvl++; }
    db.ref('students/'+id).update({xp: nxp, level: nlvl});
    const el = document.getElementById('img-'+id);
    if(el) { el.classList.remove('glow'); void el.offsetWidth; el.classList.add('glow'); }
}

function addStudent() {
    const id = Date.now().toString();
    db.ref('students/'+id).set({
        id, name: document.getElementById('sName').value, className: document.getElementById('sClass').value,
        xp: 0, level: 0, egg: Math.floor(Math.random()*5), type: 'cat'
    });
}

// ניהול מטלות
function addTask() {
    const id = Date.now().toString();
    db.ref('tasks/'+id).set({
        id, title: document.getElementById('tTitle').value, link: document.getElementById('tLink').value,
        xp: parseInt(document.getElementById('tXP').value)||20
    });
}

function renderTasks() {
    const list = document.getElementById('tasks-list');
    list.innerHTML = tasks.map(t => `
        <div class="task-card">
            <div>
                <b style="font-size:1.1em;">${t.title}</b><br>
                ${t.link ? `<a href="${t.link}" target="_blank" class="task-link">📎 פתח קובץ מטלה</a>` : ''}
                <div style="color:gray; font-size:0.8em; margin-top:5px;">פרס: ${t.xp} XP</div>
            </div>
            ${user==='admin' ? 
                `<button class="btn-red" onclick="db.ref('tasks/${t.id}').remove()">מחק</button>` : 
                `<button class="btn-blue" onclick="openSub('${t.id}','${t.title}')">הגש ✍️</button>`}
        </div>`).join('');
}

// הגשות
function openSub(id, title) { activeTask = id; document.getElementById('sub-title').innerText=title; document.getElementById('sub-modal').style.display='block'; }
function closeModal() { document.getElementById('sub-modal').style.display='none'; }
function submitTask() {
    const url = document.getElementById('sub-url').value;
    if(!url) return alert("הדבק קישור!");
    const subId = Date.now().toString();
    db.ref('submissions/'+subId).set({
        id: subId, studentId: user, studentName: students.find(x=>x.id===user).name,
        taskId: activeTask, content: url
    });
    alert("נשלח למורה!"); closeModal();
}

function loadSubs() {
    db.ref('submissions').on('value', snap => {
        const list = document.getElementById('subs-list');
        list.innerHTML = '';
        if(!snap.val()) { list.innerHTML = 'אין הגשות'; return; }
        Object.values(snap.val()).forEach(sub => {
            list.innerHTML += `
                <div style="background:white; margin-top:5px; padding:8px; border-radius:5px; border:1px solid #ddd;">
                    <b>${sub.studentName}</b> | <a href="${sub.content}" target="_blank">צפה בקובץ</a>
                    <button class="btn-green" onclick="approve('${sub.id}','${sub.studentId}','${sub.taskId}')" style="padding:2px 8px; margin-right:10px;">אשר</button>
                </div>`;
        });
    });
}

function approve(sid, stid, tid) {
    const t = tasks.find(x=>x.id===tid);
    giveXP(stid, t ? t.xp : 20);
    db.ref('submissions/'+sid).remove();
}
</script>
</body>
</html>
