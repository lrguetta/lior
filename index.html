<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י שלי</title>
    <style>
        /* עיצוב כללי - רקע וגופנים */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* לוח בקרה */
        #control-panel, #backup-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin-bottom: 30px;
            width: 90%;
            max-width: 900px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            border: 2px solid #81c784;
        }

        #backup-panel {
            border-color: #2196f3;
            margin-top: 40px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        
        input, select, button {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 15px;
            outline: none;
        }

        button {
            background-color: #2e7d32;
            color: white;
            cursor: pointer;
            border: none;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover { background-color: #1b5e20; transform: translateY(-2px); }

        .btn-export { background-color: #2196f3; }
        .btn-import { background-color: #4caf50; }

        /* תצוגת החווה */
        #farm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        /* כרטיס יצור */
        .student-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-bottom: 5px solid #81c784;
            transition: transform 0.3s ease;
        }

        .student-card:hover { transform: scale(1.03); }

        .level-text-badge {
            position: absolute;
            top: 5px;
            right: 15px;
            font-family: 'Arial Black', Gadget, sans-serif;
            font-size: 1.4em;
            font-weight: 900;
            color: #2e7d32;
            z-index: 10;
            text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, -1.5px 1.5px 0 #fff, 1.5px 1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3);
        }

        .creature-img {
            width: 120px;
            height: 120px;
            cursor: pointer;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        .xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }

        .remove-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px; height: 25px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        .shake { animation: shake 0.5s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(0deg); }
        }

        .pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop {
            0% { transform: scale(0.8); }
            100% { transform: scale(1); }
        }

        .glow-effect { animation: glow-pulse 0.6s ease-out; }
        @keyframes glow-pulse {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.5) drop-shadow(0 0 10px #ffeb3b); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>

<div id="control-panel">
    <div class="input-group">
        <input type="text" id="studentName" placeholder="שם התלמיד">
    </div>
    <div class="input-group">
        <select id="studentClass">
            <option value="ה1">כיתה ה'1</option>
            <option value="ה2">כיתה ה'2</option>
        </select>
    </div>
    <button onclick="addStudent()">צרף יצור לחווה 🐾</button>
    
    <div style="width: 100%; display: flex; gap: 10px; margin-top: 10px;">
        <input type="text" id="search" placeholder="חפש לפי שם..." oninput="renderFarm()" style="flex: 2;">
        <select id="sortBy" onchange="renderFarm()" style="flex: 1;">
            <option value="name">מיין לפי שם</option>
            <option value="level">מיין לפי רמה</option>
            <option value="class">מיין לפי כיתה</option>
        </select>
    </div>
</div>

<div id="farm-grid"></div>

<div id="backup-panel">
    <h3 style="width: 100%; text-align: center; margin-top: 0; color: #1976d2;">ניהול נתוני תלמידים (גיבוי והעברה)</h3>
    <button class="btn-export" onclick="exportFarmData()">⬇️ הורד קובץ גיבוי</button>
    <button class="btn-import" onclick="document.getElementById('importFile').click()">⬆️ טען נתונים מקובץ</button>
    <input type="file" id="importFile" style="display:none" onchange="importFarmData(this)">
    <p style="font-size: 0.8em; color: #666; width: 100%; text-align: center;">השתמש בכפתורים אלו כדי להעביר את התלמידים למחשב אחר או לגיטהאב.</p>
</div>

<script>
    const CREATURE_TYPES = ['trt', 'snk', 'hnd', 'cat', 'crw', 'fsh', 'chk', 'fox', 'zbr', 'mnk', 'shp', 'cow', 'ost', 'rbt', 'dnk', 'duk', 'snl', 'owl', 'spd'];
    const EGG_IMAGES = ['images/egg1.png', 'images/egg2.png', 'images/egg3.png', 'images/egg4.png', 'images/egg5.png'];

    let students = JSON.parse(localStorage.getItem('farmData')) || [];

    function addStudent() {
        const nameInput = document.getElementById('studentName');
        const classSelect = document.getElementById('studentClass');
        if (!nameInput.value.trim()) return alert("נא להזין שם תלמיד");

        students.push({
            id: Date.now(),
            name: nameInput.value,
            className: classSelect.value,
            xp: 0,
            level: 0,
            creatureType: CREATURE_TYPES[Math.floor(Math.random() * CREATURE_TYPES.length)],
            eggIndex: Math.floor(Math.random() * EGG_IMAGES.length)
        });

        nameInput.value = '';
        saveAndRender();
    }

    function addXP(id) {
        const student = students.find(s => s.id === id);
        student.xp += 10;

        if (student.xp >= 100) {
            student.level++;
            student.xp = 0;
        }

        saveAndRender();
        triggerVisualEffect(id);
    }

    function triggerVisualEffect(id) {
        const img = document.getElementById(`img-${id}`);
        if (!img) return;
        img.classList.remove('glow-effect');
        void img.offsetWidth; 
        img.classList.add('glow-effect');
    }

    function getImagePath(student) {
        if (student.level === 0) return EGG_IMAGES[student.eggIndex];
        let stage = 1;
        if (student.level >= 20) stage = 3;
        else if (student.level >= 10) stage = 2;
        return `images/${student.creatureType}${stage}.png`;
    }

    function removeStudent(id) {
        if (confirm("האם אתה בטוח שברצונך למחוק את היצור?")) {
            students = students.filter(s => s.id !== id);
            saveAndRender();
        }
    }

    function saveAndRender() {
        localStorage.setItem('farmData', JSON.stringify(students));
        renderFarm();
    }

    // פונקציות ייצוא וייבוא
    function exportFarmData() {
        const dataStr = JSON.stringify(students, null, 2);
        const blob = new Blob([dataStr], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "farm_backup_" + new Date().toLocaleDateString() + ".txt";
        link.click();
        alert("קובץ הגיבוי ירד! שמור אותו כדי להעלות לגיטהאב.");
    }

    function importFarmData(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function() {
            try {
                const data = JSON.parse(reader.result);
                // תמיכה גם בפורמט לוקל סטוראג' ישיר וגם במערך סטודנטים
                students = Array.isArray(data) ? data : (JSON.parse(data.farmData) || []);
                saveAndRender();
                alert("הנתונים הועלו בהצלחה!");
            } catch (e) {
                alert("שגיאה בקריאת הקובץ. וודא שזה קובץ הגיבוי הנכון.");
            }
        };
        reader.readAsText(file);
    }

    function renderFarm() {
        const grid = document.getElementById('farm-grid');
        const searchTerm = document.getElementById('search').value.toLowerCase();
        const sortBy = document.getElementById('sortBy').value;

        let filtered = students.filter(s => s.name.toLowerCase().includes(searchTerm));
        filtered.sort((a, b) => {
            if (sortBy === 'name') return a.name.localeCompare(b.name);
            if (sortBy === 'level') return b.level - a.level;
            return a.className.localeCompare(b.className);
        });

        grid.innerHTML = filtered.map(s => {
            const isShaking = (s.level === 0 && s.xp >= 90) ? 'shake' : '';
            return `
                <div class="student-card pop">
                    <div class="level-text-badge">Lv.${s.level}</div>
                    <button class="remove-btn" onclick="removeStudent(${s.id})">×</button>
                    <img id="img-${s.id}" src="${getImagePath(s)}" class="creature-img ${isShaking}" onclick="addXP(${s.id})">
                    <div style="font-weight:bold; font-size:1.2em;">${s.name}</div>
                    <div style="color:#555;">כיתה ${s.className}</div>
                    <div class="xp-container">
                        <div class="xp-bar" style="width: ${s.xp}%"></div>
                    </div>
                    <div style="font-size: 0.85em; font-weight: bold; color: #2e7d32;">
                        ${s.level === 0 ? 'שלב: ביצה' : 'רמה: ' + s.level} (${s.xp}/100 XP)
                    </div>
                </div>`;
        }).join('');
    }
    
    renderFarm();
</script>

</body>
</html>
