<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - גרסת Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        #control-panel, #backup-panel {
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); margin-bottom: 30px;
            width: 90%; max-width: 900px; display: flex; flex-wrap: wrap; gap: 15px;
            justify-content: center; border: 2px solid #81c784;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input, select, button { padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; }
        button { background-color: #2e7d32; color: white; cursor: pointer; border: none; font-weight: bold; transition: all 0.2; }
        button:hover { background-color: #1b5e20; transform: translateY(-2px); }

        #farm-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; width: 100%; max-width: 1200px; 
        }

        .student-card {
            background: rgba(255, 255, 255, 0.9); border-radius: 25px; padding: 20px;
            text-align: center; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-bottom: 5px solid #81c784; transition: transform 0.3s ease;
        }

        .level-text-badge {
            position: absolute; top: 5px; right: 15px; font-family: 'Arial Black', sans-serif;
            font-size: 1.4em; font-weight: 900; color: #2e7d32; z-index: 10;
            text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3);
        }

        .creature-img { width: 120px; height: 120px; cursor: pointer; object-fit: contain; margin-bottom: 10px; }

        /* האפקטים שעבדו לך */
        .shake { animation: shake 0.5s infinite; }
        @keyframes shake {
            0%, 100% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-1deg); }
            75% { transform: translate(1px, -2px) rotate(1deg); }
        }

        .glow-effect { animation: glow-pulse 0.6s ease-out; }
        @keyframes glow-pulse {
            0% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(1.5) drop-shadow(0 0 15px #ffeb3b); transform: scale(1.2); }
            100% { filter: brightness(1); transform: scale(1); }
        }

        .xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        .xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }
        .remove-btn { position: absolute; top: 10px; left: 10px; background: #ff5252; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; }
    </style>
</head>
<body>

<div id="control-panel">
    <input type="text" id="studentName" placeholder="שם התלמיד">
    <select id="studentClass"><option value="ה1">כיתה ה'1</option><option value="ה2">כיתה ה'2</option></select>
    <button onclick="addStudent()">צרף יצור לחווה 🐾</button>
</div>

<div id="farm-grid"></div>

<script>
    // הגדרות Firebase שלך
    const firebaseConfig = {
      apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
      authDomain: "liorfarm.firebaseapp.com",
      databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "liorfarm",
      storageBucket: "liorfarm.firebasestorage.app",
      messagingSenderId: "436063422896",
      appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const CREATURE_TYPES = ['trt', 'snk', 'hnd', 'cat', 'crw', 'fsh', 'chk', 'fox', 'zbr', 'mnk', 'shp', 'cow', 'ost', 'rbt', 'dnk', 'duk', 'snl', 'owl', 'spd'];
    const EGG_IMAGES = ['images/egg1.png', 'images/egg2.png', 'images/egg3.png', 'images/egg4.png', 'images/egg5.png'];

    // האזנה לשינויים ב-Firebase
    db.ref('students').on('value', (snap) => {
        const data = snap.val();
        renderFarm(data ? Object.values(data) : []);
    });

    function addStudent() {
        const nameInput = document.getElementById('studentName');
        const classSelect = document.getElementById('studentClass');
        if (!nameInput.value.trim()) return;

        const id = Date.now().toString();
        db.ref('students/' + id).set({
            id: id,
            name: nameInput.value,
            className: classSelect.value,
            xp: 0,
            level: 0,
            creatureType: CREATURE_TYPES[Math.floor(Math.random() * CREATURE_TYPES.length)],
            eggIndex: Math.floor(Math.random() * EGG_IMAGES.length)
        });
        nameInput.value = '';
    }

    function addXP(id, currentXP, currentLevel) {
        // הפעלת האפקט הויזואלי מיד בלחיצה
        const img = document.getElementById(`img-${id}`);
        if (img) {
            img.classList.remove('glow-effect');
            void img.offsetWidth; 
            img.classList.add('glow-effect');
        }

        let newXP = currentXP + 10;
        let newLevel = currentLevel;

        if (newXP >= 100) {
            newLevel++;
            newXP = 0;
        }

        db.ref('students/' + id).update({ xp: newXP, level: newLevel });
    }

    function getImagePath(s) {
        if (s.level === 0) return EGG_IMAGES[s.eggIndex];
        let stage = s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1);
        return `images/${s.creatureType}${stage}.png`;
    }

    function removeStudent(id) {
        if (confirm("למחוק את היצור?")) db.ref('students/' + id).remove();
    }

    function renderFarm(studentsList) {
        const grid = document.getElementById('farm-grid');
        grid.innerHTML = studentsList.map(s => {
            const isShaking = (s.level === 0 && s.xp >= 90) ? 'shake' : '';
            return `
                <div class="student-card">
                    <div class="level-text-badge">Lv.${s.level}</div>
                    <button class="remove-btn" onclick="removeStudent('${s.id}')">×</button>
                    <img id="img-${s.id}" src="${getImagePath(s)}" class="creature-img ${isShaking}" 
                         onclick="addXP('${s.id}', ${s.xp}, ${s.level})">
                    <div style="font-weight:bold; font-size:1.2em;">${s.name}</div>
                    <div style="color:#555;">כיתה ${s.className}</div>
                    <div class="xp-container">
                        <div class="xp-bar" style="width: ${s.xp}%"></div>
                    </div>
                </div>`;
        }).join('');
    }
</script>
</body>
</html>
