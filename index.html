<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>חוות הטמגוצ'י - גרסה סופית עם מטלות אינטראקטיביות</title>

<!-- Firebase -->
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>

<style>
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e0f7fa url('images/background.png') no-repeat center center fixed; background-size: cover; margin:0; padding:20px; display:flex; flex-direction:column; align-items:center; }
#login-screen { background: rgba(255,255,255,0.95); padding:30px; border-radius:20px; width:320px; text-align:center; margin-top:50px; border:2px solid #81c784; }
#control-panel { display:none; background: rgba(255,255,255,0.95); padding:25px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.15); margin-bottom:30px; width:90%; max-width:900px; flex-wrap:wrap; gap:15px; justify-content:center; border:2px solid #81c784; }
input, select, button { padding:12px; border-radius:10px; border:1px solid #ddd; font-size:15px; }
button { background-color:#2e7d32; color:white; cursor:pointer; border:none; font-weight:bold; }
#farm-grid { display:none; grid-template-columns:repeat(auto-fill, minmax(220px,1fr)); gap:25px; width:100%; max-width:1200px; }
.student-card { background:rgba(255,255,255,0.9); border-radius:25px; padding:20px; text-align:center; position:relative; box-shadow:0 5px 15px rgba(0,0,0,0.1); border-bottom:5px solid #81c784; transition:transform 0.3s; }
.my-creature { border:4px solid #fbc02d; transform:scale(1.05); z-index:5; }
.level-text-badge { position:absolute; top:5px; right:15px; font-family:'Arial Black', sans-serif; font-size:1.4em; font-weight:900; color:#2e7d32; z-index:10; text-shadow:-1.5px -1.5px 0 #fff,1.5px -1.5px 0 #fff,0 2px 4px rgba(0,0,0,0.3); }
.creature-img { width:120px; height:120px; object-fit:contain; margin-bottom:10px; cursor:pointer; }
.glow-effect { animation: glow-pulse 0.6s ease-out; }
@keyframes glow-pulse { 0% { filter: brightness(1); transform: scale(1); } 50% { filter: brightness(1.6) drop-shadow(0 0 15px gold); transform: scale(1.25); } 100% { filter: brightness(1); transform: scale(1); } }
.xp-container { background:#eee; border-radius:10px; height:18px; margin:10px 0; overflow:hidden; border:1px solid #ccc; }
.xp-bar { background: linear-gradient(90deg,#ffeb3b,#fbc02d); height:100%; transition: width 0.4s ease-out; }
.remove-btn { position:absolute; top:10px; left:10px; background:#ff5252; color:white; border-radius:50%; width:28px; height:28px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
#tasks-area { width:90%; max-width:1200px; margin-bottom:20px; display:none; }
.task-card { background:white; padding:15px; border-radius:12px; margin-bottom:10px; border-right:6px solid #1976d2; display:flex; justify-content:space-between; align-items:center; box-shadow:0 4px 6px rgba(0,0,0,0.05); }
.task-info h4 { margin:0; color:#333; }
.task-info a { color:#1976d2; font-size:0.9em; text-decoration:none; }
#submit-modal, #interactive-task-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:15px; box-shadow:0 0 25px rgba(0,0,0,0.5); z-index:1000; width:300px; max-height:80vh; overflow:auto; }
#interactive-task-modal { width:500px; }
</style>
</head>
<body>

<!-- מסך כניסה -->
<div id="login-screen">
<h2>חווה אינטראקטיבית 🐾</h2>
<div id="admin-login-area">
<input type="password" id="adminPass" placeholder="סיסמת מנהל" style="width:80%; margin-bottom:10px;">
<button onclick="checkAdmin()" style="width:90%;">כניסת מנהל 🔑</button>
</div>
<hr style="margin:20px 0;">
<div id="student-login-area">
<p>כניסת תלמידים:</p>
<select id="studentSelect" style="width:90%; margin-bottom:10px;">
<option value="">טוען רשימה...</option>
</select>
<button onclick="studentLogin()" style="width:90%; background-color:#1976d2;">אני רוצה להיכנס! ✨</button>
</div>
</div>

<!-- פאנל מנהל -->
<div id="control-panel">
<div style="display:flex; gap:10px; width:100%; flex-wrap:wrap; justify-content:center; align-items:center;">
<input type="text" id="studentName" placeholder="שם התלמיד">
<select id="studentClass">
<option value="ה1">כיתה ה'1</option>
<option value="ה2">כיתה ה'2</option>
</select>
<button onclick="addStudent()">צרף יצור לחווה 🐾</button>
<button onclick="toggleTaskPanel()"> פרסום מטלה חדשה 📋</button>
<button onclick="openInteractiveTaskEditor()" style="background:#ff9800;">עורך מטלות אינטראקטיבי 📝</button>
</div>

<div style="width:100%; display:flex; gap:10px; margin-top:10px;">
<input type="text" id="search" placeholder="חפש לפי שם..." oninput="updateView()" style="flex:2;">
<select id="sortBy" onchange="updateView()" style="flex:1;">
<option value="name">מיין לפי שם</option>
<option value="level">מיין לפי רמה</option>
<option value="class">מיין לפי כיתה</option>
</select>
<button onclick="location.reload()" style="background:#555;">יציאה</button>
</div>

<hr style="width:100%; margin:15px 0;">

<div id="task-panel" style="display:none; width:100%; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
<input type="text" id="taskTitle" placeholder="כותרת המטלה" style="width:100px;">
<select id="taskFileSelect" style="width:150px;"><option value="">טוען משימות...</option></select>
<button onclick="fetchGithubFiles()" style="background:#555; padding:8px;">🔄</button>
<input type="date" id="taskDeadline" style="width:120px;">
<input type="number" id="taskXP" placeholder="XP למטלה" value="100" style="width:60px;">
<button onclick="addTask()" style="background-color:#1976d2;">פרסם מטלה 📋</button>
</div>

<div id="admin-submissions" style="width:100%; margin-top:20px; background:#f1f8e9; padding:15px; border-radius:10px; border:1px dashed #2e7d32; text-align:right;">
<h4 style="margin:0 0 10px 0;">הגשות שממתינות לבדיקה 📥</h4>
<div id="submissions-list">אין הגשות חדשות</div>
</div>
</div>

<!-- אזור מטלות -->
<div id="tasks-area">
<h3 style="background: rgba(255,255,255,0.8); padding:8px 12px; border-radius:8px; display:inline-block;">משימות להשלמה 📝</h3>
<div id="tasks-list"></div>
</div>

<!-- חוות יצורים -->
<div id="farm-grid"></div>

<!-- מודאל הגשה רגילה -->
<div id="submit-modal">
<h3 id="modal-task-title">הגשת מטלה</h3>
<button onclick="window.open('https://send.magicode.me/', '_blank')" style="background:#ff9800; color:white; margin-bottom:10px;">העלאת קבצים 📤</button>
<textarea id="submit-content" placeholder="הדבק כאן את הקישור מהמג'יקוד" style="width:100%; height:80px; margin-bottom:10px; padding:5px;"></textarea>
<div style="display:flex; gap:10px;">
<button onclick="sendSubmission()" style="flex:1; background:#4caf50;">שלח הגשה 🚀</button>
<button onclick="closeModal()" style="flex:1; background:#999;">ביטול</button>
</div>
</div>

<!-- מודאל עורך מטלה אינטראקטיבי -->
<div id="interactive-task-modal">
<h3>יצירת מטלה אינטראקטיבית</h3>
<label>כותרת המטלה:</label>
<input type="text" id="interactiveTaskTitle" style="width:100%; margin-bottom:10px;">
<label>סוג השאלה:</label>
<select id="questionType" style="width:100%; margin-bottom:10px;" onchange="updateQuestionEditor()">
<option value="multiple-choice">בחירה מרובה</option>
<option value="short-text">טקסט קצר</option>
<option value="true-false">נכון/לא נכון</option>
</select>
<div id="questionEditor" style="margin-bottom:10px;"></div>
<label>XP למטלה:</label>
<input type="number" id="interactiveTaskXP" value="20" style="width:60px; margin-bottom:10px;">
<label>תאריך יעד:</label>
<input type="date" id="interactiveTaskDeadline" style="margin-bottom:10px;">
<div style="display:flex; gap:10px;">
<button onclick="saveInteractiveTask()" style="flex:1; background:#1976d2; color:white;">שמור מטלה 💾</button>
<button onclick="closeInteractiveTaskModal()" style="flex:1; background:#999;">ביטול ❌</button>
</div>
</div>

<script>
// --- Firebase --- 
const firebaseConfig = {
    apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
    authDomain: "liorfarm.firebaseapp.com",
    databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "liorfarm",
    storageBucket: "liorfarm.firebasestorage.app",
    messagingSenderId: "436063422896",
    appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CREATURE_TYPES = ['trt','snk','hnd','cat','crw','fsh','chk','fox','zbr','mnk','shp','cow','ost','rbt','dnk','duk','snl','owl','spd'];
let allStudents = [], currentUser = null, allTasks = [], allSubmissions = {}, currentTaskToSubmit=null;

// --- טעינת תלמידים ---
db.ref('students').on('value', snap => {
    const data = snap.val();
    allStudents = data ? Object.values(data) : [];
    const select = document.getElementById('studentSelect');
    const val = select.value;
    select.innerHTML = '<option value="">בחר את שמך...</option>';
    allStudents.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.name} (${s.className})`;
        select.appendChild(opt);
    });
    select.value = val;
    updateView();
});

// --- כניסה ---
function checkAdmin(){ if(document.getElementById('adminPass').value==='rabenu247'){ currentUser='admin'; startApp(); } else alert('סיסמה שגויה'); }
function studentLogin(){ const id=document.getElementById('studentSelect').value; if(!id)return alert('בחר שם מהרשימה'); currentUser=id; startApp(); }

// --- התחלת אפליקציה ---
function startApp(){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('farm-grid').style.display='grid';
    document.getElementById('tasks-area').style.display='block';
    if(currentUser==='admin'){ document.getElementById('control-panel').style.display='flex'; fetchGithubFiles(); initAdminSubmissions(); }
    renderTasks();
    updateView();
}

// --- עדכון תצוגת תלמידים ---
function updateView() {
    const search = document.getElementById('search').value.toLowerCase();
    const sortBy = document.getElementById('sortBy').value;
    const grid = document.getElementById('farm-grid');
    grid.innerHTML = '';
    let students = allStudents.filter(s => s.name.toLowerCase().includes(search));
    if(sortBy==='name') students.sort((a,b)=>a.name.localeCompare(b.name));
    if(sortBy==='level') students.sort((a,b)=>b.level - a.level);
    if(sortBy==='class') students.sort((a,b)=>a.className.localeCompare(b.className));
    students.forEach(renderStudentCard);
}

// --- יצירת כרטיס תלמיד ---
function renderStudentCard(student){
    const grid=document.getElementById('farm-grid');
    const card=document.createElement('div');
    card.className='student-card';
    if(currentUser===student.id) card.classList.add('my-creature');
    card.innerHTML=`
        <div class="level-text-badge">Lv ${student.level||1}</div>
        <img src="images/${CREATURE_TYPES[student.egg%CREATURE_TYPES.length]}.png" class="creature-img" onclick="gainXP('${student.id}',10)">
        <h4>${student.name} (${student.className})</h4>
        <div class="xp-container"><div class="xp-bar" style="width:${student.xp?Math.min(student.xp,100):0}%"></div></div>
        ${currentUser==='admin'?'<div class="remove-btn" onclick="removeStudent(\''+student.id+'\')">✖</div>':''}
    `;
    grid.appendChild(card);
}

// --- להוסיף XP לכרטיס ---
function gainXP(id, amount){
    if(currentUser==='admin' || currentUser===id){
        const ref=db.ref('students/'+id);
        ref.once('value').then(snap=>{
            const data=snap.val()||{};
            data.xp=(data.xp||0)+amount;
            if(data.xp>=100){ data.level=(data.level||1)+1; data.xp=0; }
            ref.set(data);
        });
    }
}

// --- הוספת תלמיד חדש ---
function addStudent(){
    const name=document.getElementById('studentName').value.trim();
    const className=document.getElementById('studentClass').value;
    if(!name) return alert('הכנס שם!');
    const id=''+Date.now();
    db.ref('students/'+id).set({id,name,className,egg:Math.floor(Math.random()*CREATURE_TYPES.length),level:1,xp:0});
    document.getElementById('studentName').value='';
}

// --- הסרת תלמיד ---
function removeStudent(id){ if(confirm('למחוק תלמיד זה?')) db.ref('students/'+id).remove(); }

// --- הפעלת פאנל מטלות ---
function toggleTaskPanel(){
    const panel=document.getElementById('task-panel');
    panel.style.display=(panel.style.display==='flex'?'none':'flex');
}

// --- פרסום מטלה רגילה ---
function addTask(){
    const title=document.getElementById('taskTitle').value.trim();
    const file=document.getElementById('taskFileSelect').value;
    const deadline=document.getElementById('taskDeadline').value;
    const xp=parseInt(document.getElementById('taskXP').value)||50;
    if(!title) return alert('הכנס כותרת!');
    const id='task_'+Date.now();
    const task={id,title,file,deadline,xp};
    db.ref('tasks/'+id).set(task);
    document.getElementById('taskTitle').value='';
    renderTasks();
}

// --- הצגת מטלות לכל תלמיד ---
function renderTasks(){
    const list=document.getElementById('tasks-list');
    list.innerHTML='';
    db.ref('tasks').once('value').then(snap=>{
        const data=snap.val();
        allTasks = data ? Object.values(data) : [];
        allTasks.forEach(task=>{
            const card=document.createElement('div');
            card.className='task-card';
            card.innerHTML=`<div class="task-info"><h4>${task.title}</h4><a href="#" onclick="openSubmitModal('${task.id}')">הגש מטלה</a></div><div>${task.xp} XP</div>`;
            list.appendChild(card);
        });
    });
}

// --- מודאל הגשה ---
function openSubmitModal(taskId){
    currentTaskToSubmit=taskId;
    const task = allTasks.find(t=>t.id===taskId);
    document.getElementById('modal-task-title').textContent = task.title;
    document.getElementById('submit-content').value='';
    document.getElementById('submit-modal').style.display='block';
}
function closeModal(){ document.getElementById('submit-modal').style.display='none'; }
function sendSubmission(){
    const val=document.getElementById('submit-content').value.trim();
    if(!val) return alert('הכנס תוכן או קישור!');
    const id='sub_'+Date.now();
    db.ref('submissions/'+id).set({studentId:currentUser,taskId:currentTaskToSubmit,content:val,date:Date.now()});
    alert('ההגשה נשלחה ✅'); closeModal();
}

// --- פאנל עורך מטלה אינטראקטיבית ---
function openInteractiveTaskEditor(){ document.getElementById('interactive-task-modal').style.display='block'; updateQuestionEditor(); }
function closeInteractiveTaskModal(){ document.getElementById('interactive-task-modal').style.display='none'; }
function updateQuestionEditor(){
    const type=document.getElementById('questionType').value;
    const editor=document.getElementById('questionEditor');
    editor.innerHTML='';
    if(type==='multiple-choice'){
        for(let i=1;i<=4;i++){ editor.innerHTML+=`<input type="text" placeholder="אפשרות ${i}" class="mc-option" style="width:100%; margin-bottom:5px;">`; }
        editor.innerHTML+=`<input type="number" placeholder="מספר האפשרות הנכונה (1-4)" id="mc-correct" style="width:50px;">`;
    }
    if(type==='short-text'){ editor.innerHTML='<input type="text" placeholder="תשובה נכונה" style="width:100%;">'; }
    if(type==='true-false'){ editor.innerHTML='<select style="width:100%;"><option value="true">נכון</option><option value="false">לא נכון</option></select>'; }
}
function saveInteractiveTask(){
    const title=document.getElementById('interactiveTaskTitle').value.trim();
    const type=document.getElementById('questionType').value;
    const deadline=document.getElementById('interactiveTaskDeadline').value;
    const xp=parseInt(document.getElementById('interactiveTaskXP').value)||20;
    if(!title) return alert('הכנס כותרת!');
    const id='itask_'+Date.now();
    let correct=null, options=null;
    if(type==='multiple-choice'){ 
        options=Array.from(document.getElementsByClassName('mc-option')).map(x=>x.value); 
        correct=parseInt(document.getElementById('mc-correct').value)-1; 
    }
    if(type==='short-text') correct=document.querySelector('#questionEditor input').value;
    if(type==='true-false') correct=document.querySelector('#questionEditor select').value==='true';
    db.ref('interactiveTasks/'+id).set({id,title,type,options,correct,deadline,xp});
    alert('מטלה אינטראקטיבית נשמרה ✅');
    closeInteractiveTaskModal();
}

// --- טעינת קבצים ממאגר GitHub (דוגמא) ---
function fetchGithubFiles(){
    const select=document.getElementById('taskFileSelect');
    select.innerHTML='<option value="">בחר קובץ...</option>';
    // כאן ניתן לממש קריאה ל-GitHub API אם רוצים
    ['exercise1.html','exercise2.html'].forEach(f=>{
        const opt=document.createElement('option');
        opt.value=f; opt.textContent=f;
        select.appendChild(opt);
    });
}

// --- הרשמות ההגשות לפאנל מנהל ---
function initAdminSubmissions(){
    db.ref('submissions').on('value', snap=>{
        const data=snap.val();
        const list=document.getElementById('submissions-list');
        if(!data){ list.textContent='אין הגשות חדשות'; return; }
        allSubmissions = data;
        list.innerHTML='';
        Object.values(data).forEach(sub=>{
            const student=allStudents.find(s=>s.id===sub.studentId);
            const task = allTasks.find(t=>t.id===sub.taskId);
            const div=document.createElement('div');
            div.innerHTML=`<b>${student?student.name:'?'}</b> הגיש את <b>${task?task.title:'?'}</b>: <a href="${sub.content}" target="_blank">קישור</a>`;
            list.appendChild(div);
        });
    });
}
</script>
</body>
</html>
