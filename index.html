<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>חוות הטמגוצ'י - גרסת ניהול ותלמידים</title>

<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>

<style>
/* מסתיר את אזור המטלות אם אין בתוכו תוכן */
#tasks-list:empty, 
#tasks-area:has(#tasks-list:empty) {
    display: none;
}
/* מסתיר את אזור ההגשות למורה אם הוא ריק */
#submissions-list:empty,
#admin-submissions:has(#submissions-list:empty) {
    display: none;
}

body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #e0f7fa url('images/background.png') no-repeat center center fixed;
    background-size: cover;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

#login-screen {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
    width: 320px;
    margin-top: 50px;
    border: 2px solid #81c784;
}

#control-panel {
    display: none; 
    background: rgba(255, 255, 255, 0.95);
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    margin-bottom: 30px;
    width: 90%;
    max-width: 900px;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: center;
    border: 2px solid #81c784;
}

input, select, button {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
}

button {
    background-color: #2e7d32;
    color: white;
    cursor: pointer;
    border: none;
    font-weight: bold;
}

#farm-grid {
    display: none;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 25px;
    width: 100%;
    max-width: 1200px;
}

.student-card {
    background: rgba(255, 255, 255, 0.9);
    border-radius: 25px;
    padding: 20px;
    text-align: center;
    position: relative;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    border-bottom: 5px solid #81c784;
    transition: transform 0.3s;
}

.my-creature { border: 4px solid #fbc02d; transform: scale(1.05); z-index: 5; }

.level-text-badge {
    position: absolute;
    top: 5px;
    right: 15px;
    font-family: 'Arial Black', sans-serif;
    font-size: 1.4em;
    font-weight: 900;
    color: #2e7d32;
    z-index: 10;
    text-shadow: -1.5px -1.5px 0 #fff, 1.5px -1.5px 0 #fff, 0 2px 4px rgba(0,0,0,0.3);
}

.creature-img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    margin-bottom: 10px;
}

/* אנימציות */
.glow-effect { animation: glow-pulse 0.6s ease-out; }
@keyframes glow-pulse {
    0% { filter: brightness(1); transform: scale(1); }
    50% { filter: brightness(1.6) drop-shadow(0 0 15px gold); transform: scale(1.25); }
    100% { filter: brightness(1); transform: scale(1); }
}

.shake { animation: shake 0.5s infinite; }
@keyframes shake {
    0%, 100% { transform: translate(1px, 1px) rotate(0deg); }
    25% { transform: translate(-1px, -2px) rotate(-1deg); }
    75% { transform: translate(1px, -2px) rotate(1deg); }
}

.hatch-crack { animation: eggCrack 0.9s ease-out forwards; }
@keyframes eggCrack {
    0% { transform: scale(1); }
    100% { transform: scale(0); opacity: 0; }
}

.xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
.xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s ease-out; }

.remove-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #ff5252;
    color: white;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.xp-float {
    position: absolute;
    font-weight: bold;
    color: gold;
    font-size: 1.2em;
    animation: floatUp 0.8s ease-out forwards;
    left: 50%;
    top: 60px;
}
@keyframes floatUp { 0% { opacity: 1; transform: translate(-50%,0); } 100% { opacity: 0; transform: translate(-50%,-40px); } }

.levelup {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #ffd700;
    color: #1b5e20;
    font-weight: bold;
    font-size: 1.5em;
    padding: 10px 20px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    z-index: 100;
    pointer-events: none;
    animation: levelPop 2s ease-out forwards;
}

@keyframes levelPop {
    0% { opacity: 0; transform: translate(-50%, 0) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -30px) scale(1.2); }
    80% { opacity: 1; transform: translate(-50%, -40px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -60px) scale(0.8); }
}

.hatch-flash {
    position: absolute;
    width: 120px;
    height: 120px;
    background: white;
    border-radius: 50%;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    animation: hatchFlash 0.4s ease-out forwards;
}
@keyframes hatchFlash { 0% { transform: translateX(-50%) scale(0.5); opacity: 1; } 100% { transform: translateX(-50%) scale(2); opacity: 0; } }

#tasks-area {
    width: 90%;
    max-width: 1200px;
    margin-bottom: 20px;
    display: none;
}

.task-card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 10px;
    border-right: 6px solid #1976d2;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

.task-info h4 { margin: 0; color: #333; }
.task-info a { color: #1976d2; font-size: 0.9em; }
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
    <h2>החווה המופלאה 🐾</h2>
    <div id="admin-login-area">
        <input type="password" id="adminPass" placeholder="סיסמת מנהל" style="width:80%; margin-bottom:10px;">
        <button onclick="checkAdmin()" style="width:90%;">כניסת מנהל 🔑</button>
    </div>
    <hr style="margin:20px 0;">
    <div id="student-login-area">
        <p>כניסת תלמידים:</p>
        <select id="studentSelect" style="width:90%; margin-bottom:10px;">
            <option value="">טוען רשימה...</option>
        </select>
        <button onclick="studentLogin()" style="width:90%; background-color:#1976d2;">אני רוצה להיכנס! ✨</button>
    </div>
</div>

<!-- CONTROL PANEL -->
<div id="control-panel">
    <div style="display:flex; gap:10px; width:100%; flex-wrap:wrap; justify-content:center; align-items: center; ">
        <input type="text" id="studentName" placeholder="שם התלמיד">
        <select id="studentClass">
            <option value="ה1">כיתה ה'1</option>
            <option value="ה2">כיתה ה'2</option>
        </select>
        <button onclick="addStudent()">צרף יצור לחווה 🐾</button>
        <button onclick="toggleTaskPanel()"> פרסום מטלה חדשה 📋</button>
    </div>

    <div style="width:100%; display:flex; gap:10px; margin-top:10px;">
        <input type="text" id="search" placeholder="חפש לפי שם..." oninput="updateView()" style="flex:2;">
        <select id="sortBy" onchange="updateView()" style="flex:1;">
            <option value="name">מיין לפי שם</option>
            <option value="level">מיין לפי רמה</option>
            <option value="class">מיין לפי כיתה</option>
        </select>
        <button onclick="location.reload()" style="background:#555;">יציאה</button>
    </div>

    <hr style="width:100%; margin: 15px 0;">

    <div id="task-panel" style="display:none; width:100%;  align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
        <input type="text" id="taskTitle" placeholder="כותרת המטלה" style="width:100px;">
        <select id="taskFileSelect" style="width:150px;">
            <option value="">טוען משימות...</option>
        </select>
        <button onclick="fetchGithubFiles()" style="background:#555; padding:8px;">🔄</button>
        <input type="date" id="taskDeadline" style="width:120px;">
        <input type="number" id="taskXP" placeholder="XP למטלה" value="100" style="width:60px;">
        <button onclick="addTask()" 
                style="background-color:#1976d2; color:white; padding:8px 8px; border:none; border-radius:6px; cursor:pointer;">
            פרסם מטלה  📋
        </button>
    </div>

    <div id="admin-submissions" style="width:100%; margin-top:20px; background:#f1f8e9; padding:15px; border-radius:10px; border:1px dashed #2e7d32; text-align:right;">
        <h4 style="margin:0 0 10px 0;">הגשות שממתינות לבדיקה 📥</h4>
        <div id="submissions-list">אין הגשות חדשות</div>
    </div>
</div>

<!-- TASKS AREA -->
<div id="tasks-area">
   <h3 style="background: rgba(255, 255, 255, 0.8); padding: 8px 12px; border-radius: 8px; display: inline-block;">
        משימות להשלמה 📝
    </h3>
    <div id="tasks-list"></div>
</div>

<!-- FARM GRID -->
<div id="farm-grid"></div>

<!-- SUBMIT MODAL -->
<div id="submit-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:15px; box-shadow:0 0 20px rgba(0,0,0,0.5); z-index:1000; width:300px; text-align:center; border:3px solid #1976d2;">
    <h3 id="modal-task-title">הגשת מטלה</h3>
    <button onclick="window.open('https://send.magicode.me/', '_blank')" 
            style="background:#ff9800; color:white; padding:10px 15px; border:none; border-radius:8px; cursor:pointer;">
        העלאת קבצים 📤
    </button>
    <textarea id="submit-content" placeholder="לאחר שהעלית את קובץ המטלה שלך, הדבק כאן את הקישור" style="width:100%; height:80px; margin-bottom:10px; padding:5px;"></textarea>
    <div style="margin-bottom:10px;">
        <span style="font-size:0.85em; color:#555; display:block; margin-top:5px;">
            לאחר ההעלאה, העתק את הקישור והדבק כאן בתיבה למעלה
        </span>

    <div style="display:flex; gap:10px;">
        <button onclick="sendSubmission()" style="flex:1; background:#4caf50;">שלח הגשה 🚀</button>
        <button onclick="closeModal()" style="flex:1; background:#999;">ביטול</button>
    </div>
</div>

<script>
/* ================== FIREBASE CONFIG ================== */
const firebaseConfig = {
    apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
    authDomain: "liorfarm.firebaseapp.com",
    databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "liorfarm",
    storageBucket: "liorfarm.firebasestorage.app",
    messagingSenderId: "436063422896",
    appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================== GLOBALS ================== */
const CREATURE_TYPES = ['trt','snk','hnd','cat','crw','fsh','chk','fox','zbr','mnk','shp','cow','ost','rbt','dnk','duk','snl','owl','spd'];
let allStudents = [];
let currentUser = null;
let allSubmissions = {};
let allTasks = [];

/* ================== FETCH STUDENTS ================== */
db.ref('students').on('value', (snap) => {
    const data = snap.val();
    console.log("students data:", data);
    allStudents = [];
    if (data) Object.keys(data).forEach(key => allStudents.push(data[key]));

    const select = document.getElementById('studentSelect');
    const currentVal = select.value;
    select.innerHTML = '<option value="">בחר את שמך...</option>';
    allStudents.forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.name} (${s.className})`;
        select.appendChild(opt);
    });
    select.value = currentVal;
    updateView();
});

/* ================== LOGIN ================== */
function checkAdmin() {
    if (document.getElementById('adminPass').value === 'rabenu247') {
        currentUser = 'admin';
        startApp();
    } else { alert('סיסמה שגויה'); }
}

function studentLogin() {
    const id = document.getElementById('studentSelect').value;
    if (!id) return alert('בחר שם מהרשימה');
    currentUser = id;
    startApp();
}

/* ================== START APP ================== */
function startApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('farm-grid').style.display = 'grid';
    document.getElementById('tasks-area').style.display = 'block';
    
    if (currentUser && currentUser === 'admin') {
        document.getElementById('control-panel').style.display = 'flex';
        fetchGithubFiles();
        initAdminSubmissions();
    }
    
    updateView();
    renderTasks();
}

/* ================== UPDATE VIEW ================== */
function updateView() {
    const grid = document.getElementById('farm-grid');
    if (!currentUser || !allStudents) return;

    const searchTerm = (document.getElementById('search').value || '').toLowerCase();
    const sortBy = document.getElementById('sortBy').value;

    let filtered = allStudents.filter(s => s.name && s.name.toLowerCase().includes(searchTerm));
    filtered.sort((a,b) => {
        if (sortBy === 'name') return a.name.localeCompare(b.name);
        if (sortBy === 'level') return b.level - a.level;
        return a.className.localeCompare(b.className
