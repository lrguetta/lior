<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>חוות הטמגוצ'י - תיקון אנימציה סופי</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #e0f7fa url('images/background.png') no-repeat center center fixed;
            background-size: cover; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        #control-panel {
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 25px; 
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
            border: 2px solid #81c784;
        }

        #farm-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 20px; width: 100%; max-width: 1000px;
        }

        .student-card {
            background: white; border-radius: 20px; padding: 15px; text-align: center;
            position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .creature-img { 
            width: 100px; height: 100px; cursor: pointer; 
            object-fit: contain;
            transition: transform 0.1s ease;
        }

        /* --- האנימציה המשופרת --- */
        .hit-effect {
            animation: burst 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        }

        @keyframes burst {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.5); filter: brightness(2) saturate(2) drop-shadow(0 0 25px gold); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .xp-container { background: #eee; border-radius: 10px; height: 14px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; }
        .xp-bar { background: linear-gradient(90deg, #fbc02d, #ffeb3b); height: 100%; transition: width 0.3s; }
        .level-badge { position: absolute; top: 10px; right: 12px; font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>

<div id="control-panel">
    <input type="text" id="nameIn" placeholder="שם התלמיד">
    <select id="classIn"><option value="ה1">ה'1</option><option value="ה2">ה'2</option></select>
    <button onclick="addStudent()" style="background:#2e7d32; color:white; padding:8px 15px; border:none; border-radius:10px; cursor:pointer;">הוסף ✨</button>
</div>

<div id="farm-grid"></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
      authDomain: "liorfarm.firebaseapp.com",
      databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "liorfarm",
      storageBucket: "liorfarm.firebasestorage.app",
      messagingSenderId: "436063422896",
      appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('students').on('value', (snap) => { render(snap.val() ? Object.values(snap.val()) : []); });

    function addStudent() {
        const name = document.getElementById('nameIn').value;
        if (!name) return;
        const id = Date.now().toString();
        db.ref('students/' + id).set({
            id, name, className: document.getElementById('classIn').value,
            xp: 0, level: 0,
            type: ['cat', 'dog', 'fox'][Math.floor(Math.random()*3)], // דוגמה
            egg: Math.floor(Math.random()*5)
        });
        document.getElementById('nameIn').value = '';
    }

    function handleAction(id, xp, lvl) {
        // 1. הפעלת אנימציה ויזואלית מיד
        const img = document.getElementById('img-' + id);
        if (img) {
            img.classList.remove('hit-effect');
            void img.offsetWidth; // "מכריח" את הדפדפן לאתחל את ה-CSS
            img.classList.add('hit-effect');
        }

        // 2. עדכון נתונים ב-Firebase
        let nxp = xp + 10;
        let nlv = lvl;
        if (nxp >= 100) { nlv++; nxp = 0; }
        db.ref('students/' + id).update({ xp: nxp, level: nlv });
    }

    function render(list) {
        document.getElementById('farm-grid').innerHTML = list.map(s => {
            const eggNum = (s.egg !== undefined) ? s.egg + 1 : 1;
            const imgPath = s.level === 0 ? `images/egg${eggNum}.png` : `images/${s.type}${s.level >= 20 ? 3 : (s.level >= 10 ? 2 : 1)}.png`;
            return `
                <div class="student-card">
                    <div class="level-badge">Lv.${s.level}</div>
                    <img id="img-${s.id}" src="${imgPath}" class="creature-img" 
                         onclick="handleAction('${s.id}', ${s.xp}, ${s.level})">
                    <div style="font-weight:bold; margin-top:5px;">${s.name}</div>
                    <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
                </div>
            `;
        }).join('');
    }
</script>
</body>
</html>
