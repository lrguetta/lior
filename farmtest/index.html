<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>חוות הטמגוצ'י - גרסה סופית ומתוקנת</title>

<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js"></script>
<style>
    #tasks-list:empty, #tasks-area:has(#tasks-list:empty) { display: none; }
    #submissions-list:empty, #admin-submissions:has(#submissions-list:empty) { display: none; }

    body {
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: #e0f7fa url('images/background.png') no-repeat center center fixed;
        background-size: cover;
        margin: 0; padding: 20px;
        display: flex; flex-direction: column; align-items: center;
    }

    #login-screen {
        background: rgba(255, 255, 255, 0.95);
        padding: 30px; border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center; width: 320px; margin-top: 50px; border: 2px solid #81c784;
    }

    #control-panel {
        display: none; background: rgba(255, 255, 255, 0.95);
        padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        margin-bottom: 30px; width: 95%; max-width: 1100px;
        flex-wrap: wrap; gap: 10px; justify-content: center; border: 2px solid #81c784;
    }

    input, select, button, textarea { padding: 10px; border-radius: 10px; border: 1px solid #ddd; font-size: 15px; }
    button { background-color: #2e7d32; color: white; cursor: pointer; border: none; font-weight: bold; }

    #farm-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; width: 100%; max-width: 1200px; }

    /* כרטיס תלמיד */
    .student-card-container { height: 320px; perspective: 1000px; }
    .student-card { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; cursor: pointer; }
    .student-card.is-flipped { transform: rotateY(180deg); }
    .card-face {
        position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
        background: rgba(255, 255, 255, 0.9); border-radius: 25px; padding: 20px;
        box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        border-bottom: 5px solid #81c784; display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .card-back { transform: rotateY(180deg); background: #f1f8e9; border-bottom: 5px solid #1976d2; }
    .my-creature .card-face { border: 4px solid #fbc02d; }

    .creature-img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 10px; }
    
    /* אנימציות */
/* הבהוב הדמות */
.glow-effect { 
    animation: glow-pulse 0.7s ease-out !important; 
}

@keyframes glow-pulse {
    0% { filter: brightness(1) drop-shadow(0 0 0px gold); transform: scale(1); }
    50% { filter: brightness(1.8) drop-shadow(0 0 25px gold); transform: scale(1.1); }
    100% { filter: brightness(1) drop-shadow(0 0 0px gold); transform: scale(1); }
}

/* XP צף - הוספתי position relative לאבא כדי שיצוף נכון */
.card-face { position: relative; overflow: visible; }

.xp-float {
    position: absolute;
    font-weight: bold;
    color: #ffd700;
    font-size: 28px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 200;
    left: 50%;
    top: 40%;
    animation: floatUp 0.9s ease-out forwards;
}

@keyframes floatUp {
    0% { opacity: 0; transform: translate(-50%, 0); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -100px); }
}

/* Level Up */
.levelup-anim {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(45deg, #ffd700, #ff9800);
    color: #1b5e20;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: bold;
    font-size: 1.6em;
    white-space: nowrap;
    box-shadow: 0 0 25px rgba(255,215,0,0.7);
    z-index: 300;
    animation: levelPop 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes levelPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
    85% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
}
    .xp-container { background: #eee; border-radius: 10px; height: 18px; margin: 10px 0; overflow: hidden; border: 1px solid #ccc; width: 100%; }
    .xp-bar { background: linear-gradient(90deg, #ffeb3b, #fbc02d); height: 100%; transition: width 0.4s; }
    .level-text-badge { position: absolute; top: 10px; right: 15px; font-size: 1.4em; font-weight: bold; color: #2e7d32; }

    #tasks-area { width: 90%; max-width: 1200px; margin-bottom: 20px; display: none; }
    .task-card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-right: 6px solid #1976d2; display: flex; justify-content: space-between; align-items: center; }

    /* הבהוב הדמות - Glow */
.glow-effect { 
    animation: glow-pulse 0.6s ease-out !important; 
}

@keyframes glow-pulse {
    0% { filter: brightness(1) drop-shadow(0 0 0px gold); transform: scale(1); }
    50% { filter: brightness(1.8) drop-shadow(0 0 25px gold); transform: scale(1.1); }
    100% { filter: brightness(1) drop-shadow(0 0 0px gold); transform: scale(1); }
}

/* מספר XP צף */
.xp-float {
    position: absolute;
    font-weight: bold;
    color: #ffd700;
    font-size: 28px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    pointer-events: none;
    z-index: 200;
    animation: floatUp 0.8s ease-out forwards;
}

@keyframes floatUp {
    0% { opacity: 0; transform: translate(-50%, 0); }
    20% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -80px); }
}

/* הודעת Level Up יפה */
.levelup-anim {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(45deg, #ffd700, #ff9800);
    color: #1b5e20;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 1.5em;
    white-space: nowrap;
    box-shadow: 0 0 20px rgba(255,215,0,0.6);
    z-index: 300;
    animation: levelPop 2.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes levelPop {
    0% { opacity: 0; scale: 0.5; }
    15% { opacity: 1; scale: 1.2; }
    85% { opacity: 1; scale: 1; }
    100% { opacity: 0; scale: 0.8; }
}
    
    /* כפתור מחיקת תלמיד בעיגול אדום */
.delete-student-btn {
    position: absolute;
    top: -10px;
    left: -10px;
    background: #ff5252;
    color: white;
    border: 2px solid white;
    border-radius: 50%;
    width: 25px;
    height: 25px;
    font-size: 14px;
    line-height: 21px;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
}

/* אנימציות - ודא שהן קיימות */
.glow-effect { animation: glow-pulse 0.6s ease-out; }
@keyframes glow-pulse {
    0% { filter: brightness(1); transform: scale(1); }
    50% { filter: brightness(1.8) drop-shadow(0 0 15px gold); transform: scale(1.1); }
    100% { filter: brightness(1); transform: scale(1); }
}

.xp-float {
    position: absolute;
    font-weight: bold;
    color: #fbc02d;
    font-size: 24px;
    text-shadow: 1px 1px 3px black;
    animation: floatUp 0.8s ease-out forwards;
    z-index: 100;
    pointer-events: none;
}
@keyframes floatUp {
    0% { opacity: 1; transform: translate(-50%, 0); }
    100% { opacity: 0; transform: translate(-50%, -60px); }
}
</style>
</head>

<body>

<div id="login-screen">
    <h2>החווה המופלאה 🐾</h2>
    <input type="password" id="adminPass" placeholder="סיסמת מנהל" style="width:85%; margin-bottom:10px;">
    <button onclick="checkAdmin()" style="width:90%;">כניסת מנהל 🔑</button>
    <hr style="margin:20px 0;">
    <p>כניסת תלמידים:</p>
    <select id="studentSelect" style="width:90%; margin-bottom:10px;"><option value="">טוען...</option></select>
    <input type="password" id="studentPin" placeholder="קוד PIN (1234)" maxlength="4" style="width:85%; margin-bottom:10px; text-align:center;">
    <button onclick="studentLogin()" style="width:90%; background-color:#1976d2;">היכנס ליצור שלי ✨</button>
</div>

<div id="control-panel">
    <div style="display:flex; gap:10px; width:100%; flex-wrap:wrap; justify-content:center;">
        <input type="text" id="studentName" placeholder="שם התלמיד">
        <select id="studentClass"><option value="ה1">כיתה ה'1</option><option value="ה2">כיתה ה'2</option></select>
        <button onclick="addStudent()">צרף תלמיד</button>
        <button onclick="toggleTaskPanel()" style="background:#0288d1;">פרסום מטלה 📋</button>
    </div>
    <div id="task-panel" style="display:none; width:100%; background:#e1f5fe; padding:15px; border-radius:15px; margin-top:10px; gap:10px; flex-wrap:wrap; justify-content:center;">
        <input type="text" id="taskTitle" placeholder="כותרת המטלה">
        <button onclick="window.open('https://send.magicode.me/', '_blank')" style="background:#ff9800;">העלאת קובץ (Magicode) 📤</button>
        <input type="text" id="taskLink" placeholder="קישור להורדה">
        <input type="date" id="taskDeadline">
        <input type="number" id="taskXP" placeholder="XP" value="100" style="width:70px;">
        <button onclick="addTask()">פרסם</button>
    </div>
    <div style="width:100%; display:flex; gap:10px; margin-top:10px;">
        <input type="text" id="search" placeholder="חפש תלמיד..." oninput="updateView()" style="flex:2;">
        <select id="sortBy" onchange="updateView()" style="flex:1;">
            <option value="name">לפי שם</option>
            <option value="level">לפי רמה</option>
            <option value="class">לפי כיתה</option>
        </select>
        <button onclick="location.reload()" style="background:#616161;">יציאה</button>
    </div>
    <div id="admin-submissions" style="width:100%; margin-top:20px; background:#fff3e0; padding:15px; border-radius:12px; border:2px dashed #fb8c00;">
        <h4 style="margin:0 0 10px 0;">הגשות חדשות 📥</h4>
        <div id="submissions-list">אין הגשות</div>
    </div>
</div>

<div id="tasks-area">
    <h3 style="background: white; padding: 8px 20px; border-radius: 30px; display: inline-block;">משימות 📝</h3>
    <div id="tasks-list"></div>
</div>

<div id="farm-grid"></div>

<div id="submit-modal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:white; padding:25px; border-radius:15px; box-shadow:0 0 30px rgba(0,0,0,0.5); z-index:1000; width:300px; text-align:center; border:3px solid #1976d2;">
    <h3 id="modal-task-title">הגשת מטלה</h3>
    <button onclick="window.open('https://send.magicode.me/', '_blank')" style="background:#ff9800; width:100%; margin-bottom:10px;">העלאת קובץ ב-Magicode 📤</button>
    <textarea id="submit-content" placeholder="הדבק כאן את הקישור" style="width:100%; height:60px; margin-bottom:10px;"></textarea>
    <div style="display:flex; gap:10px;"><button onclick="sendSubmission()" style="flex:1; background:#4caf50;">שלח 🚀</button><button onclick="closeModal()" style="flex:1; background:#9e9e9e;">ביטול</button></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCtS0Gf9oNiRg6OTd3jyNaPxuWBFlWGIsE",
    authDomain: "liorfarm.firebaseapp.com",
    databaseURL: "https://liorfarm-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "liorfarm",
    storageBucket: "liorfarm.firebasestorage.app",
    messagingSenderId: "436063422896",
    appId: "1:436063422896:web:4cb14fbcc036ba97676e75"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const CREATURE_TYPES = ['trt','snk','hnd','cat','crw','fsh','chk','fox','zbr','mnk','shp','cow','ost','rbt','dnk','duk','snl','owl','spd'];

let allStudents = [];
let currentUser = null;
let allTasks = [];

db.ref('students').on('value', snap => {
    allStudents = snap.val() ? Object.values(snap.val()) : [];
    const select = document.getElementById('studentSelect');
    const curVal = select.value;
    select.innerHTML = '<option value="">בחר שם...</option>';
    allStudents.forEach(s => {
        const opt = document.createElement('option'); opt.value = s.id; opt.textContent = `${s.name} (${s.className})`;
        select.appendChild(opt);
    });
    select.value = curVal;
    updateView();
});

function checkAdmin() {
    if (document.getElementById('adminPass').value === 'rabenu247') { currentUser = 'admin'; startApp(); }
    else alert('טעות');
}

function studentLogin() {
    const id = document.getElementById('studentSelect').value;
    const pin = document.getElementById('studentPin').value;
    const student = allStudents.find(s => s.id === id);
    if (!student) return alert('בחר שם');
    if ((student.pin || "1234") !== pin) return alert('PIN שגוי');
    currentUser = id; startApp();
}

function startApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('farm-grid').style.display = 'grid';
    document.getElementById('tasks-area').style.display = 'block';
    if (currentUser === 'admin') {
        document.getElementById('control-panel').style.display = 'flex';
        initAdminSubmissions();
    }
    updateTasksView(); // קריאה ראשונית לעדכון כפתורי המשימות
    updateView();
}

function addStudent() {
    const name = document.getElementById('studentName').value;
    if (!name) return;
    const id = Date.now().toString();
    db.ref('students/' + id).set({
        id, name, className: document.getElementById('studentClass').value,
        xp: 0, level: 0, pin: "1234",
        type: CREATURE_TYPES[Math.floor(Math.random() * CREATURE_TYPES.length)],
        egg: Math.floor(Math.random() * 5)
    });
}

function addXP(id, xp, lvl) {
    if (currentUser !== 'admin') return;
    const card = document.getElementById('card-' + id);
    if (!card) return;

    const img = card.querySelector('.creature-img');
    const face = card.querySelector('.card-face');

    // 1. אנימציית הבהוב - איפוס Class
    img.classList.remove('glow-effect');
    void img.offsetWidth; // מאלץ את הדפדפן לחשב מחדש
    img.classList.add('glow-effect');

    // 2. יצירת XP צף
    const float = document.createElement('div');
    float.className = 'xp-float';
    float.innerText = '+10 XP';
    face.appendChild(float);
    setTimeout(() => float.remove(), 900);

    let nx = xp + 10, nl = lvl;
    if (nx >= 100) {
        nl++; nx = 0;
        // 3. אנימציית Level Up
        const lu = document.createElement('div');
        lu.className = 'levelup-anim';
        lu.innerHTML = '✨ רמה עולה! ✨';
        face.appendChild(lu);
        setTimeout(() => lu.remove(), 2500);
    }
    
    // עדכון Firebase
    db.ref('students/' + id).update({ xp: nx, level: nl });
}

function updateView() {
    const grid = document.getElementById('farm-grid');
    if (!currentUser) return;
    
    const search = document.getElementById('search').value.toLowerCase();
    const sort = document.getElementById('sortBy').value;
    
    let filtered = allStudents.filter(s => s.name.toLowerCase().includes(search));
    filtered.sort((a,b) => {
        if (sort==='name') return a.name.localeCompare(b.name);
        if (sort==='level') return b.level - a.level;
        return a.className.localeCompare(b.className);
    });

    grid.innerHTML = filtered.map(s => {
        const isAdmin = currentUser === 'admin';
        const isM = currentUser === s.id;
        const img = s.level === 0 ? `images/egg${(s.egg||0)+1}.png` : `images/${s.type}${s.level>=20?3:(s.level>=10?2:1)}.png`;
        const clickAction = isAdmin ? `addXP('${s.id}',${s.xp},${s.level})` : `this.classList.toggle('is-flipped')`;

        return `
        <div class="student-card-container ${isM?'my-creature':''}" id="card-${s.id}">
            <div class="student-card" onclick="${clickAction}">
                <div class="card-face">
                    ${isAdmin ? `<div class="delete-student-btn" onclick="event.stopPropagation(); if(confirm('למחוק את ${s.name}?')) db.ref('students/${s.id}').remove()">X</div>` : ''}
                    <div class="level-text-badge">Lv.${s.level}</div>
                    <img src="${img}" class="creature-img">
                    <div style="font-weight:bold;">${s.name}</div>
                    <div class="xp-container"><div class="xp-bar" style="width:${s.xp}%"></div></div>
                </div>
                <div class="card-face card-back">
                    ${isM ? `
                        <p>שנה PIN:</p>
                        <input type="text" maxlength="4" value="${s.pin||'1234'}" onchange="db.ref('students/${s.id}').update({pin:this.value})" onclick="event.stopPropagation()" style="width:60px; text-align:center;">
                    ` : `<p>שלום, אני ${s.name}!</p>`}
                </div>
            </div>
        </div>`;
    }).join('');
}

function toggleTaskPanel() { const p = document.getElementById('task-panel'); p.style.display = p.style.display==='none'?'flex':'none'; }

function updateTasksView() {
    const list = document.getElementById('tasks-list');
    const isAdmin = currentUser === 'admin';
    list.innerHTML = allTasks.map(t => `
        <div class="task-card">
            <div>
                <h4 style="margin:0;">${t.title}</h4>
                ${t.link ? `<a href="${t.link}" target="_blank">קובץ מטלה 📎</a>` : ''}
                <div style="font-size:0.8em; color:#666;">פרס: ${t.xp}XP | עד: ${t.deadline || 'ללא'}</div>
            </div>
            ${isAdmin ? 
                `<button onclick="deleteTask('${t.id}')" style="background:#d32f2f;">מחק מטלה</button>` : 
                `<button onclick="openSubmitModal('${t.id}','${t.title}')" style="background:#1976d2;">הגש מטלה ✍️</button>`
            }
        </div>
    `).join('');
}

db.ref('tasks').on('value', snap => {
    allTasks = snap.val() ? Object.values(snap.val()) : [];
    updateTasksView();
});

function addTask() {
    const id = Date.now().toString();
    db.ref('tasks/' + id).set({
        id, title: document.getElementById('taskTitle').value,
        link: document.getElementById('taskLink').value,
        deadline: document.getElementById('taskDeadline').value,
        xp: parseInt(document.getElementById('taskXP').value) || 100
    });
}
function deleteTask(id) { if(confirm('מחק?')) db.ref('tasks/'+id).remove(); }

let curT = null;
function openSubmitModal(id, title) { curT = id; document.getElementById('modal-task-title').innerText = title; document.getElementById('submit-modal').style.display='block'; }
function closeModal() { document.getElementById('submit-modal').style.display='none'; }
function sendSubmission() {
    const c = document.getElementById('submit-content').value;
    const s = allStudents.find(st => st.id === currentUser);
    db.ref('submissions/' + Date.now()).set({ id: Date.now(), studentName: s.name, studentId: s.id, taskId: curT, content: c });
    alert("נשלח!"); closeModal();
}

function initAdminSubmissions() {
    db.ref('submissions').on('value', snap => {
        const s = snap.val();
        document.getElementById('submissions-list').innerHTML = s ? Object.values(s).map(sub => `
            <div style="background:white; padding:10px; margin-top:5px; border-radius:10px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                <b>${sub.studentName}</b>
                <button onclick="window.open('${sub.content}')" style="background:#0288d1; padding:5px;">צפה</button>
                <button onclick="approveSub('${sub.id}','${sub.studentId}', 1)" style="background:green; padding:5px;">אשר ✅</button>
                <button onclick="approveSub('${sub.id}','${sub.studentId}', 0.5)" style="background:#fbc02d; color:black; padding:5px;">חלקי 🟡</button>
                <button onclick="db.ref('submissions/'+'${sub.id}').remove()" style="background:red; padding:5px;">X</button>
            </div>
        `).join('') : 'אין הגשות';
    });
}

function approveSub(sid, stid, mult) {
    db.ref('submissions/'+sid).once('value', snap => {
        const sub = snap.val(); if(!sub) return;
        const t = allTasks.find(x => x.id === sub.taskId);
        const xp = Math.round((t?t.xp:100) * mult);
        const s = allStudents.find(x => x.id === stid);
        let nx = s.xp + xp, nl = s.level;
        while(nx >= 100) { nl++; nx -= 100; }
        db.ref('students/'+stid).update({xp: nx, level: nl});
        db.ref('submissions/'+sid).remove();
    });
}
</script>
</body>
</html>
