<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>מיגרציה מטלות → Appwrite</title>
<script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2/dist/iife/sdk.js"></script>
<style>
body { font-family: Arial, sans-serif; padding: 30px; background: #f0f4f8; direction: rtl; }
h2 { color: #1976d2; }
#log { background: white; padding: 20px; border-radius: 10px; height: 300px; overflow-y: auto; font-size: 0.9em; border: 1px solid #ddd; margin-top: 20px; }
.ok  { color: #2e7d32; }
.err { color: #c62828; }
.info { color: #1565c0; font-weight: bold; }
button { background: #1976d2; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; margin-top: 20px; }
button:disabled { background: #999; }
#progress { font-size: 1.2em; margin-top: 15px; font-weight: bold; color: #333; }
</style>
</head>
<body>
<h2>📝 מיגרציה מטלות Firebase → Appwrite</h2>
<p>לחץ להעלאת המטלות ל-Appwrite.</p>
<p style="color:#c62828; font-size:0.9em;">⚠️ הרץ פעם אחת בלבד!</p>
<button id="startBtn" onclick="startMigration()">התחל מיגרציה ✨</button>
<div id="progress"></div>
<div id="log"></div>

<script>
const { Client, Databases, ID } = Appwrite;
const client = new Client()
    .setEndpoint("https://cloud.appwrite.io/v1")
    .setProject("69ba8bd200228971c224");
const dbSvc = new Databases(client);
const DB_ID = "69ba8e8e00096cab7d99";
const TASKS_TABLE = "tasks";

const tasks = [{"firebaseId": "1773840848436", "title": "כי תצא | יום רביעי כט אדר", "deadline": "2026-03-18", "xp": 100, "startTime": "", "endTime": "", "questions": "[{\"text\": \"ציין את הפרק והפסוקים עבור יחידת \\\"שילוח הקן\\\"\", \"type\": \"study_unit\"}, {\"correct\": \"אם תמצא קן של ציפורים\", \"others\": [\"מצוה לקרוא לציפור לקן\", \"אם תקרא לציפור שתבוא לקן\", \"אסור לקרוא לציפור שבקן\"], \"text\": \"פסוק ו: מה פירוש המילים \\\"כי יקרא קן ציפור\\\"?\", \"type\": \"multiple\"}, {\"correct\": \"האמא יושבת, נמצאת\", \"others\": [\"האמא מרביצה\", \"האם צריך לרבוץ\", \"האם הציפור מרביצה\"], \"text\": \"פסוק ו: מה פירוש המילים \\\"והאם רובצת\\\"?\", \"type\": \"multiple\"}, {\"options\": [\"להכין קן למצווה\", \"למצוא קן עם ביצים\", \"שהציפור האמא תהיה\", \"שהביצים יבקעו לאפרוחים\", \"לשלוח את האם בידיים\"], \"text\": \"מה התנאים לקיום מצוות שילוח הקן על-פי מה שלמדנו ביחידה?\", \"type\": \"survey\"}, {\"text\": \"ציין את הפרק והפסוקים עבור יחידת \\\"מצוות מעקה\\\"\", \"type\": \"study_unit\"}, {\"correct\": \"לא נכון\", \"text\": \"מצווה לבנות בית כדי להקים מעקה\", \"type\": \"boolean\"}, {\"correct\": \"נכון\", \"text\": \"מצווה להסיר סכנות שנמצאות בשטח או אזור הבית\", \"type\": \"boolean\"}, {\"text\": \"הסבר את המילים: \\\"ולא תשים דמים בביתך\\\"\", \"type\": \"open\"}, {\"text\": \"ציין את הפרק והפסוקים עבור יחידת \\\"איסור כלאיים\\\"\", \"type\": \"study_unit\"}, {\"options\": [\"כלאי הכרם והעצים\", \"כלאי הבגד\", \"כלאי הזרע\", \"כלאי בעלי-חיים\", \"כלאי המאכלים\"], \"text\": \"איזה סוגי כלאיים מוזכרים בפסוקים שביחידה?\", \"type\": \"survey\"}, {\"correct\": \"עירבוב\", \"others\": [\"סגירה\", \"חיתוך\", \"זריעה\"], \"text\": \"המילה כלאיים פירושה:\", \"type\": \"multiple\"}, {\"correct\": \"נכון\", \"text\": \"\\\"שעטנז\\\" הוא כלאיים בבגד של פשתן וצמר\", \"type\": \"boolean\"}]"}];

function log(msg, cls) {
    cls = cls || "";
    const div = document.getElementById("log");
    div.innerHTML += '<div class="' + cls + '">' + msg + '</div>';
    div.scrollTop = div.scrollHeight;
}

async function startMigration() {
    document.getElementById("startBtn").disabled = true;
    log("מתחיל העלאת " + tasks.length + " מטלות...", "info");
    let success = 0, failed = 0;

    for (let i = 0; i < tasks.length; i++) {
        const t = tasks[i];
        document.getElementById("progress").innerText = "מעלה " + (i+1) + "/" + tasks.length + ": " + t.title;
        const payload = {
            title:     t.title,
            deadline:  t.deadline  || "",
            xp:        t.xp,
            startTime: t.startTime || "",
            endTime:   t.endTime   || "",
            questions: t.questions
        };
        try {
            await dbSvc.createDocument(DB_ID, TASKS_TABLE, t.firebaseId, payload);
            log("✅ " + t.title, "ok");
            success++;
        } catch(e) {
            log("❌ " + t.title + ": " + e.message, "err");
            failed++;
        }
    }

    document.getElementById("progress").innerText =
        "✅ הסתיים! " + success + " הועלו בהצלחה, " + failed + " נכשלו.";
    log("--- סיום ---", "info");
}
</script>
</body>
</html>
