function log(msg, cls) {
    cls = cls || "";
    const div = document.getElementById("log");
    div.innerHTML += '<div class="' + cls + '">' + msg + '</div>';
    div.scrollTop = div.scrollHeight;
}

function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

async function startMigration() {
    document.getElementById("startBtn").disabled = true;
    log("מתחיל מיגרציה של " + students.length + " תלמידים...", "info");
    
    let success = 0, failed = 0;
    
    for (let i = 0; i < students.length; i++) {
        const s = students[i];
        document.getElementById("progress").innerText = 
            "מעלה " + (i+1) + "/" + students.length + ": " + s.name;
        
        const payload = {
            name:      s.name,
            className: s.className,
            xp:        s.xp,
            level:     s.level,
            type:      s.type,
            egg:       s.egg,
            likes:     s.likes   || "{}",
            history:   s.history || "{}"
        };
        if (s.password)     payload.password     = s.password;
        if (s.personalNote) payload.personalNote = s.personalNote;
        if (s.lastNote)     payload.lastNote     = s.lastNote;
        
        try {
            // משתמשים ב-Firebase ID כ-Document ID כדי שה-localStorage ימשיך לעבוד!
            await dbSvc.createDocument(DB_ID, STUDENTS_TABLE, s.firebaseId, payload);
            log("✅ " + s.name + " (רמה " + s.level + ", " + s.xp + " XP)", "ok");
            success++;
        } catch(e) {
            log("❌ שגיאה עם " + s.name + ": " + e.message, "err");
            failed++;
        }
        
        await sleep(200);
    }
    
    document.getElementById("progress").innerText = 
        "✅ הסתיים! " + success + " הועלו בהצלחה, " + failed + " נכשלו.";
    log("--- סיום המיגרציה ---", "info");
}
